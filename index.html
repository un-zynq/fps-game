<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<title>CYBER STRIKE</title>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;}
#c{display:block;width:100vw;height:100vh;outline:none;}

/* ── CROSSHAIR ── */
#xhair{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:100;
}
#xhair::before,#xhair::after{content:'';position:absolute;background:#0ff;}
#xhair::before{width:14px;height:2px;top:50%;left:50%;transform:translate(-50%,-50%);}
#xhair::after{width:2px;height:14px;top:50%;left:50%;transform:translate(-50%,-50%);}
#xhair .dot{width:2px;height:2px;background:#0ff;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
#xhair.hit::before,#xhair.hit::after,#xhair.hit .dot{background:#f00;animation:hitflash .15s forwards;}
@keyframes hitflash{0%{opacity:1}100%{opacity:1;background:#f00;}}

/* ── HUD BOTTOM ── */
#hud{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:flex-end;
  padding:0 28px 20px;pointer-events:none;z-index:100;
}
#hud-left{display:flex;flex-direction:column;gap:6px;}
.hud-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:#0ff9;text-transform:uppercase;}
#hp-track{width:220px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;position:relative;overflow:visible;}
#hp-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#f00,#f80);transition:width .15s ease;position:relative;}
#hp-fill::after{content:'';position:absolute;right:0;top:-3px;width:12px;height:12px;border-radius:50%;background:#f80;box-shadow:0 0 8px #f80;}
#hp-val{font-family:'Share Tech Mono',monospace;font-size:22px;font-weight:700;color:#fff;line-height:1;margin-top:2px;}

/* ── AMMO ── */
#ammo-wrap{text-align:right;}
#ammo-val{font-family:'Share Tech Mono',monospace;font-size:36px;color:#fff;line-height:1;}
#ammo-val span{font-size:18px;color:#fff5;}
#reload-bar{width:80px;height:3px;background:rgba(255,255,255,.1);margin-left:auto;margin-top:4px;border-radius:2px;overflow:hidden;display:none;}
#reload-fill{height:100%;background:#0ff;width:0%;transition:width linear;}

/* ── KILLFEED ── */
#killfeed{
  position:fixed;top:80px;right:24px;
  display:flex;flex-direction:column;gap:5px;
  align-items:flex-end;pointer-events:none;z-index:100;
}
.kf-entry{
  font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;
  padding:4px 12px;letter-spacing:.5px;
  background:rgba(0,0,0,.6);border-right:3px solid #0ff;
  color:#fff;white-space:nowrap;
  animation:kfin .15s ease;
}
.kf-entry.kill{border-color:#f00;color:#f88;}
@keyframes kfin{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ── SCORE TOP CENTER ── */
#score-bar{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  display:flex;gap:0;z-index:100;pointer-events:none;
}
.score-block{
  padding:8px 24px;text-align:center;
  background:rgba(0,0,0,.7);border-bottom:2px solid transparent;
}
.score-block.me{border-color:#0ff;}
.score-block.them{border-color:#f00;}
.score-block .name{font-size:9px;letter-spacing:3px;font-weight:600;color:#fff6;text-transform:uppercase;}
.score-block .num{font-size:20px;font-weight:700;color:#fff;font-family:'Share Tech Mono',monospace;}
#score-sep{padding:8px 8px;background:rgba(0,0,0,.7);color:#fff3;font-size:12px;display:flex;align-items:center;}

/* ── DAMAGE VIGNETTE ── */
#dmg-flash{position:fixed;inset:0;pointer-events:none;z-index:99;opacity:0;background:radial-gradient(ellipse at center, transparent 30%, rgba(255,0,0,.6) 100%);transition:opacity .05s;}
#dmg-flash.active{opacity:1;}

/* ── DEATH SCREEN ── */
#death-screen{
  position:fixed;inset:0;z-index:200;display:none;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.85);
}
#death-screen.show{display:flex;}
#death-screen h1{font-size:72px;font-weight:700;color:#f00;letter-spacing:4px;text-shadow:0 0 40px #f004;}
#death-screen p{font-size:16px;color:#fff6;letter-spacing:3px;font-family:'Share Tech Mono',monospace;margin-top:8px;}
#death-timer{font-size:48px;color:#fff;font-family:'Share Tech Mono',monospace;margin-top:20px;}

/* ── LOBBY PANEL ── */
#lobby{
  position:fixed;inset:0;z-index:300;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.92);
}
#lobby-panel{
  width:360px;
  border:1px solid rgba(0,255,255,.2);
  background:rgba(5,12,20,.95);
  padding:32px;
  position:relative;
}
#lobby-panel::before{
  content:'';position:absolute;top:-1px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#0ff,transparent);
}
#lobby h2{
  font-size:28px;font-weight:700;letter-spacing:5px;
  color:#fff;text-transform:uppercase;margin-bottom:4px;
}
#lobby .sub{font-size:11px;letter-spacing:3px;color:#0ff8;margin-bottom:28px;font-family:'Share Tech Mono',monospace;}

.lbl{font-size:10px;letter-spacing:2px;color:#fff5;margin-bottom:4px;margin-top:12px;display:block;}
#myIdBox{
  background:rgba(0,255,255,.06);border:1px solid rgba(0,255,255,.2);
  padding:10px 12px;font-family:'Share Tech Mono',monospace;font-size:13px;
  color:#0ff;cursor:pointer;letter-spacing:1px;margin-bottom:16px;
  display:flex;justify-content:space-between;align-items:center;
  transition:.2s;
}
#myIdBox:hover{background:rgba(0,255,255,.12);}
#myIdBox .copy-hint{font-size:10px;color:#0ff5;letter-spacing:1px;}

#peerInput{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.12);color:#fff;
  padding:10px 12px;font-family:'Share Tech Mono',monospace;font-size:13px;
  outline:none;letter-spacing:1px;
}
#peerInput:focus{border-color:rgba(0,255,255,.4);}
#peerInput::placeholder{color:#fff3;}

#joinBtn{
  width:100%;margin-top:16px;padding:13px;
  background:linear-gradient(90deg,#00bcd4,#00e5ff);
  border:none;color:#000;font-family:'Rajdhani',sans-serif;
  font-size:15px;font-weight:700;letter-spacing:3px;cursor:pointer;
  text-transform:uppercase;transition:.2s;
}
#joinBtn:hover{background:linear-gradient(90deg,#00e5ff,#00bcd4);letter-spacing:4px;}

#conn-status{
  margin-top:16px;font-size:10px;letter-spacing:2px;text-align:center;
  color:#fff4;font-family:'Share Tech Mono',monospace;
}
#conn-status.waiting{color:#f808;}
#conn-status.connected{color:#0f08;}

.instructions{
  margin-top:28px;padding-top:20px;
  border-top:1px solid rgba(255,255,255,.07);
  display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;
}
.inst-row{display:flex;gap:8px;align-items:center;}
.inst-key{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);
  padding:2px 7px;font-family:'Share Tech Mono',monospace;
  font-size:10px;color:#fff8;min-width:28px;text-align:center;flex-shrink:0;
}
.inst-desc{font-size:11px;color:#fff4;letter-spacing:.5px;}
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- Crosshair -->
<div id="xhair"><div class="dot"></div></div>

<!-- Damage vignette -->
<div id="dmg-flash"></div>

<!-- Death screen -->
<div id="death-screen">
  <h1>ELIMINATED</h1>
  <p>RESPAWNING IN</p>
  <div id="death-timer">3</div>
</div>

<!-- Score bar -->
<div id="score-bar">
  <div class="score-block me"><div class="name">YOU</div><div class="num" id="myScore">0</div></div>
  <div id="score-sep">—</div>
  <div class="score-block them"><div class="name">ENEMY</div><div class="num" id="theirScore">0</div></div>
</div>

<!-- Kill feed -->
<div id="killfeed"></div>

<!-- HUD -->
<div id="hud">
  <div id="hud-left">
    <div class="hud-label">Integrity</div>
    <div id="hp-track"><div id="hp-fill" style="width:100%"></div></div>
    <div id="hp-val">100</div>
  </div>
  <div id="ammo-wrap">
    <div class="hud-label">Ammo</div>
    <div id="ammo-val"><span id="ammoNum">30</span> <span>/ 30</span></div>
    <div id="reload-bar"><div id="reload-fill"></div></div>
  </div>
</div>

<!-- Lobby -->
<div id="lobby">
  <div id="lobby-panel">
    <h2>CYBER STRIKE</h2>
    <div class="sub">P2P · FPS · 1v1</div>

    <span class="lbl">YOUR PEER ID <span style="color:#0ff4">(click to copy)</span></span>
    <div id="myIdBox">
      <span id="myIdTxt">Connecting...</span>
      <span class="copy-hint">COPY ▸</span>
    </div>

    <span class="lbl">ENEMY PEER ID</span>
    <input id="peerInput" placeholder="Paste their ID here..." />
    <button id="joinBtn" onclick="connect()">JOIN BATTLE</button>
    <div id="conn-status">Waiting for peer ID...</div>

    <div class="instructions">
      <div class="inst-row"><div class="inst-key">WASD</div><div class="inst-desc">Move</div></div>
      <div class="inst-row"><div class="inst-key">LMB</div><div class="inst-desc">Shoot</div></div>
      <div class="inst-row"><div class="inst-key">SPACE</div><div class="inst-desc">Jump</div></div>
      <div class="inst-row"><div class="inst-key">R</div><div class="inst-desc">Reload</div></div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   ENGINE SETUP
═══════════════════════════════════════════════════════ */
const canvas = document.getElementById("c");
const engine = new BABYLON.Engine(canvas, true, { antialias: true });
const scene  = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0.01, 0.015, 0.025, 1);
scene.gravity    = new BABYLON.Vector3(0, -22, 0);
scene.collisionsEnabled = true;

/* ── CAMERA ── */
const camera = new BABYLON.UniversalCamera("cam", new BABYLON.Vector3(0, 2, 0), scene);
camera.setTarget(new BABYLON.Vector3(0, 2, 1));
camera.attachControl(canvas, true);
camera.minZ            = 0.1;
camera.inertia         = 0;
camera.angularSensibility = 700;
camera.applyGravity    = true;
camera.checkCollisions = true;
camera.ellipsoid       = new BABYLON.Vector3(0.5, 0.9, 0.5);
camera.keysUp = camera.keysDown = camera.keysLeft = camera.keysRight = [];

/* ── LIGHTING ── */
const hemi = new BABYLON.HemisphericLight("h", new BABYLON.Vector3(0,1,0), scene);
hemi.intensity = 0.4;
hemi.diffuse   = new BABYLON.Color3(0.7, 0.85, 1);

const dirLight = new BABYLON.DirectionalLight("dir", new BABYLON.Vector3(-1,-2,-1), scene);
dirLight.intensity = 0.8;
dirLight.diffuse   = new BABYLON.Color3(0.8, 0.9, 1);

/* ── GLOW ── */
const glow = new BABYLON.GlowLayer("glow", scene);
glow.intensity = 0.6;

/* ═══════════════════════════════════════════════════════
   MAP
═══════════════════════════════════════════════════════ */
function makeMat(r,g,b, emR=0,emG=0,emB=0){
  const m = new BABYLON.StandardMaterial("", scene);
  m.diffuseColor  = new BABYLON.Color3(r,g,b);
  m.emissiveColor = new BABYLON.Color3(emR,emG,emB);
  return m;
}

// Ground
const ground = BABYLON.MeshBuilder.CreateGround("ground", {width:80, height:80, subdivisions:2}, scene);
ground.checkCollisions = true;
ground.material = makeMat(.04,.05,.08);

// Grid overlay
const gridMesh = BABYLON.MeshBuilder.CreateGround("grid", {width:80, height:80, subdivisions:20}, scene);
const gridMat = new BABYLON.StandardMaterial("gridMat", scene);
gridMat.wireframe     = true;
gridMat.emissiveColor = new BABYLON.Color3(0, 0.15, 0.2);
gridMat.alpha = 0.3;
gridMesh.material = gridMat;
gridMesh.position.y = 0.02;

// Boxes / cover
const coverData = [
  [0,0,8, 3,1.8,3],  [-12,0,-5, 4,2,4],  [10,0,4, 3,3,3],
  [-6,0,10, 5,1.5,2],  [8,0,-10, 2,4,2],  [0,0,-12, 6,1.5,6],
  [15,0,0, 2,2,2],    [-15,0,3, 2,2,2],
];
const coverMat = makeMat(.06,.08,.12, 0,.02,.03);
coverData.forEach(([x,y,z,w,h,d]) => {
  const b = BABYLON.MeshBuilder.CreateBox("box", {width:w,height:h,depth:d}, scene);
  b.position.set(x, h/2, z);
  b.material = coverMat;
  b.checkCollisions = true;
});

// Neon accent strips
const neonColors = [new BABYLON.Color3(0,1,1), new BABYLON.Color3(1,0,0.3)];
[[8,0,-10],[-10,0,8],[-8,0,-12],[12,0,8]].forEach((pos,i) => {
  const strip = BABYLON.MeshBuilder.CreateBox("strip", {width:6,height:.05,depth:.1}, scene);
  strip.position.set(pos[0], .05, pos[2]);
  strip.rotation.y = i * Math.PI / 4;
  const sm = new BABYLON.StandardMaterial("sm", scene);
  sm.emissiveColor = neonColors[i % 2];
  strip.material = sm;
});

// Skybox / fog
scene.fogMode    = BABYLON.Scene.FOGMODE_EXP2;
scene.fogDensity = 0.018;
scene.fogColor   = new BABYLON.Color3(0.01, 0.015, 0.03);

/* ═══════════════════════════════════════════════════════
   PLAYER STATE
═══════════════════════════════════════════════════════ */
let myHP    = 100;
let myScore = 0;
let theirScore = 0;
let alive   = true;
let ammo    = 30;
const MAX_AMMO = 30;
let reloading = false;
let SHOOT_DAMAGE = 10;

const SPAWN_POINTS = [
  new BABYLON.Vector3(0,2,0),
  new BABYLON.Vector3(5,2,5),
  new BABYLON.Vector3(-5,2,-5),
  new BABYLON.Vector3(0,2,-8),
];

function getSpawn(i){ return SPAWN_POINTS[i % SPAWN_POINTS.length].clone(); }

/* ── Enemy visual ── */
let enemyRoot = null;
let enemyHP   = 100;

function buildEnemy(){
  if(enemyRoot){ enemyRoot.dispose(); }
  enemyRoot = new BABYLON.TransformNode("enemy", scene);

  const body = BABYLON.MeshBuilder.CreateBox("eBody",{width:0.8,height:1.2,depth:0.8}, scene);
  body.parent = enemyRoot;
  body.position.y = 0.6;

  const head = BABYLON.MeshBuilder.CreateSphere("eHead",{diameter:0.7}, scene);
  head.parent = enemyRoot;
  head.position.y = 1.7;

  const eMat = makeMat(0.8, 0.1, 0.15, 0.15, 0.01, 0.02);
  body.material = eMat;
  head.material = eMat;

  enemyRoot.position.set(5, 0, 5);
  return enemyRoot;
}

/* ── Floating HP bar ── */
let enemyHPPlane = null;
let enemyHPInner = null;

function buildEnemyHPBar(){
  if(enemyHPPlane) enemyHPPlane.dispose();

  enemyHPPlane = BABYLON.MeshBuilder.CreatePlane("ehpPlane",{width:1.6, height:.25}, scene);
  enemyHPPlane.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;

  const adt = BABYLON.GUI.AdvancedDynamicTexture.CreateForMesh(enemyHPPlane, 512, 80);

  const bg = new BABYLON.GUI.Rectangle();
  bg.width = "100%"; bg.height = "100%";
  bg.background = "rgba(0,0,0,0.65)";
  bg.thickness = 0; bg.cornerRadius = 4;
  adt.addControl(bg);

  const fill = new BABYLON.GUI.Rectangle();
  fill.width = "100%"; fill.height = "80%";
  fill.background = "linear-gradient(90deg, #ff0044, #ff4400)";
  fill.background = "#ff2244";
  fill.thickness = 0;
  fill.cornerRadius = 3;
  fill.horizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT;
  bg.addControl(fill);

  enemyHPInner = fill;
  return enemyHPPlane;
}

/* ═══════════════════════════════════════════════════════
   INPUT
═══════════════════════════════════════════════════════ */
const keys  = {};
let locked  = false;

window.addEventListener("keydown", e => {
  keys[e.code] = true;
  if(e.code === "KeyR" && !reloading && ammo < MAX_AMMO) startReload();
});
window.addEventListener("keyup",  e => keys[e.code] = false);

document.addEventListener("pointerlockchange", () => {
  locked = (document.pointerLockElement === canvas);
});

canvas.addEventListener("click", () => {
  if(document.getElementById("lobby").style.display === "none") canvas.requestPointerLock();
});

/* ── Muzzle flash ── */
let flashTimer = 0;
const muzzleFlash = BABYLON.MeshBuilder.CreateSphere("mf",{diameter:.3}, scene);
const mfMat = new BABYLON.StandardMaterial("mfMat", scene);
mfMat.emissiveColor = new BABYLON.Color3(1,.8,0);
muzzleFlash.material = mfMat;
muzzleFlash.isVisible = false;

/* ═══════════════════════════════════════════════════════
   BULLETS
═══════════════════════════════════════════════════════ */
let bullets = [];

function createBulletMesh(isEnemy){
const b = BABYLON.MeshBuilder.CreateSphere(
  "bullet",
  { diameter: isEnemy ? 0.2 : 0.15, segments: 4 },
  scene
);  const mat = new BABYLON.StandardMaterial("bm", scene);
  mat.emissiveColor = isEnemy ? new BABYLON.Color3(1,.1,.1) : new BABYLON.Color3(0,1,1);
  b.material = mat;
  return b;
}

function spawnBullet(pos, dir, isEnemy){
  const mesh = createBulletMesh(isEnemy);
  mesh.position.copyFrom(pos);
  const speed = isEnemy ? 1.4 : 1.6;
  bullets.push({
    mesh, dir: dir.clone().normalize().scale(speed),
    life: 80, isEnemy,
    trailFrames: 0
  });
}

function shoot(){
  if(!alive || !locked || reloading) return;
  if(ammo <= 0){ startReload(); return; }

  ammo--;
  updateAmmoUI();

  // Muzzle flash
  const fwd = camera.getForwardRay().direction;
  muzzleFlash.position = camera.position.clone().add(fwd.scale(1.2));
  muzzleFlash.isVisible = true;
  flashTimer = 3;

  const origin = camera.position.clone();
  const dir    = fwd.clone();
  spawnBullet(origin.add(dir.scale(1)), dir, false);

  // Instant raycast hit detection (more reliable)
  const ray = new BABYLON.Ray(origin, dir, 60);
  if(enemyRoot){
    const meshes = enemyRoot.getChildMeshes();
    for(const m of meshes){
      const hit = ray.intersectsMesh(m, false);
      if(hit.hit){
        registerHit();
        break;
      }
    }
  }

  if(conn && conn.open) conn.send({type:"shoot", pos:{x:origin.x,y:origin.y,z:origin.z}, dir:{x:dir.x,y:dir.y,z:dir.z}});
}

function registerHit(){
  // Visual: crosshair flash
  const xh = document.getElementById("xhair");
  xh.classList.add("hit");
  setTimeout(()=>xh.classList.remove("hit"), 150);

  if(conn && conn.open) conn.send({type:"hit", amount: SHOOT_DAMAGE});
  addKillfeed("HIT +10", false);
}

window.addEventListener("mousedown", e => { if(e.button===0) shoot(); });

/* ── Reload ── */
function startReload(){
  if(reloading || ammo === MAX_AMMO) return;
  reloading = true;
  addKillfeed("RELOADING...", false);
  document.getElementById("reload-bar").style.display = "block";

  const fill = document.getElementById("reload-fill");
  fill.style.transition = "none";
  fill.style.width = "0%";

  requestAnimationFrame(()=>{
    fill.style.transition = "width 1.5s linear";
    fill.style.width = "100%";
  });

  setTimeout(()=>{
    ammo = MAX_AMMO;
    reloading = false;
    document.getElementById("reload-bar").style.display = "none";
    fill.style.width = "0%";
    updateAmmoUI();
  }, 1500);
}

/* ═══════════════════════════════════════════════════════
   RENDER LOOP
═══════════════════════════════════════════════════════ */
let jumpVelocity = 0;
const JUMP_FORCE = 8;
let vertVel = 0;

scene.onBeforeRenderObservable.add(()=>{
  const dt = engine.getDeltaTime() / 1000;

  // Muzzle flash timer
  if(flashTimer > 0){ flashTimer--; if(flashTimer<=0) muzzleFlash.isVisible = false; }

  if(!alive) return;

  // ── Player movement ──
  const speed  = keys["ShiftLeft"] ? 0.22 : 0.15;
  let fwd      = camera.getForwardRay().direction.clone(); fwd.y = 0; fwd.normalize();
  let right    = BABYLON.Vector3.Cross(new BABYLON.Vector3(0,1,0), fwd).normalize();

  let move = BABYLON.Vector3.Zero();
  if(keys["KeyW"]) move.addInPlace(fwd);
  if(keys["KeyS"]) move.addInPlace(fwd.scale(-1));
  if(keys["KeyA"]) move.addInPlace(right.scale(-1));
  if(keys["KeyD"]) move.addInPlace(right);
  if(move.length() > 0) move.normalize().scaleInPlace(speed);

  // Jump
  const isGround = camera.position.y <= 1.92;
  if(keys["Space"] && isGround){ camera._needMoveForGravity = true; jumpVelocity = JUMP_FORCE; }
  if(!isGround) jumpVelocity -= 22 * dt;
  if(jumpVelocity !== 0) move.y += jumpVelocity * dt;

  camera.cameraDirection.copyFrom(move);

  // ── Bullet tick ──
  for(let i = bullets.length-1; i >= 0; i--){
    const b = bullets[i];
    b.mesh.position.addInPlace(b.dir);
    b.life--;

    // Enemy bullet hits player
    if(b.isEnemy && enemyRoot && alive){
      if(BABYLON.Vector3.Distance(b.mesh.position, camera.position) < 1.3){
        b.life = 0;
      }
    }

    if(b.life <= 0){ b.mesh.dispose(); bullets.splice(i,1); }
  }

  // ── Enemy HP bar follows enemy ──
  if(enemyRoot && enemyHPPlane){
    enemyHPPlane.position.copyFrom(enemyRoot.position);
    enemyHPPlane.position.y += 2.4;
  }

  // ── Send position ──
  if(conn && conn.open && frameCount % 2 === 0){
    conn.send({
      type:"pos",
      x: camera.position.x,
      y: camera.position.y - 1.7,
      z: camera.position.z,
      ry: camera.rotation.y,
      hp: myHP
    });
  }
  frameCount++;
});

let frameCount = 0;

engine.runRenderLoop(() => scene.render());
window.addEventListener("resize", () => engine.resize());

/* ═══════════════════════════════════════════════════════
   NETWORKING
═══════════════════════════════════════════════════════ */
const peer = new Peer(undefined, {
  config:{ iceServers:[{urls:"stun:stun.l.google.com:19302"},{urls:"stun:stun1.l.google.com:19302"}] }
});
let conn = null;

peer.on('open', id => {
  document.getElementById("myIdTxt").innerText = id;
  document.getElementById("conn-status").innerText = "Your ID is ready — share it!";
});

peer.on('error', e => { console.warn(e); });

peer.on('connection', c => {
  conn = c;
  setupConn();
});

function connect(){
  const id = document.getElementById("peerInput").value.trim();
  if(!id) return;
  document.getElementById("conn-status").innerText = "Connecting...";
  document.getElementById("conn-status").className = "waiting";
  conn = peer.connect(id);
  setupConn();
}

function setupConn(){
  conn.on('open', ()=>{
    document.getElementById("conn-status").innerText = "● CONNECTED";
    document.getElementById("conn-status").className = "connected";

    setTimeout(()=>{
      document.getElementById("lobby").style.display = "none";
      canvas.requestPointerLock();
      buildEnemy();
      buildEnemyHPBar();
      camera.position.copyFrom(getSpawn(0));
    }, 600);
  });

  conn.on('data', onData);
  conn.on('close', ()=>{ addKillfeed("CONNECTION LOST", false); });
}

function onData(data){
  switch(data.type){
    case "pos":
      if(enemyRoot){
        enemyRoot.position.set(data.x, data.y, data.z);
        enemyRoot.rotation.y = data.ry;
      }
      if(enemyHPInner && data.hp != null){
        enemyHP = data.hp;
        enemyHPInner.width = Math.max(0, data.hp) + "%";
      }
      break;

    case "shoot":
      {
        const p = new BABYLON.Vector3(data.pos.x, data.pos.y, data.pos.z);
        const d = new BABYLON.Vector3(data.dir.x, data.dir.y, data.dir.z);
        spawnBullet(p, d, true);
      }
      break;

    case "hit":
      receiveHit(data.amount);
      break;

    case "died":
      theirScore = data.score || theirScore;
      addKillfeed("ENEMY ELIMINATED", false);
      updateScoreUI();
      if(enemyRoot) enemyRoot.position.copyFrom(getSpawn(1));
      break;
  }
}

/* ═══════════════════════════════════════════════════════
   DAMAGE / DEATH
═══════════════════════════════════════════════════════ */
function receiveHit(amount){
  myHP = Math.max(0, myHP - amount);
  updateHPUI();

  // Screen flash
  const flash = document.getElementById("dmg-flash");
  flash.classList.add("active");
  setTimeout(()=>flash.classList.remove("active"), 120);

  if(myHP <= 0) die();
}

function die(){
  if(!alive) return;
  alive = false;
  theirScore++;
  updateScoreUI();

  if(conn && conn.open) conn.send({type:"died", score: theirScore});

  const ds = document.getElementById("death-screen");
  ds.classList.add("show");

  let t = 3;
  document.getElementById("death-timer").innerText = t;
  const iv = setInterval(()=>{
    t--;
    document.getElementById("death-timer").innerText = t;
    if(t <= 0){
      clearInterval(iv);
      respawn();
    }
  }, 1000);
}

function respawn(){
  myHP    = 100;
  ammo    = MAX_AMMO;
  alive   = true;
  reloading = false;
  updateHPUI();
  updateAmmoUI();

  // Pick a random spawn
  camera.position.copyFrom(getSpawn(Math.floor(Math.random()*SPAWN_POINTS.length)));
  document.getElementById("death-screen").classList.remove("show");
}

/* ═══════════════════════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════════════════════ */
function updateHPUI(){
  document.getElementById("hp-fill").style.width = Math.max(0,myHP) + "%";
  document.getElementById("hp-val").innerText = Math.max(0,myHP);
  const hue = myHP > 50 ? 0 : 0;
  document.getElementById("hp-fill").style.background =
    myHP > 60 ? "linear-gradient(90deg,#e74,#fa0)"
    : myHP > 30 ? "linear-gradient(90deg,#f40,#f80)"
    : "linear-gradient(90deg,#f00,#f44)";
}

function updateAmmoUI(){
  document.getElementById("ammoNum").innerText = ammo;
}

function updateScoreUI(){
  document.getElementById("myScore").innerText    = myScore;
  document.getElementById("theirScore").innerText = theirScore;
}

function addKillfeed(msg, isKill){
  const feed = document.getElementById("killfeed");
  const div = document.createElement("div");
  div.className = "kf-entry" + (isKill ? " kill" : "");
  div.innerText = msg;
  feed.prepend(div);
  while(feed.children.length > 5) feed.removeChild(feed.lastChild);
  setTimeout(()=>{ div.style.transition="opacity .4s"; div.style.opacity="0"; setTimeout(()=>div.remove(), 400); }, 2800);
}

/* ── Copy peer ID ── */
document.getElementById("myIdBox").addEventListener("click", ()=>{
  const txt = document.getElementById("myIdTxt").innerText;
  if(txt && txt !== "Connecting..."){
    navigator.clipboard.writeText(txt);
    addKillfeed("ID COPIED TO CLIPBOARD", false);
  }
});
</script>
