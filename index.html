<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<title>CYBER STRIKE 3.6 PRECISION</title>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;}
#c{display:block;width:100vw;height:100vh;outline:none;cursor:none;}

#xhair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:100;width:24px;height:24px;}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,.9);transition:all .1s;}
#xhair::before{width:2px;height:10px;top:7px;left:11px;}
#xhair::after{width:10px;height:2px;top:11px;left:7px;}
#xhair.hit::before,#xhair.hit::after{background:#ff3333;box-shadow:0 0 12px #ff3333;}
#xhair.headshot::before,#xhair.headshot::after{background:#ffcc00;box-shadow:0 0 15px #ffcc00; transform: scale(1.4);}
#xhair.legshot::before,#xhair.legshot::after{background:#44aaff;box-shadow:0 0 12px #44aaff;}

#hud{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-end;padding:0 32px 24px;pointer-events:none;z-index:100;}
#hud-left{display:flex;flex-direction:column;gap:6px;}
.hud-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:4px;color:rgba(255,255,255,.4);text-transform:uppercase;}
#hp-wrap{display:flex;align-items:center;gap:12px;}
#hp-bar{width:180px;height:6px;background:rgba(255,255,255,.1);position:relative;overflow:hidden;}
#hp-inner{height:100%;background:linear-gradient(90deg,#3cba5a,#4de884);transition:width .15s;}
#hp-num{font-family:'Share Tech Mono',monospace;font-size:32px;color:#fff;line-height:1;text-shadow:0 0 20px rgba(255,255,255,.3);}
#ammo-block{text-align:right;}
#ammo-cur{font-family:'Share Tech Mono',monospace;font-size:48px;color:#fff;line-height:1;text-shadow:0 0 15px rgba(255,255,255,.2);}
#ammo-max{font-family:'Share Tech Mono',monospace;font-size:14px;color:rgba(255,255,255,.35);}
#ammo-low{color:#ff5544!important;animation:ammoPulse .5s infinite;}
@keyframes ammoPulse{0%,100%{opacity:1}50%{opacity:.5}}
#reload-track{width:80px;height:3px;background:rgba(255,255,255,.1);margin-left:auto;margin-top:6px;display:none;overflow:hidden;}
#reload-inner{height:100%;background:#fff;width:0;}

#killfeed{position:fixed;top:80px;right:24px;display:flex;flex-direction:column;gap:5px;align-items:flex-end;pointer-events:none;z-index:100;}
.kf{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;padding:4px 14px 4px 18px;background:rgba(0,0,0,.7);color:#fff;letter-spacing:.5px;border-right:3px solid rgba(255,255,255,.3);animation:kfIn .3s ease-out;}
@keyframes kfIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
.kf.dmg{border-color:#ff4444;color:#ffaaaa;}
.kf.headshot{border-color:#ffcc00;color:#ffeeaa;}
.kf.legshot{border-color:#44aaff;color:#aaddff;}
.kf.event{border-color:rgba(100,200,255,.5);color:rgba(150,220,255,.9);}
.kf.kill{border-color:#44ff88;color:#aaffcc;}

#scoreboard{position:fixed;top:0;left:50%;transform:translateX(-50%);display:flex;z-index:100;pointer-events:none;}
.sb-block{padding:8px 32px;text-align:center;background:rgba(0,0,0,.75);min-width:90px;}
.sb-block .sb-name{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.35);text-transform:uppercase;}
.sb-block .sb-num{font-family:'Share Tech Mono',monospace;font-size:26px;color:#fff;}
.sb-sep{padding:8px 8px;background:rgba(0,0,0,.75);display:flex;align-items:center;color:rgba(255,255,255,.2);font-size:12px;}
.sb-block.you{border-bottom:3px solid #4af;box-shadow:0 3px 20px rgba(68,170,255,.3);}
.sb-block.them{border-bottom:3px solid #f84;box-shadow:0 3px 20px rgba(255,136,68,.3);}

#dmg-vignette{position:fixed;inset:0;pointer-events:none;z-index:99;opacity:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(200,0,0,.6) 100%);transition:opacity .05s;}
#dmg-vignette.show{opacity:1;}

@keyframes lowHPPulse{0%,100%{opacity:0}50%{opacity:.2}}
#low-hp-overlay{position:fixed;inset:0;pointer-events:none;z-index:98;background:rgba(150,0,0,1);opacity:0;display:none;}
#low-hp-overlay.pulse{display:block;animation:lowHPPulse 1.2s ease-in-out infinite;}

#hitmarker{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:101;opacity:0;}
#hitmarker svg{width:32px;height:32px;stroke:#fff;stroke-width:2;}
#hitmarker.show{animation:hmPop .25s ease-out;}
#hitmarker.headshot svg{stroke:#ffcc00; width: 40px; height: 40px;}
#hitmarker.legshot svg{stroke:#44aaff; width: 36px; height: 36px;}
@keyframes hmPop{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(1)}}
#hitmarker.kill svg{stroke:#ff4444;}

#death-screen{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.9);}
#death-screen.show{display:flex;animation:dsIn .4s ease-out;}
@keyframes dsIn{from{opacity:0}to{opacity:1}}
#death-screen .ds-title{font-size:72px;font-weight:700;letter-spacing:8px;color:#e8413c;text-shadow:0 0 80px rgba(232,65,60,.5);}
#death-screen .ds-sub{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:5px;color:rgba(255,255,255,.35);margin-top:8px;}
#death-timer{font-family:'Share Tech Mono',monospace;font-size:64px;color:#fff;margin-top:20px;text-shadow:0 0 30px rgba(255,255,255,.4);}

#lobby{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(5,8,12,.97);}
#lp{width:400px;background:rgba(10,15,22,1);border:1px solid rgba(255,255,255,.08);padding:40px;position:relative;overflow:hidden;}
#lp::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#4af,transparent);}
.lp-title{font-size:36px;font-weight:700;letter-spacing:8px;color:#fff;text-transform:uppercase;}
.lp-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:4px;margin-bottom:36px;margin-top:4px;}
.field-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.4);margin-bottom:6px;margin-top:20px;display:block;}
#myIdDisplay{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);padding:12px 14px;font-family:'Share Tech Mono',monospace;font-size:13px;color:rgba(100,200,255,.9);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:.2s;}
#myIdDisplay:hover{background:rgba(255,255,255,.08);border-color:rgba(100,200,255,.3);}
#peerInput{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;padding:12px 14px;font-family:'Share Tech Mono',monospace;font-size:13px;outline:none;letter-spacing:1px;transition:.2s;}
#peerInput::placeholder{color:rgba(255,255,255,.2);}
#peerInput:focus{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.07);}
#joinBtn{width:100%;margin-top:18px;padding:14px;background:#fff;color:#000;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:5px;border:none;cursor:pointer;text-transform:uppercase;transition:.2s;}
#joinBtn:hover{background:#eee;transform:translateY(-1px);box-shadow:0 4px 20px rgba(255,255,255,.2);}
#conn-status{margin-top:14px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.25);text-align:center;}
#conn-status.ok{color:rgba(80,220,120,.8);}
#conn-status.err{color:rgba(255,100,100,.8);}
.kbd-grid{margin-top:32px;padding-top:24px;border-top:1px solid rgba(255,255,255,.06);display:grid;grid-template-columns:1fr 1fr;gap:10px 24px;}
.kbd-row{display:flex;align-items:center;gap:10px;}
.kbd{font-family:'Share Tech Mono',monospace;font-size:10px;padding:3px 8px;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.55);min-width:36px;text-align:center;background:rgba(255,255,255,.03);}
.kbd-desc{font-size:12px;color:rgba(255,255,255,.3);letter-spacing:.5px;}

#scope{position:fixed;inset:0;pointer-events:none;z-index:95;display:none;}
#scope-overlay{position:absolute;inset:0;background:transparent;}
#scope-circle {
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:90vmin;height:90vmin;border-radius:50%;
    border: 2px solid rgba(255,255,255,0.15);
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.25);
}
#scope-h,#scope-v{position:absolute;background:rgba(0,0,0,0.6);}
#scope-h{width:100%;height:1px;top:50%;left:0;}
#scope-v{width:1px;height:100%;left:50%;top:0;}
#scope-dot {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 4px; height: 4px; background: #ff3333; border-radius: 50%; box-shadow: 0 0 4px #ff0000;
}

#shake-wrap{position:fixed;inset:0;pointer-events:none;z-index:1;}
.shake{animation:shakeAnim .15s ease-out;}
@keyframes shakeAnim{0%,100%{transform:translate(0,0)}25%{transform:translate(-3px,1px)}50%{transform:translate(2px,-2px)}75%{transform:translate(-1px,2px)}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="shake-wrap"><div id="xhair"></div></div>
<div id="hitmarker"><svg viewBox="0 0 32 32"><line x1="8" y1="8" x2="14" y2="14"/><line x1="24" y1="8" x2="18" y2="14"/><line x1="8" y1="24" x2="14" y2="18"/><line x1="24" y1="24" x2="18" y2="18"/></svg></div>
<div id="dmg-vignette"></div>
<div id="low-hp-overlay"></div>
<div id="scope">
    <div id="scope-overlay"></div>
    <div id="scope-circle">
        <div id="scope-h"></div>
        <div id="scope-v"></div>
        <div id="scope-dot"></div>
    </div>
</div>
<div id="death-screen"><div class="ds-title">ELIMINATED</div><div class="ds-sub">RESPAWNING IN</div><div id="death-timer">3</div></div>
<div id="scoreboard"><div class="sb-block you"><div class="sb-name">YOU</div><div class="sb-num" id="myKills">0</div></div><div class="sb-sep">:</div><div class="sb-block them"><div class="sb-name">ENEMY</div><div class="sb-num" id="theirKills">0</div></div></div>
<div id="killfeed"></div>
<div id="hud"><div id="hud-left"><div class="hud-label">Health</div><div id="hp-wrap"><div id="hp-bar"><div id="hp-inner" style="width:100%"></div></div><div id="hp-num">100</div></div></div><div id="ammo-block"><div class="hud-label">Ammo</div><div id="ammo-cur">30</div><div id="ammo-max">/ 30</div><div id="reload-track"><div id="reload-inner"></div></div></div></div>
<div id="lobby"><div id="lp"><div class="lp-title">CYBER STRIKE</div><div class="lp-sub">P2P 1v1 TACTICAL FPS</div><span class="field-label">YOUR ID <span style="color:rgba(255,255,255,.15)">(click to copy)</span></span><div id="myIdDisplay"><span id="myIdTxt">Initialising...</span><span class="copy-tag">COPY</span></div><span class="field-label">CONNECT TO PEER</span><input id="peerInput" placeholder="Paste enemy peer ID..." /><button id="joinBtn" onclick="connect()">ENTER BATTLE</button><div id="conn-status">Waiting for connection...</div><div class="kbd-grid"><div class="kbd-row"><div class="kbd">WASD</div><div class="kbd-desc">Move</div></div><div class="kbd-row"><div class="kbd">LMB</div><div class="kbd-desc">Shoot</div></div><div class="kbd-row"><div class="kbd">SPACE</div><div class="kbd-desc">Jump</div></div><div class="kbd-row"><div class="kbd">F</div><div class="kbd-desc">Scope</div></div><div class="kbd-row"><div class="kbd">R</div><div class="kbd-desc">Reload</div></div><div class="kbd-row"><div class="kbd">SHIFT</div><div class="kbd-desc">Sprint</div></div></div></div></div>

<script>
// AUDIO SETUP
const gunshotURL = "https://cdn.uppbeat.io/audio-files/57ef60eab5fd4218838423222dc07d99/885423a5362603bff168c72b32944a5b/50b63c3bd4b508cee5649d825e4595bf/STREAMING-desert-eagle-gunshot-fascinatedsound-3-3-00-01.mp3";
const reloadURL = "https://cdn.uppbeat.io/audio-files/550fafd5d5403a2f6e11b6feefd0899e/7b5dd4a105fd484c4f38de84d361cebf/410c44a1eea20cf7a5847511f763ee10/STREAMING-futuristic-gun-reload-bosnow-2-2-00-00.mp3";

const audioFiles = [];
for(let i = 0; i < 8; i++) audioFiles.push(new Audio(gunshotURL));
let audioIndex = 0;

function playGunshot() {
    const a = audioFiles[audioIndex];
    a.currentTime = 0; a.volume = 0.4;
    a.play().catch(e => {});
    audioIndex = (audioIndex + 1) % audioFiles.length;
}

function playReloadSound() {
    const a = new Audio(reloadURL);
    a.volume = 0.5;
    a.play().catch(e => {});
}

try {
    const canvas = document.getElementById("c");
    const engine = new BABYLON.Engine(canvas, true, {antialias:true, stencil:true});
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0.02,0.03,0.05,1);
    scene.collisionsEnabled = true;

    // CAMERA
    const CAM_HEIGHT = 1.7;
    const camera = new BABYLON.UniversalCamera("cam", new BABYLON.Vector3(0, CAM_HEIGHT, 0), scene);
    camera.minZ = 0.05; camera.maxZ = 500;
    camera.inertia = 0; camera.angularSensibility = 500;
    camera.checkCollisions = true;
    camera.ellipsoid = new BABYLON.Vector3(0.4, CAM_HEIGHT * 0.5, 0.4);
    camera.keysUp = camera.keysDown = camera.keysLeft = camera.keysRight = [];
    camera.applyGravity = false;
    camera.attachControl(canvas, true);

    // LIGHT
    const dirLight = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-0.5,-1,-0.3), scene);
    dirLight.intensity = 1.2;
    const amb = new BABYLON.HemisphericLight("amb", new BABYLON.Vector3(0,1,0), scene);
    amb.intensity = 0.7;
    amb.groundColor = new BABYLON.Color3(0.1,0.12,0.18);
    amb.specular = new BABYLON.Color3(0.2,0.2,0.2);
    
    scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
    scene.fogDensity = 0.005;
    scene.fogColor = new BABYLON.Color3(0.02,0.03,0.05);

    // MATERIALS
    function createMat(seed) {
        const m = new BABYLON.StandardMaterial("m"+seed, scene);
        m.diffuseTexture = new BABYLON.Texture(`https://picsum.photos/seed/${seed}/512/512`, scene);
        m.specularColor = new BABYLON.Color3(0.15,0.15,0.15);
        return m;
    }
    function mat(hex, e=0){
        const m = new BABYLON.StandardMaterial("m"+hex, scene);
        m.diffuseColor = BABYLON.Color3.FromHexString(hex);
        m.emissiveColor = new BABYLON.Color3(e,e,e);
        m.specularColor = new BABYLON.Color3(0.2,0.2,0.2);
        return m;
    }

    // GUN MATERIALS
    const gunMetal = new BABYLON.StandardMaterial("gunMetal", scene);
    gunMetal.diffuseColor = new BABYLON.Color3(0.08, 0.08, 0.09);
    gunMetal.specularColor = new BABYLON.Color3(0.9, 0.9, 0.9);
    gunMetal.specularPower = 64;

    const gunMetalDark = new BABYLON.StandardMaterial("gunMetalDark", scene);
    gunMetalDark.diffuseColor = new BABYLON.Color3(0.03, 0.03, 0.04);
    gunMetalDark.specularColor = new BABYLON.Color3(0.4, 0.4, 0.4);
    
    const gunPlastic = new BABYLON.StandardMaterial("gunPlastic", scene);
    gunPlastic.diffuseColor = new BABYLON.Color3(0.1, 0.1, 0.12);
    gunPlastic.specularColor = new BABYLON.Color3(0.2, 0.2, 0.2);
    gunPlastic.specularPower = 8;

    const gunHighlight = new BABYLON.StandardMaterial("gunHighlight", scene);
    gunHighlight.diffuseColor = new BABYLON.Color3(0.05, 0.1, 0.12);
    gunHighlight.emissiveColor = new BABYLON.Color3(0, 0.2, 0.3);

    const groundMat = createMat("ground");
    const wallMat = createMat("wall");
    const towerMat = createMat("tower");
    const neonCyan = mat("#001525", 0.1); neonCyan.emissiveColor = new BABYLON.Color3(0,0.5,0.7);
    const neonRed = mat("#250008", 0.1); neonRed.emissiveColor = new BABYLON.Color3(0.6,0.08,0.1);
    const woodMat = mat("#4a3020"); const metalMat = mat("#2a2a2a");

    // MAP
    const allCollidables = [];
    const ground = BABYLON.MeshBuilder.CreateGround("gnd", {width:250,height:250}, scene);
    ground.material = groundMat; ground.checkCollisions = true; ground.isWall = true; allCollidables.push(ground);

    const gridM = BABYLON.MeshBuilder.CreateGround("grd", {width:250,height:250,subdivisions:60}, scene);
    const gMat = new BABYLON.StandardMaterial("gMat", scene); gMat.wireframe = true;
    gMat.emissiveColor = new BABYLON.Color3(0,0.04,0.08); gMat.alpha = 0.2;
    gridM.material = gMat; gridM.position.y = 0.02;

    function box(w,h,d, x,y,z, m, collidable=true){
        const b = BABYLON.MeshBuilder.CreateBox("b", {width:w,height:h,depth:d}, scene);
        b.position.set(x,y+h/2,z); b.material = m;
        if(collidable) { b.checkCollisions = true; b.isWall = true; allCollidables.push(b); }
        return b;
    }

    const WS = 110;
    box(250,12,2, 0,0,-WS, wallMat); box(250,12,2, 0,0,WS, wallMat);
    box(2,12,250, -WS,0,0, wallMat); box(2,12,250, WS,0,0, wallMat);

    const towerPositions = [[-65, -65], [65, -65], [-65, 65], [65, 65]];
    towerPositions.forEach(([tx, tz]) => {
        box(12,16,12, tx,0,tz, towerMat);
        box(14,0.6,14, tx,16,tz, towerMat);
        box(14,1.2,0.3, tx,17.3,tz-7, metalMat); box(14,1.2,0.3, tx,17.3,tz+7, metalMat);
        box(0.3,1.2,14, tx-7,17.3,tz, metalMat); box(0.3,1.2,14, tx+7,17.3,tz, metalMat);
    });

    const centreMat = mat("#0c1015");
    box(40,2.5,6, 0,0,0, centreMat); box(6,2.5,40, 0,0,0, centreMat); box(8,6,8, 0,0,0, centreMat);
    box(15,3,15, 0,2.5,0, centreMat);
    
    const createRamp = (x,z,rot) => {
        const ramp = BABYLON.MeshBuilder.CreateBox("r", {width:6, height:0.2, depth:12}, scene);
        ramp.position.set(x,1.25,z); ramp.rotation.x = rot * 0.22;
        ramp.material = centreMat;
        ramp.checkCollisions = true; ramp.isWall = true; allCollidables.push(ramp);
    };
    createRamp(0,14,1); createRamp(0,-14,-1); createRamp(14,0,1); createRamp(-14,0,-1);

    box(30,0.5,4, 0,7,-50, centreMat); box(30,0.5,4, 0,7,50, centreMat);
    box(4,0.5,30, -50,7,0, centreMat); box(4,0.5,30, 50,7,0, centreMat);
    
    towerPositions.forEach(([tx, tz]) => box(14,0.1,14, tx,16.6,tz, neonRed, false));

    // PARTICLES
    const smokeTex = new BABYLON.DynamicTexture("st", 64, scene);
    const sCtx = smokeTex.getContext();
    const grad = sCtx.createRadialGradient(32,32,0,32,32,32);
    grad.addColorStop(0,"rgba(255,255,255,0.8)"); grad.addColorStop(1,"rgba(0,0,0,0)");
    sCtx.fillStyle = grad; sCtx.fillRect(0,0,64,64); smokeTex.update();

    class Pool {
        constructor(fn, n) { this.fn=fn; this.pool=[]; this.active=[]; for(let i=0;i<n;i++){ const o=fn(); o.isVisible=false; this.pool.push(o); } }
        get() { let o = this.pool.pop() || this.fn(); o.isVisible=true; this.active.push(o); return o; }
        release(o) { o.isVisible=false; const i=this.active.indexOf(o); if(i!==-1)this.active.splice(i,1); this.pool.push(o); }
        loop(fn) { for(let i=this.active.length-1; i>=0; i--) { if(fn(this.active[i])) this.release(this.active[i]); } }
    }
    const v3 = () => new BABYLON.Vector3();
    
    const bulletPool = new Pool(() => { 
        const m = BABYLON.MeshBuilder.CreateSphere("b",{diameter:0.08,segments:4},scene); 
        m.material = new BABYLON.StandardMaterial("bm",scene); 
        m.material.emissiveColor=new BABYLON.Color3(1,0.85,0.4); m.material.disableLighting=true; 
        m.velocity=v3(); m.startPos=v3(); return m; 
    }, 50);

    const sparkPool = new Pool(() => { 
        const m = BABYLON.MeshBuilder.CreateSphere("s",{diameter:0.03,segments:3},scene); 
        m.material = new BABYLON.StandardMaterial("sm",scene); 
        m.material.emissiveColor=new BABYLON.Color3(1,0.5,0.1); m.material.disableLighting=true; 
        m.velocity=v3(); return m; 
    }, 60);

    const smokePool = new Pool(() => { 
        const m = BABYLON.MeshBuilder.CreatePlane("sm",{size:0.5},scene); 
        m.material = new BABYLON.StandardMaterial("smm",scene); 
        m.material.diffuseTexture=smokeTex; m.material.emissiveTexture=smokeTex; 
        m.material.opacityTexture=smokeTex; m.material.backFaceCulling=false; m.material.disableLighting=true; 
        m.billboardMode=BABYLON.Mesh.BILLBOARDMODE_ALL; m.velocity=v3(); return m; 
    }, 40);

    // WEAPON MODEL
    let gunRoot = null, gunGrip = null, gunMuzzle = null, flash = null;
    let rZ=0, rX=0;
    
    function buildWeapon() {
        gunRoot = new BABYLON.TransformNode("gr", scene);
        gunRoot.parent = camera;
        gunRoot.position = new BABYLON.Vector3(0.3, -0.32, 0.6);
        gunRoot.rotation = new BABYLON.Vector3(0, Math.PI, 0);
        
        gunGrip = new BABYLON.TransformNode("gg", scene);
        gunGrip.parent = gunRoot;
        
        const add = (name, size, pos, rot, mat) => {
            const m = BABYLON.MeshBuilder.CreateBox(name, {width: size.x, height: size.y, depth: size.z}, scene);
            m.parent = gunGrip; m.position = pos; m.rotation = rot || BABYLON.Vector3.Zero();
            m.material = mat || gunMetal; return m;
        };
        const addCyl = (name, size, pos, rot, mat) => {
            const m = BABYLON.MeshBuilder.CreateCylinder(name, {height: size.h, diameter: size.d, tessellation: 16}, scene);
            m.parent = gunGrip; m.position = pos; 
            m.rotation = rot || BABYLON.Vector3.Zero();
            m.material = mat || gunMetal; return m;
        };

        // 1. Main Receiver
        add("rec", {x:0.09, y:0.16, z:0.55}, new BABYLON.Vector3(0,0.05,0.05), null, gunMetal);
        add("slide", {x:0.085, y:0.08, z:0.4}, new BABYLON.Vector3(0,0.14,0.08), null, gunMetalDark);
        for(let i=0; i<5; i++) add("ser", {x:0.09, y:0.01, z:0.015}, new BABYLON.Vector3(0,0.11,-0.05 + i*0.025), null, gunMetal);
        
        // 2. Barrel
        addCyl("barrelOuter", {h:0.4, d:0.1}, new BABYLON.Vector3(0,0.1,0.35), new BABYLON.Vector3(Math.PI/2,0,0), gunMetalDark);
        addCyl("barrelInner", {h:0.42, d:0.05}, new BABYLON.Vector3(0,0.1,0.35), new BABYLON.Vector3(Math.PI/2,0,0), gunMetal);
        
        // 3. Grip Handle
        add("gripMain", {x:0.07, y:0.18, z:0.09}, new BABYLON.Vector3(0,-0.06,-0.08), new BABYLON.Vector3(0.25,0,0), gunPlastic);
        for(let i=0; i<4; i++) add("gt", {x:0.072, y:0.015, z:0.08}, new BABYLON.Vector3(0,-0.02-i*0.04,-0.08 + i*0.015), new BABYLON.Vector3(0.25,0,0), gunPlastic);
        
        add("guard", {x:0.04, y:0.02, z:0.12}, new BABYLON.Vector3(0,-0.08,0.02), null, gunMetal);
        add("guardFront", {x:0.04, y:0.06, z:0.02}, new BABYLON.Vector3(0,-0.05,0.08), null, gunMetal);
        add("mag", {x:0.06, y:0.16, z:0.08}, new BABYLON.Vector3(0,-0.1,-0.06), new BABYLON.Vector3(-0.15,0,0), gunMetal);
        
        // 4. Sights
        add("fs", {x:0.01, y:0.04, z:0.02}, new BABYLON.Vector3(0,0.2,0.25), null, gunMetalDark);
        add("rs", {x:0.06, y:0.03, z:0.02}, new BABYLON.Vector3(0,0.16,-0.1), null, gunMetalDark);
        add("rsL", {x:0.01, y:0.04, z:0.015}, new BABYLON.Vector3(-0.025,0.175,-0.1), null, gunMetalDark);
        add("rsR", {x:0.01, y:0.04, z:0.015}, new BABYLON.Vector3(0.025,0.175,-0.1), null, gunMetalDark);
        
        // 5. Accents
        add("acc1", {x:0.015, y:0.015, z:0.2}, new BABYLON.Vector3(0.045,0.05,0.05), null, gunHighlight);
        add("acc2", {x:0.015, y:0.015, z:0.2}, new BABYLON.Vector3(-0.045,0.05,0.05), null, gunHighlight);

        gunMuzzle = new BABYLON.TransformNode("gm", scene);
        gunMuzzle.parent = gunGrip;
        gunMuzzle.position = new BABYLON.Vector3(0,0.1,0.55);
        
        flash = BABYLON.MeshBuilder.CreatePlane("f",{size:0.3}, scene);
        flash.parent = gunMuzzle; flash.position.z = 0.1;
        flash.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
        const fM = new BABYLON.StandardMaterial("fm",scene);
        fM.emissiveColor = new BABYLON.Color3(1, 0.8, 0.4);
        fM.disableLighting = true; fM.backFaceCulling = false; fM.alpha = 0.9;
        flash.material = fM; flash.isVisible = false;
    }

    function animateGun() {
        if(!gunGrip) return;
        rZ *= 0.88; rX *= 0.88;
        gunGrip.position.z = rZ; gunGrip.rotation.x = rX;
    }
    function recoil() { rZ = -0.05; rX = -0.03; }

    // STATE
    let myHP=100, kills=0, eKills=0, alive=true, ammo=30, reloading=false, scoped=false;
    const SPAWN_A = [new BABYLON.Vector3(0,CAM_HEIGHT,60), new BABYLON.Vector3(25,CAM_HEIGHT,65)];
    const SPAWN_B = [new BABYLON.Vector3(0,CAM_HEIGHT,-60), new BABYLON.Vector3(25,CAM_HEIGHT,-65)];
    let mySpawn = SPAWN_A;
    const DMG = {head: 40, body: 18, legs: 12, scoped: 1.6};

    // PHYSICS
    let velY=0, grounded=false;
    const grav = -30, jumpSpd = 11;
    const hVel = new BABYLON.Vector3();
    const _v = new BABYLON.Vector3(), _r = new BABYLON.Vector3(), _u = BABYLON.Vector3.Up();

    // ENEMY - PIXEL PERFECT (MESH BASED)
    // We no longer use separate hitboxes. We use the visual meshes.
    let eNode = null, eMuzzle = null, eBodyParts = [], eHPBar = null, eHPF = null, eHP = 100, eVis = true, eTP = new BABYLON.Vector3(), eTR = 0;
    
    function buildEnemy() {
        if(eNode) { eNode.getChildMeshes().forEach(m=>m.dispose()); eNode.dispose(); }
        eNode = new BABYLON.TransformNode("er", scene);
        eBodyParts = []; // Reset body parts array

        const eM = mat("#681818", 0.08); eM.emissiveColor = new BABYLON.Color3(0.1,0.02,0.02);
        
        // Helper to create visual meshes that are ALSO pickable
        const addV = (n, s, p, type) => { 
            const m = BABYLON.MeshBuilder.CreateBox(n, s, scene); 
            m.parent = eNode; m.position = p; m.material = eM; 
            m.isPickable = true; 
            m.hitType = type; // Tag the mesh with its type
            eBodyParts.push(m); // Add to collision array
            return m;
        };

        // LEGS
        addV("l1", {width:0.25,height:0.65,depth:0.25}, new BABYLON.Vector3(-0.15,0.32,0), "legs");
        addV("l2", {width:0.25,height:0.65,depth:0.25}, new BABYLON.Vector3(0.15,0.32,0), "legs");
        
        // TORSO
        addV("t", {width:0.6,height:0.8,depth:0.35}, new BABYLON.Vector3(0,1.12,0), "body");
        
        // ARMS
        addV("a1", {width:0.2,height:0.6,depth:0.2}, new BABYLON.Vector3(-0.48,1.1,0), "body");
        addV("a2", {width:0.2,height:0.6,depth:0.2}, new BABYLON.Vector3(0.48,1.1,0), "body");
        
        // HEAD (Sphere for precise headshots)
        const hd = BABYLON.MeshBuilder.CreateSphere("hd", {diameter:0.5, segments:12}, scene);
        hd.parent = eNode; hd.position.y = 1.82; hd.material = eM;
        hd.isPickable = true; hd.hitType = "head";
        eBodyParts.push(hd);

        // Eyes
        const eye = mat("#000000", 1); eye.emissiveColor = new BABYLON.Color3(1,0.1,0.05);
        const e1 = BABYLON.MeshBuilder.CreateSphere("e1", {diameter:0.08,segments:4}, scene);
        e1.parent = eNode; e1.position.set(-0.1,1.84,0.24); e1.material = eye;
        const e2 = BABYLON.MeshBuilder.CreateSphere("e2", {diameter:0.08,segments:4}, scene);
        e2.parent = eNode; e2.position.set(0.1,1.84,0.24); e2.material = eye;
        
        // Gun
        const gn = new BABYLON.TransformNode("eg", scene); gn.parent = eNode; gn.position = new BABYLON.Vector3(0.5,1.1,0.25);
        const gb = BABYLON.MeshBuilder.CreateBox("egb", {width:0.06,height:0.06,depth:0.5}, scene);
        gb.parent = gn; gb.position.z = 0.08; gb.material = metalMat;
        eMuzzle = new BABYLON.TransformNode("em", scene); eMuzzle.parent = gn; eMuzzle.position.z = 0.35;
        
        eNode.position.set(0,0,0); eTP.copyFrom(eNode.position); eVis = true;
        eNode.flashHit = () => { eM.emissiveColor = new BABYLON.Color3(1,1,1); setTimeout(()=>eM.emissiveColor=new BABYLON.Color3(0.1,0.02,0.02), 50); };
    }

    function eVisFn(v) { if(!eNode) return; eNode.getChildMeshes().forEach(m=>m.isVisible=v); if(eHPBar)eHPBar.isVisible=v; eVis=v; }
    
    function buildEHP() {
        if(eHPBar) eHPBar.dispose();
        eHPBar = BABYLON.MeshBuilder.CreatePlane("ehp", {width:1.6,height:0.2}, scene);
        eHPBar.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL; eHPBar.isPickable = false;
        const adt = BABYLON.GUI.AdvancedDynamicTexture.CreateForMesh(eHPBar, 256, 32);
        const bg = new BABYLON.GUI.Rectangle(); bg.width="100%"; bg.height="100%"; bg.background="rgba(0,0,0,0.75)"; bg.thickness=0; adt.addControl(bg);
        const fl = new BABYLON.GUI.Rectangle(); fl.width="100%"; fl.height="75%"; fl.background="#cc2222"; fl.thickness=0; fl.horizontalAlignment=BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT; bg.addControl(fl);
        eHPF = fl;
    }

    // INPUT
    const K={}; let mL=false, host=false;
    window.addEventListener("keydown", e => { K[e.code]=true; if(e.code==="KeyR" && !reloading && ammo<30 && alive) reload(); if(e.code==="KeyF" && alive) toggleScope(); });
    window.addEventListener("keyup", e => K[e.code]=false);
    document.addEventListener("pointerlockchange", () => mL = (document.pointerLockElement===canvas));
    canvas.addEventListener("click", () => { if(document.getElementById("lobby").style.display==="none") canvas.requestPointerLock(); });
    canvas.addEventListener("contextmenu", e => e.preventDefault());
    window.addEventListener("mousedown", e => { if(e.button===0) shoot(); });

    function toggleScope() {
        if(!alive) return;
        scoped = !scoped;
        document.getElementById("scope").style.display = scoped ? "block" : "none";
        camera.fov = scoped ? 0.35 : 0.85;
        document.getElementById("xhair").style.display = scoped ? "none" : "block";
        if(gunRoot) gunRoot.isVisible = !scoped;
    }

    // SHOOTING
    const BS = 140;
    function shoot() {
        if(!alive||!mL||reloading||ammo<=0) return;
        ammo--; updAmmo(); recoil(); playGunshot();
        if(flash){flash.isVisible=true; setTimeout(()=>flash.isVisible=false, 40);}
        
        for(let i=0;i<2;i++){ const s=smokePool.get(); s.position=gunMuzzle.getAbsolutePosition().clone(); s.scaling.setAll(0.5); s.life=0.35; s.material.alpha=0.4; s.velocity.set((Math.random()-0.5)*0.8,1.0,(Math.random()-0.5)*0.8); }
        
        const f=camera.getForwardRay().direction; const o=camera.position.clone();
        const b=bulletPool.get(); b.isEnemy=false; b.startPos=o.clone(); b.position=o.add(f.scale(0.8)); b.velocity=f.scale(BS); b.life=2.0; b.hasHit=false; b.distanceTraveled=0;
        if(conn?.open) conn.send({type:"shoot", pos:{x:o.x,y:o.y,z:o.z}, dir:{x:f.x,y:f.y,z:f.z}});
    }

    function sparks(pos, nrm, metal) { 
        for(let i=0;i<(metal?5:3);i++){ const p=sparkPool.get(); p.position=pos.clone(); p.velocity.set((Math.random()-0.5)*0.2+nrm.x*0.1,Math.random()*0.15+0.05,(Math.random()-0.5)*0.2+nrm.z*0.1); p.life=18; p.material.emissiveColor=metal?new BABYLON.Color3(1,0.8,0.3):new BABYLON.Color3(1,0.5,0.2); } 
        for(let i=0;i<1;i++){ const s=smokePool.get(); s.position=pos.clone(); s.scaling.setAll(0.15); s.velocity.set(nrm.x*0.2, 0.4, nrm.z*0.2); s.life=0.4; s.material.alpha=0.3; }
    }
    function blood(pos) { for(let i=0;i<4;i++){ const p=sparkPool.get(); p.position=pos.clone(); p.velocity.set((Math.random()-0.5)*0.2,Math.random()*0.1+0.03,(Math.random()-0.5)*0.2); p.life=20; p.material.emissiveColor=new BABYLON.Color3(0.9,0.1,0.1); } }
    
    function hitReg(pt, type) {
        const xh=document.getElementById("xhair"); xh.classList.remove("hit","headshot","legshot"); xh.classList.add(type==="head"?"headshot":(type==="legs"?"legshot":"hit")); setTimeout(()=>xh.classList.remove("hit","headshot","legshot"),180);
        const hm=document.getElementById("hitmarker"); hm.classList.remove("show","kill","headshot","legshot"); void hm.offsetWidth; hm.classList.add("show"); if(type==="head")hm.classList.add("headshot"); else if(type==="legs")hm.classList.add("legshot");
        kf(type==="head"?"HEADSHOT!":(type==="legs"?"LEG SHOT":"HIT"), type==="head"?"headshot":(type==="legs"?"legshot":"dmg"));
        if(eNode?.flashHit) eNode.flashHit();
    }
    
    function reload() { 
        if(reloading||ammo===30) return; 
        reloading=true; 
        playReloadSound(); // Play the requested sound
        kf("RELOADING...","event"); 
        const t=document.getElementById("reload-track"), f=document.getElementById("reload-inner"); 
        t.style.display="block"; f.style.transition="none"; f.style.width="0%"; 
        requestAnimationFrame(()=>{f.style.transition="width 1.4s linear"; f.style.width="100%";}); 
        setTimeout(()=>{ammo=30; reloading=false; t.style.display="none"; f.style.width="0%"; updAmmo(); kf("RELOADED","event");}, 1400); 
    }

    // LOOP
    let fi=0, lGY=0;
    scene.onBeforeRenderObservable.add(() => {
        const dt = Math.min(engine.getDeltaTime()/1000, 0.05); fi++;
        animateGun();
        
        // Bullet Physics
        bulletPool.loop(b => {
            if(!b||!b.position||b.hasHit) return true;
            const p = b.position.clone(); const mv = b.velocity.scale(dt); b.position.addInPlace(mv); 
            b.life -= dt; b.distanceTraveled += mv.length();
            if(b.life <= 0 || b.distanceTraveled > 260) return true;

            const d=mv.length(); const dir=mv.normalize();
            
            // Wall Check
            const wR = new BABYLON.Ray(p, dir, d + 0.05);
            const wH = scene.pickWithRay(wR, m=>m.isWall && !m.hitType); // Ignore enemy body parts
            if(wH.hit && wH.distance <= d + 0.05){ sparks(wH.pickedPoint, wH.getNormal(), false); b.hasHit=true; return true; }

            // Enemy Check (Mesh Precise)
            // We cast a ray that ONLY checks the eBodyParts meshes.
            if(!b.isEnemy && eNode && eVis && eBodyParts.length > 0){
                const hR = new BABYLON.Ray(p, dir, d);
                const pI = hR.intersectsMeshes(eBodyParts, false);
                
                if(pI.length > 0 && pI[0].distance <= d){ 
                    const hitMesh = pI[0].pickedMesh;
                    const t = hitMesh.hitType; // Get type from mesh itself (head, body, legs)
                    let dm = DMG[t] || DMG.body; 
                    if(scoped) dm = Math.floor(dm * DMG.scoped);
                    
                    hitReg(pI[0].pickedPoint, t); 
                    blood(pI[0].pickedPoint);
                    
                    if(conn?.open) conn.send({type:"hit", amount:dm, headshot:t==="head", legshot:t==="legs"});
                    b.hasHit=true; 
                    return true;
                }
            }
            
            // Self Check
            if(b.isEnemy && alive){
                const dist = BABYLON.Vector3.Distance(b.position, camera.position);
                if(dist < 0.5){ 
                    const rY=b.position.y-camera.position.y+CAM_HEIGHT; let t="body"; if(rY>1.6)t="head"; else if(rY<0.9)t="legs";
                    takeDmg(DMG[t]); blood(b.position); b.hasHit=true; return true;
                }
            }
            return false;
        });

        smokePool.loop(s => {
            if(!s||!s.position) return true;
            s.position.addInPlace(s.velocity.scale(dt)); s.velocity.y+=0.6*dt; s.velocity.scaleInPlace(0.97); s.life-=dt;
            const sc=1+((0.5-s.life)*0.03); s.scaling.setAll(sc); s.material.alpha=Math.min(0.5,s.life/0.35);
            return s.life<=0;
        });

        if(!alive) return;

        const spd = K["ShiftLeft"] ? 0.22 : 0.14;
        const cF = camera.getForwardRay().direction; cF.y=0; cF.normalize();
        BABYLON.Vector3.CrossToRef(_u, cF, _r); _r.normalize();
        _v.setAll(0); if(K["KeyW"])_v.addInPlace(cF); if(K["KeyS"])_v.subtractInPlace(cF); if(K["KeyA"])_v.subtractInPlace(_r); if(K["KeyD"])_v.addInPlace(_r);
        if(_v.length()>0) _v.normalize().scaleInPlace(spd);
        BABYLON.Vector3.LerpToRef(hVel, _v, 0.14, hVel);

        const gR = new BABYLON.Ray(camera.position, BABYLON.Vector3.Down(), CAM_HEIGHT+0.4);
        const gH = scene.pickWithRay(gR, m=>m.checkCollisions);
        grounded = gH.hit && gH.distance <= CAM_HEIGHT+0.15;
        if(grounded && gH.hit) lGY = gH.pickedPoint.y;
        if(K["Space"] && grounded){ velY=jumpSpd; grounded=false; }
        if(!grounded) velY+=grav*dt; else if(velY<0) velY=0;
        
        const fM = hVel.clone(); fM.y=velY*dt;
        camera.cameraDirection.copyFrom(fM);
        
        const mY = (grounded?lGY:0)+CAM_HEIGHT;
        if(camera.position.y < mY){ camera.position.y=mY; if(velY<0)velY=0; grounded=true; }

        if(eNode && eVis){ eNode.position=BABYLON.Vector3.Lerp(eNode.position, eTP, 0.2); eNode.rotation.y=eTR; if(eHPBar){ eHPBar.position=eNode.position.clone(); eHPBar.position.y+=2.6; } }
        
        if(conn?.open && fi%2===0) conn.send({type:"pos", x:camera.position.x, y:camera.position.y-CAM_HEIGHT, z:camera.position.z, ry:camera.rotation.y, hp:myHP});
    });

    engine.runRenderLoop(() => scene.render());
    window.addEventListener("resize", () => engine.resize());

    // NET
    const peer = new Peer(undefined, {config:{iceServers:[{urls:"stun:stun.l.google.com:19302"}]}});
    let conn=null;
    peer.on('open', id => { document.getElementById("myIdTxt").innerText=id; document.getElementById("conn-status").innerText="Ready"; });
    peer.on('error', e => setStatus("Err","err"));
    peer.on('connection', c => { conn=c; host=true; setup(); });
    window.connect = () => { const id=document.getElementById("peerInput").value.trim(); if(!id) return; setStatus("Connecting...",""); conn=peer.connect(id); host=false; setup(); };
    function setup() {
        conn.on('open', () => { setStatus("OK","ok"); setTimeout(()=>{
            document.getElementById("lobby").style.display="none"; canvas.requestPointerLock();
            buildWeapon(); buildEnemy(); buildEHP();
            mySpawn = host?SPAWN_A:SPAWN_B; camera.position=mySpawn[Math.floor(Math.random()*mySpawn.length)].clone();
            velY=0; myHP=100; ammo=30; alive=true; hVel.setAll(0); updHP(); updAmmo();
        }, 500); });
        conn.on('data', d => {
            if(d.type==="pos"){ if(!eNode) return; eTP.set(d.x,d.y,d.z); eTR=d.ry; if(eHPF&&d.hp!=null){ eHP=d.hp; eHPF.width=Math.max(0,d.hp)+"%"; } if(!eVis)eVisFn(true); }
            else if(d.type==="shoot"){ if(eMuzzle){ const mp=eMuzzle.getAbsolutePosition(); const b=bulletPool.get(); b.isEnemy=true; b.position=mp.clone(); b.velocity=new BABYLON.Vector3(d.dir.x,d.dir.y,d.dir.z).normalize().scale(BS*0.92); b.life=2.0; b.hasHit=false; b.distanceTraveled=0; } }
            else if(d.type==="hit"){ takeDmg(d.amount); if(d.headshot)kf("HEADSHOT ON YOU!","headshot"); else if(d.legshot)kf("LEG SHOT ON YOU!","legshot"); }
            else if(d.type==="died"){ kills++; updKills(); kf("ENEMY ELIMINATED","kill"); const hm=document.getElementById("hitmarker"); hm.classList.remove("show","kill"); void hm.offsetWidth; hm.classList.add("show","kill"); screenShake(); eVisFn(false); setTimeout(()=>eVisFn(true),3500); }
        });
        conn.on('close', () => { kf("DC","event"); eVisFn(false); });
    }

    // LOGIC
    function takeDmg(a){ if(!alive)return; myHP=Math.max(0,myHP-a); updHP(); document.getElementById("dmg-vignette").classList.add("show"); setTimeout(()=>document.getElementById("dmg-vignette").classList.remove("show"),180); screenShake(); document.getElementById("low-hp-overlay").classList.toggle("pulse", myHP<=30); if(myHP<=0)die(); }
    function die(){ if(!alive)return; alive=false; if(scoped)toggleScope(); eKills++; updKills(); if(conn?.open)conn.send({type:"died"}); kf("YOU DIED","dmg"); eVisFn(false); const ds=document.getElementById("death-screen"); ds.classList.add("show"); let t=3; document.getElementById("death-timer").innerText=t; const iv=setInterval(()=>{ t--; document.getElementById("death-timer").innerText=t; if(t<=0){clearInterval(iv);respawn();} },1000); }
    function respawn(){ myHP=100; ammo=30; alive=true; reloading=false; velY=0; hVel.setAll(0); updHP(); updAmmo(); document.getElementById("low-hp-overlay").classList.remove("pulse"); document.getElementById("death-screen").classList.remove("show"); camera.position=mySpawn[Math.floor(Math.random()*mySpawn.length)].clone(); setTimeout(()=>eVisFn(true),500); }
    
    // UI
    function updHP(){ const p=Math.max(0,myHP); document.getElementById("hp-inner").style.width=p+"%"; document.getElementById("hp-inner").style.background=p>60?"linear-gradient(90deg,#3cba5a,#4de884)":p>30?"linear-gradient(90deg,#d4842a,#f0a030)":"linear-gradient(90deg,#e8413c,#ff5555)"; document.getElementById("hp-num").innerText=p; }
    function updAmmo(){ const c=document.getElementById("ammo-cur"); c.innerText=ammo; c.classList.toggle("ammo-low", ammo<=5 && !reloading); }
    function updKills(){ document.getElementById("myKills").innerText=kills; document.getElementById("theirKills").innerText=eKills; }
    function setStatus(m,c){ const e=document.getElementById("conn-status"); e.innerText=m; e.className=c; }
    function screenShake(){ const w=document.getElementById("shake-wrap"); w.classList.remove("shake"); void w.offsetWidth; w.classList.add("shake"); }
    function kf(m,t=""){ const f=document.getElementById("killfeed"); const d=document.createElement("div"); d.className="kf "+t; d.innerText=m; f.prepend(d); while(f.children.length>8)f.lastChild.remove(); setTimeout(()=>{d.style.opacity="0";d.style.transform="translateX(20px)"; setTimeout(()=>d.remove(),400);},3000); }
    document.getElementById("myIdDisplay").addEventListener("click", () => { const t=document.getElementById("myIdTxt").innerText; if(t&&t!=="Initialising..."){navigator.clipboard.writeText(t); kf("ID COPIED","event");} });

} catch(e) { console.error(e); alert("Error: "+e.message); }
</script>
