<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<title>CYBER STRIKE</title>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;}
#c{display:block;width:100vw;height:100vh;outline:none;cursor:none;}

/* CROSSHAIR */
#xhair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:100;width:20px;height:20px;}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,.9);}
#xhair::before{width:2px;height:10px;top:5px;left:9px;}
#xhair::after{width:10px;height:2px;top:9px;left:5px;}
.xh-gap{position:absolute;inset:0;background:transparent;}
#xhair.hit::before,#xhair.hit::after{background:#f33;box-shadow:0 0 6px #f33;}

/* HUD */
#hud{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-end;padding:0 32px 24px;pointer-events:none;z-index:100;}
#hud-left{display:flex;flex-direction:column;gap:4px;}
.hud-label{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:4px;color:rgba(255,255,255,.35);text-transform:uppercase;}
#hp-wrap{display:flex;align-items:center;gap:10px;}
#hp-bar{width:160px;height:4px;background:rgba(255,255,255,.08);position:relative;}
#hp-inner{height:100%;background:#e8413c;transition:width .1s;}
#hp-num{font-family:'Share Tech Mono',monospace;font-size:28px;color:#fff;line-height:1;}

#ammo-block{text-align:right;}
#ammo-cur{font-family:'Share Tech Mono',monospace;font-size:42px;color:#fff;line-height:1;}
#ammo-max{font-family:'Share Tech Mono',monospace;font-size:14px;color:rgba(255,255,255,.3);}
#reload-track{width:60px;height:2px;background:rgba(255,255,255,.1);margin-left:auto;margin-top:5px;display:none;}
#reload-inner{height:100%;background:#fff;width:0;transition:width linear;}

/* KILLFEED */
#killfeed{position:fixed;top:70px;right:20px;display:flex;flex-direction:column;gap:4px;align-items:flex-end;pointer-events:none;z-index:100;}
.kf{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;padding:3px 10px 3px 14px;background:rgba(0,0,0,.55);color:#fff;letter-spacing:.5px;border-right:2px solid rgba(255,255,255,.3);}
.kf.dmg{border-color:#e8413c;color:#ff9090;}
.kf.event{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.5);}

/* SCOREBOARD */
#scoreboard{position:fixed;top:0;left:50%;transform:translateX(-50%);display:flex;z-index:100;pointer-events:none;}
.sb-block{padding:6px 28px;text-align:center;background:rgba(0,0,0,.6);}
.sb-block .sb-name{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.3);text-transform:uppercase;}
.sb-block .sb-num{font-family:'Share Tech Mono',monospace;font-size:22px;color:#fff;}
.sb-sep{padding:6px 6px;background:rgba(0,0,0,.6);display:flex;align-items:center;color:rgba(255,255,255,.15);font-size:10px;}
.sb-block.you{border-bottom:2px solid #4af;}
.sb-block.them{border-bottom:2px solid #e84;}

/* DAMAGE FLASH */
#dmg-vignette{position:fixed;inset:0;pointer-events:none;z-index:99;opacity:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(220,0,0,.55) 100%);transition:opacity .06s;}
#dmg-vignette.show{opacity:1;}

/* LOW HP PULSE */
@keyframes lowHPPulse{0%,100%{opacity:0}50%{opacity:.3}}
#low-hp-overlay{position:fixed;inset:0;pointer-events:none;z-index:98;background:rgba(220,0,0,1);opacity:0;display:none;}
#low-hp-overlay.pulse{display:block;animation:lowHPPulse 1s infinite;}

/* DEATH SCREEN */
#death-screen{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.82);}
#death-screen.show{display:flex;}
#death-screen .ds-title{font-size:64px;font-weight:700;letter-spacing:6px;color:#e8413c;text-shadow:0 0 60px rgba(232,65,60,.3);}
#death-screen .ds-sub{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:4px;color:rgba(255,255,255,.3);margin-top:6px;}
#death-timer{font-family:'Share Tech Mono',monospace;font-size:52px;color:#fff;margin-top:16px;}

/* LOBBY */
#lobby{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.94);}
#lp{width:380px;background:rgba(8,14,22,1);border:1px solid rgba(255,255,255,.07);padding:36px;position:relative;overflow:hidden;}
#lp::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);}
.lp-title{font-size:30px;font-weight:700;letter-spacing:6px;color:#fff;text-transform:uppercase;}
.lp-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,.2);letter-spacing:3px;margin-bottom:32px;margin-top:2px;}
.field-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.3);margin-bottom:5px;margin-top:16px;display:block;}
#myIdDisplay{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);padding:10px 12px;font-family:'Share Tech Mono',monospace;font-size:12px;color:rgba(100,200,255,.8);cursor:pointer;display:flex;justify-content:space-between;align-items:center;letter-spacing:1px;transition:.15s;}
#myIdDisplay:hover{background:rgba(255,255,255,.07);}
#myIdDisplay .copy-tag{font-size:9px;color:rgba(255,255,255,.2);letter-spacing:1px;}
#peerInput{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#fff;padding:10px 12px;font-family:'Share Tech Mono',monospace;font-size:12px;outline:none;letter-spacing:1px;transition:.15s;}
#peerInput::placeholder{color:rgba(255,255,255,.18);}
#peerInput:focus{border-color:rgba(255,255,255,.2);}
#joinBtn{width:100%;margin-top:14px;padding:13px;background:#fff;color:#000;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:4px;border:none;cursor:pointer;text-transform:uppercase;transition:.15s;}
#joinBtn:hover{background:#ddd;}
#conn-status{margin-top:12px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.2);text-align:center;}
#conn-status.ok{color:rgba(80,220,80,.7);}
.kbd-grid{margin-top:28px;padding-top:20px;border-top:1px solid rgba(255,255,255,.05);display:grid;grid-template-columns:1fr 1fr;gap:7px 20px;}
.kbd-row{display:flex;align-items:center;gap:8px;}
.kbd{font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 7px;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);min-width:30px;text-align:center;}
.kbd-desc{font-size:11px;color:rgba(255,255,255,.25);letter-spacing:.5px;}

/* SNIPER SCOPE */
#scope{position:fixed;inset:0;pointer-events:none;z-index:95;display:none;}
#scope-overlay{position:absolute;inset:0;background:rgba(0,0,0,.75);}
#scope-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:260px;height:260px;border-radius:50%;background:transparent;box-shadow:0 0 0 9999px rgba(0,0,0,.75);border:2px solid rgba(255,255,255,.2);}
#scope-h,#scope-v{position:absolute;background:rgba(255,255,255,.25);}
#scope-h{width:100%;height:1px;top:50%;left:0;}
#scope-v{width:1px;height:100%;left:50%;top:0;}
.scope-tick{position:absolute;background:rgba(255,255,255,.25);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="xhair"></div>
<div id="dmg-vignette"></div>
<div id="low-hp-overlay"></div>

<div id="scope">
  <div id="scope-overlay"></div>
  <div id="scope-circle">
    <div id="scope-h"></div>
    <div id="scope-v"></div>
  </div>
</div>

<div id="death-screen">
  <div class="ds-title">ELIMINATED</div>
  <div class="ds-sub">RESPAWNING IN</div>
  <div id="death-timer">3</div>
</div>

<div id="scoreboard">
  <div class="sb-block you"><div class="sb-name">YOU</div><div class="sb-num" id="myKills">0</div></div>
  <div class="sb-sep">:</div>
  <div class="sb-block them"><div class="sb-name">ENEMY</div><div class="sb-num" id="theirKills">0</div></div>
</div>

<div id="killfeed"></div>

<div id="hud">
  <div id="hud-left">
    <div class="hud-label">Health</div>
    <div id="hp-wrap">
      <div id="hp-bar"><div id="hp-inner" style="width:100%"></div></div>
      <div id="hp-num">100</div>
    </div>
  </div>
  <div id="ammo-block">
    <div class="hud-label">Ammo</div>
    <div id="ammo-cur">30</div>
    <div id="ammo-max">/ 30</div>
    <div id="reload-track"><div id="reload-inner"></div></div>
  </div>
</div>

<div id="lobby">
  <div id="lp">
    <div class="lp-title">CYBER STRIKE</div>
    <div class="lp-sub">P2P · 1v1 · TACTICAL FPS</div>

    <span class="field-label">YOUR ID <span style="color:rgba(255,255,255,.12)">(click to copy)</span></span>
    <div id="myIdDisplay">
      <span id="myIdTxt">Initialising...</span>
      <span class="copy-tag">COPY ▸</span>
    </div>

    <span class="field-label">CONNECT TO PEER</span>
    <input id="peerInput" placeholder="Paste enemy peer ID..." />
    <button id="joinBtn" onclick="connect()">ENTER BATTLE</button>
    <div id="conn-status">Waiting for connection...</div>

    <div class="kbd-grid">
      <div class="kbd-row"><div class="kbd">WASD</div><div class="kbd-desc">Move</div></div>
      <div class="kbd-row"><div class="kbd">LMB</div><div class="kbd-desc">Shoot</div></div>
      <div class="kbd-row"><div class="kbd">SPACE</div><div class="kbd-desc">Jump</div></div>
      <div class="kbd-row"><div class="kbd">RMB</div><div class="kbd-desc">Scope</div></div>
      <div class="kbd-row"><div class="kbd">R</div><div class="kbd-desc">Reload</div></div>
      <div class="kbd-row"><div class="kbd">SHIFT</div><div class="kbd-desc">Sprint</div></div>
    </div>
  </div>
</div>

<script>
/* ==========================================================
   ENGINE
========================================================== */
const canvas = document.getElementById("c");
const engine = new BABYLON.Engine(canvas, true, {antialias:true, stencil:true});
const scene  = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0.04,0.05,0.07,1);
scene.collisionsEnabled = true;
// No scene-level gravity; we handle physics manually for jump reliability

/* CAMERA */
const CAM_HEIGHT = 1.65;
const camera = new BABYLON.UniversalCamera("cam", new BABYLON.Vector3(0, CAM_HEIGHT, 0), scene);
camera.minZ = 0.08;
camera.maxZ = 400;
camera.inertia = 0;
camera.angularSensibility = 750;
camera.checkCollisions = true;
camera.ellipsoid = new BABYLON.Vector3(0.4, CAM_HEIGHT * 0.5, 0.4);
camera.ellipsoidOffset = new BABYLON.Vector3(0, CAM_HEIGHT * 0.5, 0);
camera.keysUp = camera.keysDown = camera.keysLeft = camera.keysRight = [];
camera.attachControl(canvas, true);

/* LIGHTING */
const sun = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-0.6,-1,-0.4), scene);
sun.intensity = 1.1;
sun.diffuse   = new BABYLON.Color3(0.95,0.9,0.85);

const amb = new BABYLON.HemisphericLight("amb", new BABYLON.Vector3(0,1,0), scene);
amb.intensity = 0.35;
amb.diffuse   = new BABYLON.Color3(0.6,0.7,0.9);
amb.groundColor = new BABYLON.Color3(0.1,0.1,0.15);

const glow = new BABYLON.GlowLayer("gl", scene);
glow.intensity = 0.5;

/* FOG */
scene.fogMode    = BABYLON.Scene.FOGMODE_EXP2;
scene.fogDensity = 0.012;
scene.fogColor   = new BABYLON.Color3(0.04,0.05,0.07);

/* ==========================================================
   MAP  — sniper-friendly with towers, corridors, ramps
========================================================== */
const matCache = {};
function mat(hex, emR=0,emG=0,emB=0){
  if(matCache[hex+emR+emG+emB]) return matCache[hex+emR+emG+emB];
  const m = new BABYLON.StandardMaterial("m"+hex, scene);
  const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b2=parseInt(hex.slice(5,7),16)/255;
  m.diffuseColor  = new BABYLON.Color3(r,g,b2);
  m.emissiveColor = new BABYLON.Color3(emR,emG,emB);
  m.specularColor = new BABYLON.Color3(0.05,0.05,0.05);
  return matCache[hex+emR+emG+emB] = m;
}

function box(w,h,d, x,y,z, matObj, collidable=true){
  const b = BABYLON.MeshBuilder.CreateBox("b", {width:w,height:h,depth:d}, scene);
  b.position.set(x,y+h/2,z);
  b.material = matObj;
  if(collidable) b.checkCollisions = true;
  return b;
}

// === GROUND ===
const ground = BABYLON.MeshBuilder.CreateGround("gnd", {width:160,height:160,subdivisions:2}, scene);
ground.checkCollisions = true;
ground.material = mat("#0a0c10");
ground.position.y = 0;

// Grid lines overlay
const gridM = BABYLON.MeshBuilder.CreateGround("grd", {width:160,height:160,subdivisions:40}, scene);
const gMat  = new BABYLON.StandardMaterial("gMat", scene);
gMat.wireframe = true; gMat.emissiveColor = new BABYLON.Color3(0,0.08,0.12); gMat.alpha=0.25;
gridM.material = gMat; gridM.position.y = 0.01;

// === OUTER WALLS (keeps players in) ===
const wallMat = mat("#0d1015");
const WS=80;
box(160,8,2,   0,0,-WS, wallMat);
box(160,8,2,   0,0, WS, wallMat);
box(2,8,160,  -WS,0,0,  wallMat);
box(2,8,160,   WS,0,0,  wallMat);

// === SNIPER TOWERS (tall, accessible by ramps) ===
// Tower A — left back
const towerMat = mat("#0e1520");
box(8,12,8, -50,0,-50, towerMat);    // tower base
box(10,1,10, -50,12,-50, mat("#121a24")); // roof
// Ramp up tower A
const rampA = BABYLON.MeshBuilder.CreateBox("rampA", {width:3,height:0.2,depth:10}, scene);
rampA.position.set(-46,6,-50); rampA.rotation.z = -Math.PI/6;
rampA.material = mat("#14202e"); rampA.checkCollisions = true;

// Tower B — right back
box(8,12,8,  50,0,-50, towerMat);
box(10,1,10,  50,12,-50, mat("#121a24"));
const rampB = BABYLON.MeshBuilder.CreateBox("rampB", {width:3,height:0.2,depth:10}, scene);
rampB.position.set(46,6,-50); rampB.rotation.z = Math.PI/6;
rampB.material = mat("#14202e"); rampB.checkCollisions = true;

// Stairs Tower A (step boxes)
for(let s=0;s<6;s++) box(3,0.5,1.2, -46+s*0.8, s*1.1, -46, mat("#111c2a"));
// Stairs Tower B
for(let s=0;s<6;s++) box(3,0.5,1.2,  46-s*0.8, s*1.1, -46, mat("#111c2a"));

// === CENTRAL STRUCTURE — cross-shaped cover ===
const centreMat = mat("#101418");
box(30,1.8,4,  0,0,0, centreMat);   // horizontal bar
box(4,1.8,20,  0,0,0, centreMat);   // vertical bar
box(4,4,4,     0,0,0, mat("#131820")); // centre pillar higher

// === SIDE BUILDINGS ===
box(12,5,8, -30,0, 10, mat("#0c1018"));
box(12,5,8,  30,0, 10, mat("#0c1018"));
box(12,5,8, -30,0,-20, mat("#0c1018"));
box(12,5,8,  30,0,-20, mat("#0c1018"));

// Windows (cut-out look via thin slabs)
box(3,1.5,0.2, -30,3.5,14.1, mat("#1a2535"));
box(3,1.5,0.2,  30,3.5,14.1, mat("#1a2535"));

// === HALF-WALL BARRIERS (waist height for cover) ===
const barrierMat = mat("#131820");
const barriers = [
  [14,0,-8,12], [-14,0,-8,12], [0,0,22,0], [0,0,-22,0],
  [-40,0,5,0], [40,0,5,0],
  [-20,0,35,6], [20,0,35,6],
  [-20,0,-35,6], [20,0,-35,6],
];
barriers.forEach(([x,y,z,ry]) => {
  const b2 = box(8,1.4,0.5, x,y,z, barrierMat);
  b2.rotation.y = ry * Math.PI/180;
});

// === CATWALKS / ELEVATED PLATFORMS ===
const catMat = mat("#111820");
box(20,0.4,3, 0,5,-35, catMat);    // sniper catwalk back
box(3,0.4,12, -25,3, 0, catMat);   // left side elevated walk
box(3,0.4,12,  25,3, 0, catMat);   // right side
// Pillars under catwalk
for(let p=-1;p<=1;p++) box(0.6,5,0.6, p*8, 0, -35, mat("#0e141c"));
// Ladder-like access (boxes as steps)
for(let s=0;s<5;s++) box(1,0.3,1, -9, s*0.9+0.3, -35, mat("#141e2c"));

// === NEON ACCENT LINES (emissive, no collision) ===
const neonCyan  = mat("#001122", 0, 0.3, 0.5);
const neonRed   = mat("#220011", 0.4, 0.02, 0.05);
const neonOrange= mat("#221100", 0.4, 0.2, 0);

// Edge strips on central cross
box(30,0.08,0.08, 0,1.8, 2, neonCyan, false);
box(30,0.08,0.08, 0,1.8,-2, neonCyan, false);
box(0.08,0.08,20, 2,1.8, 0, neonCyan, false);
box(0.08,0.08,20,-2,1.8, 0, neonCyan, false);

// Tower rooftop accents
box(9,0.05,9, -50,12.5,-50, neonRed, false);
box(9,0.05,9,  50,12.5,-50, neonRed, false);

// Floor strips leading to towers
for(let i=0;i<5;i++){
  box(0.1,0.05,4, -50, 0.05, -30-i*5, neonOrange, false);
  box(0.1,0.05,4,  50, 0.05, -30-i*5, neonOrange, false);
}

// Catwalk edge
box(20,0.05,0.05, 0,5.2,-35, neonCyan, false);

/* ==========================================================
   PHYSICS — manual jump with velocity
========================================================== */
let velY = 0;
let onGround = false;
const GRAVITY   = -28;
const JUMP_SPD  = 9;

/* ==========================================================
   PLAYER STATE
========================================================== */
let myHP      = 100;
let myKills   = 0;
let theirKills = 0;
let alive     = true;
let ammo      = 30;
const MAX_AMMO = 30;
let reloading = false;
let scoped    = false;

const SPAWNS_A = [
  new BABYLON.Vector3(  0, CAM_HEIGHT, 40),
  new BABYLON.Vector3( 15, CAM_HEIGHT, 45),
  new BABYLON.Vector3(-15, CAM_HEIGHT, 45),
];
const SPAWNS_B = [
  new BABYLON.Vector3(  0, CAM_HEIGHT,-40),
  new BABYLON.Vector3( 15, CAM_HEIGHT,-45),
  new BABYLON.Vector3(-15, CAM_HEIGHT,-45),
];

let mySpawnSet = SPAWNS_A; // default; set once connected

function randSpawn(set){ return set[Math.floor(Math.random()*set.length)].clone(); }

/* ==========================================================
   ENEMY MODEL
========================================================== */
let enemyNode  = null;
let enemyHPBar = null;
let enemyHPFill = null;
let enemyHP    = 100;

function buildEnemy(){
  if(enemyNode){
    enemyNode.getChildMeshes().forEach(m=>m.dispose());
    enemyNode.dispose();
  }
  enemyNode = new BABYLON.TransformNode("enemyRoot", scene);

  const eBodyMat = new BABYLON.StandardMaterial("eBM", scene);
  eBodyMat.diffuseColor  = new BABYLON.Color3(0.75,0.15,0.1);
  eBodyMat.emissiveColor = new BABYLON.Color3(0.1,0.01,0.01);
  eBodyMat.specularColor = new BABYLON.Color3(0.3,0.1,0.1);

  // Legs
  const legL = BABYLON.MeshBuilder.CreateBox("legL",{width:0.28,height:0.7,depth:0.28},scene);
  legL.parent = enemyNode; legL.position.set(-0.18,0.35,0); legL.material = eBodyMat;
  const legR = BABYLON.MeshBuilder.CreateBox("legR",{width:0.28,height:0.7,depth:0.28},scene);
  legR.parent = enemyNode; legR.position.set( 0.18,0.35,0); legR.material = eBodyMat;

  // Torso
  const torso = BABYLON.MeshBuilder.CreateBox("torso",{width:0.7,height:0.8,depth:0.35},scene);
  torso.parent = enemyNode; torso.position.set(0,1.1,0); torso.material = eBodyMat;

  // Arms
  const armL = BABYLON.MeshBuilder.CreateBox("armL",{width:0.22,height:0.65,depth:0.22},scene);
  armL.parent = enemyNode; armL.position.set(-0.52,1.0,0); armL.material = eBodyMat;
  const armR = BABYLON.MeshBuilder.CreateBox("armR",{width:0.22,height:0.65,depth:0.22},scene);
  armR.parent = enemyNode; armR.position.set( 0.52,1.0,0); armR.material = eBodyMat;

  // Head
  const head = BABYLON.MeshBuilder.CreateSphere("head",{diameter:0.55,segments:8},scene);
  head.parent = enemyNode; head.position.set(0,1.75,0); head.material = eBodyMat;

  // Eyes (glowing)
  const eyeMat = new BABYLON.StandardMaterial("eEye",scene);
  eyeMat.emissiveColor = new BABYLON.Color3(1,0.1,0.05);
  const eyeL = BABYLON.MeshBuilder.CreateSphere("eyeL",{diameter:0.1,segments:4},scene);
  eyeL.parent = enemyNode; eyeL.position.set(-0.12,1.78,0.27); eyeL.material = eyeMat;
  const eyeR = BABYLON.MeshBuilder.CreateSphere("eyeR",{diameter:0.1,segments:4},scene);
  eyeR.parent = enemyNode; eyeR.position.set( 0.12,1.78,0.27); eyeR.material = eyeMat;

  enemyNode.position.set(0,0,0);
}

function buildEnemyHPBar(){
  if(enemyHPBar) enemyHPBar.dispose();

  enemyHPBar = BABYLON.MeshBuilder.CreatePlane("ehpPlane",{width:1.4,height:0.18},scene);
  enemyHPBar.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
  enemyHPBar.isPickable = false;

  const adt = BABYLON.GUI.AdvancedDynamicTexture.CreateForMesh(enemyHPBar, 512, 64);

  const bg = new BABYLON.GUI.Rectangle();
  bg.width="100%"; bg.height="100%";
  bg.background="rgba(0,0,0,0.7)"; bg.thickness=0;
  adt.addControl(bg);

  const fill = new BABYLON.GUI.Rectangle();
  fill.width="100%"; fill.height="70%";
  fill.background="#cc1c1c"; fill.thickness=0;
  fill.horizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT;
  bg.addControl(fill);

  enemyHPFill = fill;
}

/* ==========================================================
   INPUT
========================================================== */
const K = {};
let mouseLocked = false;
let isHost = false; // first connector = host (spawns in set A)

window.addEventListener("keydown", e => {
  K[e.code] = true;
  if(e.code==="KeyR" && !reloading && ammo<MAX_AMMO) startReload();
  if(e.code==="KeyF") toggleScope();
});
window.addEventListener("keyup", e => { K[e.code] = false; });

document.addEventListener("pointerlockchange", () => {
  mouseLocked = (document.pointerLockElement === canvas);
});
canvas.addEventListener("click", () => {
  if(!document.getElementById("lobby").style.display || document.getElementById("lobby").style.display==="none")
    canvas.requestPointerLock();
});

// Right-click scope
canvas.addEventListener("contextmenu", e => { e.preventDefault(); toggleScope(); });

function toggleScope(){
  if(!alive) return;
  scoped = !scoped;
  const s = document.getElementById("scope");
  s.style.display = scoped ? "block" : "none";
  camera.fov = scoped ? 0.18 : 0.8;
  document.getElementById("xhair").style.display = scoped ? "none" : "block";
}

/* ==========================================================
   SHOOTING
========================================================== */
let bullets = [];
let mfTimer = 0;

// Muzzle flash sprite
const mfMesh = BABYLON.MeshBuilder.CreateSphere("mf",{diameter:0.28,segments:4},scene);
const mfMat  = new BABYLON.StandardMaterial("mfMat",scene);
mfMat.emissiveColor = new BABYLON.Color3(1,0.75,0.1);
mfMesh.material = mfMat; mfMesh.isVisible = false;

function spawnBulletMesh(isEnemy){
  const b = BABYLON.MeshBuilder.CreateSphere("blt",{diameter:isEnemy?0.18:0.12,segments:4},scene);
  const m = new BABYLON.StandardMaterial("bm",scene);
  m.emissiveColor = isEnemy ? new BABYLON.Color3(1,0.2,0.1) : new BABYLON.Color3(0.8,0.9,1);
  b.material = m;
  return b;
}

function shootRay(){
  if(!alive || !mouseLocked || reloading) return;
  if(ammo<=0){ startReload(); return; }
  ammo--; updateAmmoHUD();

  const fwd = camera.getForwardRay().direction.clone();
  const origin = camera.position.clone();

  // Muzzle flash
  mfMesh.position = origin.add(fwd.scale(1.2));
  mfMesh.isVisible = true; mfTimer = 4;

  // Visual tracer
  const bMesh = spawnBulletMesh(false);
  bMesh.position.copyFrom(origin.add(fwd.scale(1)));
  const spd = scoped ? 2.5 : 2.0;
  bullets.push({mesh:bMesh, dir:fwd.scale(spd), life:90, isEnemy:false});

  // Instant raycast hit
  if(enemyNode){
    const ray = new BABYLON.Ray(origin, fwd, 200);
    const childMeshes = enemyNode.getChildMeshes();
    for(const cm of childMeshes){
      const pick = ray.intersectsMesh(cm, false);
      if(pick.hit){
        onHitRegistered();
        break;
      }
    }
  }

  if(conn?.open) conn.send({
    type:"shoot",
    pos:{x:origin.x,y:origin.y,z:origin.z},
    dir:{x:fwd.x,y:fwd.y,z:fwd.z}
  });
}

function onHitRegistered(){
  const xh = document.getElementById("xhair");
  xh.classList.add("hit");
  setTimeout(()=>xh.classList.remove("hit"),140);
  kf("HIT", "dmg");
  if(conn?.open) conn.send({type:"hit", amount: scoped ? 25 : 10});
}

window.addEventListener("mousedown", e => { if(e.button===0) shootRay(); });

function startReload(){
  if(reloading || ammo===MAX_AMMO) return;
  reloading=true;
  kf("RELOADING", "event");
  const track = document.getElementById("reload-track");
  const fill  = document.getElementById("reload-inner");
  track.style.display="block";
  fill.style.transition="none"; fill.style.width="0%";
  requestAnimationFrame(()=>{
    fill.style.transition="width 1.4s linear";
    fill.style.width="100%";
  });
  setTimeout(()=>{
    ammo=MAX_AMMO; reloading=false;
    track.style.display="none"; fill.style.width="0%";
    updateAmmoHUD();
  },1400);
}

/* ==========================================================
   RENDER LOOP
========================================================== */
let frameIdx = 0;

scene.onBeforeRenderObservable.add(()=>{
  const dt = Math.min(engine.getDeltaTime()/1000, 0.05);
  frameIdx++;

  if(mfTimer>0){ mfTimer--; if(!mfTimer) mfMesh.isVisible=false; }

  if(!alive) return;

  /* --- MOVEMENT --- */
  const spd   = K["ShiftLeft"] ? 0.19 : 0.12;
  let fwd     = camera.getForwardRay().direction.clone(); fwd.y=0;
  if(fwd.length()>0) fwd.normalize();
  const right = BABYLON.Vector3.Cross(new BABYLON.Vector3(0,1,0), fwd).normalize();

  let move = BABYLON.Vector3.Zero();
  if(K["KeyW"]) move.addInPlace(fwd);
  if(K["KeyS"]) move.subInPlace(fwd);
  if(K["KeyA"]) move.subInPlace(right);
  if(K["KeyD"]) move.addInPlace(right);
  if(move.length()>0) move.normalize().scaleInPlace(spd);

  /* --- JUMP & GRAVITY --- */
  // Sample ground below
  const footY = camera.position.y - CAM_HEIGHT;
  onGround = footY <= 0.05;

  if(K["Space"] && onGround){
    velY = JUMP_SPD;
    onGround = false;
  }

  if(!onGround){
    velY += GRAVITY * dt;
  } else {
    if(velY < 0) velY = 0;
  }

  move.y = velY * dt;

  // Apply via cameraDirection (works with checkCollisions)
  camera.cameraDirection.copyFrom(move);

  // Clamp to not go below ground
  if(camera.position.y < CAM_HEIGHT){
    camera.position.y = CAM_HEIGHT;
    if(velY < 0) velY = 0;
  }

  /* --- ENEMY HP BAR FOLLOW --- */
  if(enemyNode && enemyHPBar){
    enemyHPBar.position.copyFrom(enemyNode.position);
    enemyHPBar.position.y += 2.3;
  }

  /* --- BULLETS --- */
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.mesh.position.addInPlace(b.dir);
    b.life--;

    // Enemy bullet hits local player
    if(b.isEnemy && alive){
      if(BABYLON.Vector3.Distance(b.mesh.position, camera.position)<1.0){
        b.life=0;
      }
    }

    if(b.life<=0){ b.mesh.dispose(); bullets.splice(i,1); }
  }

  /* --- SEND POS (every other frame) --- */
  if(conn?.open && frameIdx%2===0){
    // Enemy sees us at footY position, not camera eye
    conn.send({
      type:"pos",
      x: camera.position.x,
      y: camera.position.y - CAM_HEIGHT,  // foot Y
      z: camera.position.z,
      ry: camera.rotation.y,
      hp: myHP
    });
  }
});

engine.runRenderLoop(()=>scene.render());
window.addEventListener("resize",()=>engine.resize());

/* ==========================================================
   NETWORKING
========================================================== */
const peer = new Peer(undefined,{
  config:{iceServers:[
    {urls:"stun:stun.l.google.com:19302"},
    {urls:"stun:stun1.l.google.com:19302"}
  ]}
});
let conn=null;

peer.on('open', id=>{
  document.getElementById("myIdTxt").innerText = id;
  document.getElementById("conn-status").innerText = "Ready — share your ID";
});
peer.on('error', e=>console.warn("PeerJS:",e));
peer.on('connection', c=>{ conn=c; isHost=true; setupConn(); });

function connect(){
  const id=document.getElementById("peerInput").value.trim();
  if(!id) return;
  setStatus("Connecting…","");
  conn=peer.connect(id); isHost=false; setupConn();
}

function setupConn(){
  conn.on('open',()=>{
    setStatus("● CONNECTED","ok");
    setTimeout(()=>{
      document.getElementById("lobby").style.display="none";
      canvas.requestPointerLock();
      buildEnemy();
      buildEnemyHPBar();

      // Host spawns at one end, joiner at other
      mySpawnSet = isHost ? SPAWNS_A : SPAWNS_B;
      camera.position.copyFrom(randSpawn(mySpawnSet));
      velY=0; myHP=100; ammo=MAX_AMMO; alive=true;
      updateHPHUD(); updateAmmoHUD();
    },500);
  });
  conn.on('data', onData);
  conn.on('close',()=>kf("CONNECTION LOST","event"));
}

function onData(d){
  switch(d.type){
    case "pos":
      if(!enemyNode) break;
      // Place enemy feet at received y
      enemyNode.position.set(d.x, d.y, d.z);
      enemyNode.rotation.y = d.ry + Math.PI;  // face toward us
      if(enemyHPFill && d.hp!=null){
        enemyHP = d.hp;
        enemyHPFill.width = Math.max(0,d.hp)+"%";
      }
      break;
    case "shoot":
      spawnEnemyBullet(d.pos, d.dir);
      break;
    case "hit":
      takeDamage(d.amount);
      break;
    case "died":
      myKills++;
      updateKillsHUD();
      kf("ELIMINATED ENEMY","dmg");
      // Reset enemy to their spawn side
      if(enemyNode){
        const respawnSet = isHost ? SPAWNS_B : SPAWNS_A;
        const rs = respawnSet[0];
        enemyNode.position.set(rs.x, 0, rs.z);
      }
      break;
  }
}

function spawnEnemyBullet(pos, dir){
  const bMesh = spawnBulletMesh(true);
  bMesh.position.set(pos.x,pos.y,pos.z);
  const d = new BABYLON.Vector3(dir.x,dir.y,dir.z).normalize().scale(1.8);
  bullets.push({mesh:bMesh, dir:d, life:80, isEnemy:true});
}

/* ==========================================================
   DAMAGE / DEATH
========================================================== */
function takeDamage(amt){
  myHP=Math.max(0,myHP-amt);
  updateHPHUD();

  const v=document.getElementById("dmg-vignette");
  v.classList.add("show");
  setTimeout(()=>v.classList.remove("show"),150);

  const lo=document.getElementById("low-hp-overlay");
  if(myHP<=30) lo.classList.add("pulse"); else lo.classList.remove("pulse");

  if(myHP<=0) die();
}

function die(){
  if(!alive) return;
  alive=false;
  if(scoped){ scoped=false; camera.fov=0.8; document.getElementById("scope").style.display="none"; document.getElementById("xhair").style.display="block"; }

  theirKills++;
  updateKillsHUD();
  if(conn?.open) conn.send({type:"died"});

  kf("YOU DIED","dmg");

  const ds=document.getElementById("death-screen");
  ds.classList.add("show");
  let t=3; document.getElementById("death-timer").innerText=t;
  const iv=setInterval(()=>{
    t--; document.getElementById("death-timer").innerText=t;
    if(t<=0){ clearInterval(iv); respawn(); }
  },1000);
}

function respawn(){
  myHP=100; ammo=MAX_AMMO; alive=true; reloading=false; velY=0;
  updateHPHUD(); updateAmmoHUD();
  document.getElementById("low-hp-overlay").classList.remove("pulse");
  camera.position.copyFrom(randSpawn(mySpawnSet));
  document.getElementById("death-screen").classList.remove("show");
}

/* ==========================================================
   HUD HELPERS
========================================================== */
function updateHPHUD(){
  document.getElementById("hp-inner").style.width = Math.max(0,myHP)+"%";
  document.getElementById("hp-inner").style.background =
    myHP>60?"#3cba5a": myHP>30?"#d4842a":"#e8413c";
  document.getElementById("hp-num").innerText = Math.max(0,myHP);
}
function updateAmmoHUD(){
  document.getElementById("ammo-cur").innerText=ammo;
}
function updateKillsHUD(){
  document.getElementById("myKills").innerText=myKills;
  document.getElementById("theirKills").innerText=theirKills;
}
function setStatus(msg,cls){
  const el=document.getElementById("conn-status");
  el.innerText=msg; el.className=cls;
}

let kfTimeout={};
function kf(msg, type=""){
  const feed=document.getElementById("killfeed");
  const d=document.createElement("div");
  d.className="kf "+(type||"");
  d.innerText=msg;
  feed.prepend(d);
  while(feed.children.length>6) feed.removeChild(feed.lastChild);
  setTimeout(()=>{
    d.style.transition="opacity .35s";
    d.style.opacity="0";
    setTimeout(()=>d.remove(),350);
  },2600);
}

/* Copy ID */
document.getElementById("myIdDisplay").addEventListener("click",()=>{
  const t=document.getElementById("myIdTxt").innerText;
  if(t&&t!=="Initialising..."){ navigator.clipboard.writeText(t); kf("ID COPIED","event"); }
});
</script>
