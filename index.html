<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<title>CYBER STRIKE 6.0 ULTRA PERFORMANCE</title>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;}
#c{display:block;width:100vw;height:100vh;outline:none;touch-action:none;}

/* UI Styles (Unchanged but ensure pointer-events:none for overlays) */
#xhair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:100;width:24px;height:24px;}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,.9);transition:all .1s;}
#xhair::before{width:2px;height:10px;top:7px;left:11px;}
#xhair::after{width:10px;height:2px;top:11px;left:7px;}
#xhair.hit::before,#xhair.hit::after{background:#ff3333;box-shadow:0 0 12px #ff3333;}
#xhair.headshot::before,#xhair.headshot::after{background:#ffcc00;box-shadow:0 0 15px #ffcc00; transform: scale(1.4);}
#xhair.legshot::before,#xhair.legshot::after{background:#44aaff;box-shadow:0 0 12px #44aaff;}

#hud{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-end;padding:0 32px 24px;pointer-events:none;z-index:100;}
#hud-left{display:flex;flex-direction:column;gap:6px;}
.hud-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:4px;color:rgba(255,255,255,.4);text-transform:uppercase;}
#hp-wrap{display:flex;align-items:center;gap:12px;}
#hp-bar{width:180px;height:6px;background:rgba(255,255,255,.1);position:relative;overflow:hidden;}
#hp-inner{height:100%;background:linear-gradient(90deg,#3cba5a,#4de884);transition:width .15s;}
#hp-num{font-family:'Share Tech Mono',monospace;font-size:32px;color:#fff;line-height:1;text-shadow:0 0 20px rgba(255,255,255,.3);}
#ammo-block{text-align:right;}
#ammo-cur{font-family:'Share Tech Mono',monospace;font-size:48px;color:#fff;line-height:1;text-shadow:0 0 15px rgba(255,255,255,.2);}
#ammo-max{font-family:'Share Tech Mono',monospace;font-size:14px;color:rgba(255,255,255,.35);}
#ammo-low{color:#ff5544!important;animation:ammoPulse .5s infinite;}
@keyframes ammoPulse{0%,100%{opacity:1}50%{opacity:.5}}
#reload-track{width:80px;height:3px;background:rgba(255,255,255,.1);margin-left:auto;margin-top:6px;display:none;overflow:hidden;}
#reload-inner{height:100%;background:#fff;width:0;}

#killfeed{position:fixed;top:80px;right:24px;display:flex;flex-direction:column;gap:5px;align-items:flex-end;pointer-events:none;z-index:100;}
.kf{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;padding:4px 14px 4px 18px;background:rgba(0,0,0,.7);color:#fff;letter-spacing:.5px;border-right:3px solid rgba(255,255,255,.3);animation:kfIn .3s ease-out;}
@keyframes kfIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
.kf.dmg{border-color:#ff4444;color:#ffaaaa;}
.kf.headshot{border-color:#ffcc00;color:#ffeeaa;}
.kf.legshot{border-color:#44aaff;color:#aaddff;}
.kf.event{border-color:rgba(100,200,255,.5);color:rgba(150,220,255,.9);}
.kf.kill{border-color:#44ff88;color:#aaffcc;}

#scoreboard{position:fixed;top:0;left:50%;transform:translateX(-50%);display:flex;z-index:100;pointer-events:none;}
.sb-block{padding:8px 32px;text-align:center;background:rgba(0,0,0,.75);min-width:90px;}
.sb-block .sb-name{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.35);text-transform:uppercase;}
.sb-block .sb-num{font-family:'Share Tech Mono',monospace;font-size:26px;color:#fff;}
.sb-sep{padding:8px 8px;background:rgba(0,0,0,.75);display:flex;align-items:center;color:rgba(255,255,255,.2);font-size:12px;}
.sb-block.you{border-bottom:3px solid #4af;box-shadow:0 3px 20px rgba(68,170,255,.3);}
.sb-block.them{border-bottom:3px solid #f84;box-shadow:0 3px 20px rgba(255,136,68,.3);}

#dmg-vignette{position:fixed;inset:0;pointer-events:none;z-index:99;opacity:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(200,0,0,.6) 100%);transition:opacity .05s;}
#dmg-vignette.show{opacity:1;}
#low-hp-overlay{position:fixed;inset:0;pointer-events:none;z-index:98;background:rgba(150,0,0,1);opacity:0;display:none;}
#low-hp-overlay.pulse{display:block;animation:lowHPPulse 1.2s ease-in-out infinite;}
@keyframes lowHPPulse{0%,100%{opacity:0}50%{opacity:.2}}

#hitmarker{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:101;opacity:0;}
#hitmarker svg{width:32px;height:32px;stroke:#fff;stroke-width:2;}
#hitmarker.show{animation:hmPop .25s ease-out;}
#hitmarker.headshot svg{stroke:#ffcc00; width: 40px; height: 40px;}
#hitmarker.legshot svg{stroke:#44aaff; width: 36px; height: 36px;}
@keyframes hmPop{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(1)}}
#hitmarker.kill svg{stroke:#ff4444;}

#death-screen{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.9);}
#death-screen.show{display:flex;animation:dsIn .4s ease-out;}
@keyframes dsIn{from{opacity:0}to{opacity:1}}
#death-screen .ds-title{font-size:72px;font-weight:700;letter-spacing:8px;color:#e8413c;text-shadow:0 0 80px rgba(232,65,60,.5);}
#death-screen .ds-sub{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:5px;color:rgba(255,255,255,.35);margin-top:8px;}
#death-timer{font-family:'Share Tech Mono',monospace;font-size:64px;color:#fff;margin-top:20px;text-shadow:0 0 30px rgba(255,255,255,.4);}

#lobby{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(5,8,12,.97);}
#lp{width:400px;background:rgba(10,15,22,1);border:1px solid rgba(255,255,255,.08);padding:40px;position:relative;overflow:hidden;}
#lp::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#4af,transparent);}
.lp-title{font-size:36px;font-weight:700;letter-spacing:8px;color:#fff;text-transform:uppercase;}
.lp-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:4px;margin-bottom:36px;margin-top:4px;}
.field-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.4);margin-bottom:6px;margin-top:20px;display:block;}
#myIdDisplay{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);padding:12px 14px;font-family:'Share Tech Mono',monospace;font-size:13px;color:rgba(100,200,255,.9);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:.2s;}
#myIdDisplay:hover{background:rgba(255,255,255,.08);border-color:rgba(100,200,255,.3);}
#peerInput{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;padding:12px 14px;font-family:'Share Tech Mono',monospace;font-size:13px;outline:none;letter-spacing:1px;transition:.2s;}
#peerInput::placeholder{color:rgba(255,255,255,.2);}
#peerInput:focus{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.07);}
#joinBtn{width:100%;margin-top:18px;padding:14px;background:#fff;color:#000;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:5px;border:none;cursor:pointer;text-transform:uppercase;transition:.2s;}
#joinBtn:hover{background:#eee;transform:translateY(-1px);box-shadow:0 4px 20px rgba(255,255,255,.2);}
#conn-status{margin-top:14px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.25);text-align:center;}
#conn-status.ok{color:rgba(80,220,120,.8);}
#conn-status.err{color:rgba(255,100,100,.8);}
.kbd-grid{margin-top:32px;padding-top:24px;border-top:1px solid rgba(255,255,255,.06);display:grid;grid-template-columns:1fr 1fr;gap:10px 24px;}
.kbd-row{display:flex;align-items:center;gap:10px;}
.kbd{font-family:'Share Tech Mono',monospace;font-size:10px;padding:3px 8px;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.55);min-width:36px;text-align:center;background:rgba(255,255,255,.03);}
.kbd-desc{font-size:12px;color:rgba(255,255,255,.3);letter-spacing:.5px;}

#scope{position:fixed;inset:0;pointer-events:none;z-index:95;display:none;}
#scope-overlay{position:absolute;inset:0;background:transparent;}
#scope-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:90vmin;height:90vmin;border-radius:50%;border:2px solid rgba(255,255,255,0.2);box-shadow:0 0 0 9999px rgba(0,0,0,0.55);}
#scope-h,#scope-v{position:absolute;background:rgba(0,0,0,0.7);}
#scope-h{width:100%;height:1px;top:50%;left:0;}
#scope-v{width:1px;height:100%;left:50%;top:0;}
#scope-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;background:#ff3333;border-radius:50%;box-shadow:0 0 4px #ff0000;}

#shake-wrap{position:fixed;inset:0;pointer-events:none;z-index:1;}
.shake{animation:shakeAnim .15s ease-out;}
@keyframes shakeAnim{0%,100%{transform:translate(0,0)}25%{transform:translate(-3px,1px)}50%{transform:translate(2px,-2px)}75%{transform:translate(-1px,2px)}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="shake-wrap"><div id="xhair"></div></div>
<div id="hitmarker"><svg viewBox="0 0 32 32"><line x1="8" y1="8" x2="14" y2="14"/><line x1="24" y1="8" x2="18" y2="14"/><line x1="8" y1="24" x2="14" y2="18"/><line x1="24" y1="24" x2="18" y2="18"/></svg></div>
<div id="dmg-vignette"></div>
<div id="low-hp-overlay"></div>
<div id="scope"><div id="scope-overlay"></div><div id="scope-circle"><div id="scope-h"></div><div id="scope-v"></div><div id="scope-dot"></div></div></div>
<div id="death-screen"><div class="ds-title">ELIMINATED</div><div class="ds-sub">RESPAWNING IN</div><div id="death-timer">3</div></div>
<div id="scoreboard"><div class="sb-block you"><div class="sb-name">YOU</div><div class="sb-num" id="myKills">0</div></div><div class="sb-sep">:</div><div class="sb-block them"><div class="sb-name">ENEMY</div><div class="sb-num" id="theirKills">0</div></div></div>
<div id="killfeed"></div>
<div id="hud"><div id="hud-left"><div class="hud-label">Health</div><div id="hp-wrap"><div id="hp-bar"><div id="hp-inner" style="width:100%"></div></div><div id="hp-num">100</div></div></div><div id="ammo-block"><div class="hud-label">Ammo</div><div id="ammo-cur">30</div><div id="ammo-max">/ 30</div><div id="reload-track"><div id="reload-inner"></div></div></div></div>
<div id="lobby"><div id="lp"><div class="lp-title">CYBER STRIKE</div><div class="lp-sub">ULTRA PERFORMANCE BUILD</div><span class="field-label">YOUR ID</span><div id="myIdDisplay"><span id="myIdTxt">Initialising...</span><span class="copy-tag">COPY</span></div><span class="field-label">CONNECT TO PEER</span><input id="peerInput" placeholder="Paste enemy peer ID..." /><button id="joinBtn" onclick="connect()">ENTER BATTLE</button><div id="conn-status">System Ready</div><div class="kbd-grid"><div class="kbd-row"><div class="kbd">WASD</div><div class="kbd-desc">Move</div></div><div class="kbd-row"><div class="kbd">LMB</div><div class="kbd-desc">Shoot</div></div><div class="kbd-row"><div class="kbd">SPACE</div><div class="kbd-desc">Jump</div></div><div class="kbd-row"><div class="kbd">F</div><div class="kbd-desc">Scope</div></div><div class="kbd-row"><div class="kbd">R</div><div class="kbd-desc">Reload</div></div><div class="kbd-row"><div class="kbd">SHIFT</div><div class="kbd-desc">Sprint</div></div></div></div></div>

<script>
// AUDIO
const gunshotURL = "https://cdn.uppbeat.io/audio-files/57ef60eab5fd4218838423222dc07d99/885423a5362603bff168c72b32944a5b/50b63c3bd4b508cee5649d825e4595bf/STREAMING-desert-eagle-gunshot-fascinatedsound-3-3-00-01.mp3";
const audioPool = [];
for(let i=0; i<10; i++) { audioPool.push(new Audio(gunshotURL)); }
let aIdx = 0;

// MAP DATA
const MAP_DATA = {
  structures: [
    { w:12, h:16, d:12, x:-65, y:8, z:-65 }, { w:14, h:0.6, d:14, x:-65, y:16.3, z:-65 },
    { w:12, h:16, d:12, x:65, y:8, z:-65 }, { w:14, h:0.6, d:14, x:65, y:16.3, z:-65 },
    { w:12, h:16, d:12, x:-65, y:8, z:65 }, { w:14, h:0.6, d:14, x:-65, y:16.3, z:65 },
    { w:12, h:16, d:12, x:65, y:8, z:65 }, { w:14, h:0.6, d:14, x:65, y:16.3, z:65 },
    { w:40, h:2.5, d:6, x:0, y:1.25, z:0 }, { w:6, h:2.5, d:40, x:0, y:1.25, z:0 },
    { w:8, h:6, d:8, x:0, y:3, z:0 }, { w:15, h:3, d:15, x:0, y:4, z:0 },
    { w:30, h:0.5, d:4, x:0, y:7, z:-50 }, { w:30, h:0.5, d:4, x:0, y:7, z:50 },
    { w:4, h:0.5, d:30, x:-50, y:7, z:0 }, { w:4, h:0.5, d:30, x:50, y:7, z:0 },
    { w:4, h:2.5, d:4, x:-30, y:1.25, z:-25 }, { w:4, h:2.5, d:4, x:30, y:1.25, z:-25 },
    { w:4, h:2.5, d:4, x:-30, y:1.25, z:25 }, { w:4, h:2.5, d:4, x:30, y:1.25, z:25 }
  ]
};

try {
    const canvas = document.getElementById("c");
    // OPTIMIZATION: Preserve drawing buffer false, stencil false, no antialias for raw speed
    const engine = new BABYLON.Engine(canvas, false, { preserveDrawingBuffer: false, stencil: false, antialias: false });
    engine.enableOfflineSupport = false; // No caching needed
    
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0.02,0.03,0.05,1);
    scene.collisionsEnabled = true;
    scene.autoClear = false; // Huge optimization: don't clear the buffer manually if not needed

    // CAMERA
    const CAM_H = 1.7;
    const camera = new BABYLON.UniversalCamera("cam", new BABYLON.Vector3(0, CAM_H, 0), scene);
    camera.minZ = 0.1; camera.maxZ = 500; // Reduce maxZ to clip far objects
    camera.inertia = 0; camera.angularSensibility = 500;
    camera.checkCollisions = true;
    camera.ellipsoid = new BABYLON.Vector3(0.4, CAM_H * 0.5, 0.4);
    camera.applyGravity = false;
    camera.attachControl(canvas, true);

    // LIGHTING
    const amb = new BABYLON.HemisphericLight("amb", new BABYLON.Vector3(0,1,0), scene);
    amb.intensity = 0.9; // Simple lighting
    
    // FOG
    scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
    scene.fogDensity = 0.004;
    scene.fogColor = new BABYLON.Color3(0.02,0.03,0.05);

    // MATERIALS - Single shared materials to reduce draw calls
    const matWall = new BABYLON.StandardMaterial("mw", scene);
    matWall.diffuseColor = new BABYLON.Color3(0.2, 0.2, 0.22);
    matWall.specularColor = new BABYLON.Color3(0.1, 0.1, 0.1);
    
    const matEnemy = new BABYLON.StandardMaterial("me", scene);
    matEnemy.diffuseColor = new BABYLON.Color3(0.5, 0.1, 0.1);
    
    // GROUND
    const ground = BABYLON.MeshBuilder.CreateGround("g", {width:250, height:250}, scene);
    ground.material = matWall; ground.checkCollisions = true; ground.isWall = true;
    
    // WALLS
    const wallData = [
      {w:250,h:12,d:2,x:0,y:6,z:-110}, {w:250,h:12,d:2,x:0,y:6,z:110},
      {w:2,h:12,d:250,x:-110,y:6,z:0}, {w:2,h:12,d:250,x:110,y:6,z:0}
    ];
    wallData.forEach(w => {
        const m = BABYLON.MeshBuilder.CreateBox("w", {width:w.w, height:w.h, depth:w.d}, scene);
        m.position.set(w.x, w.y, w.z); m.material = matWall;
        m.checkCollisions = true; m.isWall = true;
    });

    // STRUCTURES
    MAP_DATA.structures.forEach(s => {
        const m = BABYLON.MeshBuilder.CreateBox("s", {width:s.w, height:s.h, depth:s.d}, scene);
        m.position.set(s.x, s.y, s.z); m.material = matWall;
        m.checkCollisions = true; m.isWall = true;
    });

    // POOLS - Pre-allocated Arrays (No "new" in loop)
    const TmpV = new BABYLON.Vector3(); // Reusable temp vector
    
    // Bullet Pool (Using Thin Instances for 1 Draw Call)
    const bulletPoolData = [];
    const MAX_BULLETS = 50;
    const bulletBase = BABYLON.MeshBuilder.CreateSphere("b", {diameter:0.1, segments:4}, scene);
    bulletBase.material = new BABYLON.StandardMaterial("bm", scene);
    bulletBase.material.emissiveColor = new BABYLON.Color3(1, 0.8, 0.3);
    bulletBase.material.disableLighting = true;
    bulletBase.isVisible = false; // Base mesh hidden
    bulletBase.isPickable = false;
    
    // Pre-allocate matrices
    const bulletMatrices = new Float32Array(16 * MAX_BULLETS);
    const bulletMatrixBuffer = new BABYLON.Buffer(engine, bulletMatrices, false, 16);
    bulletBase.thinInstanceSetBuffer("matrix", bulletMatrixBuffer.createBuffer(16), 16, false);
    
    for(let i=0; i<MAX_BULLETS; i++) {
        bulletPoolData.push({
            active: false, 
            pos: new BABYLON.Vector3(), 
            vel: new BABYLON.Vector3(), 
            life: 0
        });
    }
    let bulletIdx = 0;

    // Spark Pool
    const sparkPoolData = [];
    const MAX_SPARKS = 100;
    const sparkBase = BABYLON.MeshBuilder.CreateSphere("s", {diameter:0.03, segments:2}, scene);
    sparkBase.material = new BABYLON.StandardMaterial("sm", scene);
    sparkBase.material.emissiveColor = new BABYLON.Color3(1, 0.5, 0.1);
    sparkBase.material.disableLighting = true;
    sparkBase.isVisible = false;
    sparkBase.isPickable = false;
    
    const sparkMatrices = new Float32Array(16 * MAX_SPARKS);
    const sparkMatrixBuffer = new BABYLON.Buffer(engine, sparkMatrices, false, 16);
    sparkBase.thinInstanceSetBuffer("matrix", sparkMatrixBuffer.createBuffer(16), 16, false);

    for(let i=0; i<MAX_SPARKS; i++) {
        sparkPoolData.push({
            active: false,
            pos: new BABYLON.Vector3(),
            vel: new BABYLON.Vector3(),
            life: 0
        });
    }
    let sparkIdx = 0;

    // WEAPON
    let gunRoot, gunGrip, gunMuzzle;
    let rZ=0, rX=0;
    
    function buildWeapon() {
        gunRoot = new BABYLON.TransformNode("gr", scene);
        gunRoot.parent = camera;
        gunRoot.position = new BABYLON.Vector3(0.3, -0.32, 0.6);
        gunGrip = new BABYLON.TransformNode("gg", scene);
        gunGrip.parent = gunRoot;
        
        const m = new BABYLON.StandardMaterial("gm", scene);
        m.diffuseColor = new BABYLON.Color3(0.1, 0.1, 0.1);
        
        const add = (s, p) => {
            const b = BABYLON.MeshBuilder.CreateBox("p", {width:s.x, height:s.y, depth:s.z}, scene);
            b.material = m; b.parent = gunGrip; b.position = p; b.isPickable = false;
        };
        add(new BABYLON.Vector3(0.08,0.15,0.5), new BABYLON.Vector3(0,0.05,0.1));
        add(new BABYLON.Vector3(0.07,0.15,0.08), new BABYLON.Vector3(0,-0.05,-0.15));
        
        gunMuzzle = new BABYLON.TransformNode("gm", scene);
        gunMuzzle.parent = gunGrip;
        gunMuzzle.position = new BABYLON.Vector3(0, 0.08, 0.4);
    }

    function animateGun() {
        if(!gunGrip) return;
        rZ *= 0.9; rX *= 0.9;
        gunGrip.position.z = rZ; gunGrip.rotation.x = rX;
    }
    function recoil() { rZ = -0.04; rX = -0.02; }

    // STATE
    let myHP=100, kills=0, eKills=0, alive=true, ammo=30, reloading=false, scoped=false;
    const SPAWN_A = [new BABYLON.Vector3(0,CAM_H,60)];
    const SPAWN_B = [new BABYLON.Vector3(0,CAM_H,-60)];
    let mySpawn = SPAWN_A;
    const DMG = {head: 40, body: 18, legs: 12};

    // PHYSICS - Reusable vectors
    const velY = {v:0};
    const hVel = new BABYLON.Vector3();
    const _v = new BABYLON.Vector3(), _r = new BABYLON.Vector3(), _u = BABYLON.Vector3.Up();
    const _gRay = new BABYLON.Ray(new BABYLON.Vector3(), new BABYLON.Vector3.Down(), CAM_H + 0.5); // Cached Ray

    // ENEMY
    let eNode, eMuzzle, eBodyParts = [], eHPBar, eHPF, eHP=100, eVis=true, eTP=new BABYLON.Vector3(), eTR=0;
    
    function buildEnemy() {
        if(eNode) eNode.dispose();
        eNode = new BABYLON.TransformNode("er", scene);
        
        const addV = (s, p, type) => {
            const m = BABYLON.MeshBuilder.CreateBox("e", s, scene);
            m.parent = eNode; m.position = p; m.material = matEnemy;
            m.isPickable = true; m.hitType = type; eBodyParts.push(m);
        };
        addV({width:0.25,height:0.6,depth:0.25}, new BABYLON.Vector3(-0.15,0.3,0), "legs");
        addV({width:0.25,height:0.6,depth:0.25}, new BABYLON.Vector3(0.15,0.3,0), "legs");
        addV({width:0.6,height:0.8,depth:0.35}, new BABYLON.Vector3(0,1,0), "body");
        const hd = BABYLON.MeshBuilder.CreateSphere("h", {diameter:0.45}, scene);
        hd.parent = eNode; hd.position.y = 1.7; hd.material = matEnemy; hd.isPickable = true; hd.hitType = "head";
        
        eMuzzle = new BABYLON.TransformNode("em", scene);
        eMuzzle.parent = eNode; eMuzzle.position = new BABYLON.Vector3(0.4, 1.1, 0.3);
        
        eNode.position.set(0,0,0); eTP.copyFrom(eNode.position);
    }
    
    function buildEHP() {
        if(eHPBar) eHPBar.dispose();
        eHPBar = BABYLON.MeshBuilder.CreatePlane("ehp", {width:1.2,height:0.15}, scene);
        eHPBar.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
        const adt = BABYLON.GUI.AdvancedDynamicTexture.CreateForMesh(eHPBar, 128, 16);
        const bg = new BABYLON.GUI.Rectangle(); bg.width="100%"; bg.height="100%"; bg.thickness=0; bg.background="rgba(0,0,0,0.5)"; adt.addControl(bg);
        eHPF = new BABYLON.GUI.Rectangle(); eHPF.width="100%"; eHPF.height="100%"; eHPF.background="#cc2222"; eHPF.thickness=0; eHPF.horizontalAlignment=BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT; bg.addControl(eHPF);
    }

    // INPUT
    const K={}; let mL=false, host=false;
    window.addEventListener("keydown", e => { K[e.code]=true; if(e.code==="KeyR" && !reloading && ammo<30 && alive) reload(); if(e.code==="KeyF" && alive) toggleScope(); });
    window.addEventListener("keyup", e => K[e.code]=false);
    document.addEventListener("pointerlockchange", () => mL = (document.pointerLockElement===canvas));
    canvas.addEventListener("click", () => { if(document.getElementById("lobby").style.display==="none") canvas.requestPointerLock(); });
    window.addEventListener("mousedown", e => { if(e.button===0 && mL) shoot(); });

    function toggleScope() {
        scoped = !scoped;
        document.getElementById("scope").style.display = scoped ? "block" : "none";
        camera.fov = scoped ? 0.35 : 0.85;
        document.getElementById("xhair").style.display = scoped ? "none" : "block";
        if(gunRoot) gunRoot.isVisible = !scoped;
    }

    // PARTICLE LOGIC (Math optimized)
    function spawnBullet(origin, dir, speed, isEnemy) {
        const b = bulletPoolData[bulletIdx];
        bulletIdx = (bulletIdx + 1) % MAX_BULLETS;
        b.active = true; b.life = 0.4;
        b.pos.copyFrom(origin);
        b.vel.copyFrom(dir).scaleInPlace(speed);
    }

    function spawnSparks(pos, nrm) {
        for(let i=0; i<5; i++) {
            const s = sparkPoolData[sparkIdx];
            sparkIdx = (sparkIdx + 1) % MAX_SPARKS;
            s.active = true; s.life = 0.2;
            s.pos.copyFrom(pos);
            // Random velocity using cheap math
            s.vel.set((Math.random()-0.5)*0.5 + nrm.x*0.5, Math.random()*0.5, (Math.random()-0.5)*0.5 + nrm.z*0.5);
        }
    }

    function shoot() {
        if(!alive||reloading||ammo<=0) return;
        ammo--; updAmmo(); recoil();
        
        // Audio
        const a = audioPool[aIdx]; aIdx = (aIdx+1)%10; a.currentTime=0; a.volume=0.4; a.play().catch(()=>{});
        
        const f = camera.getForwardRay(500); // Reuse ray logic
        const origin = camera.position;
        
        // Hit Scan
        const hit = scene.pickWithRay(f, m => m.isWall || m.hitType);
        let hitPoint = f.origin.add(f.direction.scale(500)); // Default far
        let hitNrm = BABYLON.Vector3.Up();
        
        if(hit.hit && hit.pickedMesh) {
            hitPoint = hit.pickedPoint;
            if(hit.getNormal) hitNrm = hit.getNormal();
            
            if(hit.pickedMesh.hitType) {
                const t = hit.pickedMesh.hitType;
                let dm = DMG[t] || DMG.body;
                if(scoped) dm *= 1.5;
                hitReg(t); 
                // Blood (reuse spark logic)
                for(let i=0; i<3; i++) {
                    const s = sparkPoolData[sparkIdx];
                    sparkIdx = (sparkIdx + 1) % MAX_SPARKS;
                    s.active = true; s.life = 0.3;
                    s.pos.copyFrom(hitPoint);
                    s.vel.set((Math.random()-0.5)*0.3, Math.random()*0.2, (Math.random()-0.5)*0.3);
                }
                if(conn?.open) conn.send({type:"hit", amount:dm, headshot:t==="head", legshot:t==="legs"});
            } else {
                spawnSparks(hitPoint, hitNrm);
            }
        }
        
        // Visual Bullet
        spawnBullet(gunMuzzle.getAbsolutePosition(), f.direction, 150, false);
        
        if(conn?.open) conn.send({type:"shoot", dir:{x:f.direction.x,y:f.direction.y,z:f.direction.z}});
    }
    
    function hitReg(type) {
        const xh = document.getElementById("xhair");
        xh.className = ""; // Reset
        xh.classList.add(type==="head"?"headshot":(type==="legs"?"legshot":"hit"));
        setTimeout(()=>xh.className="", 150);
        
        const hm = document.getElementById("hitmarker");
        hm.className = "show " + (type==="head"?"headshot":(type==="legs"?"legshot":""));
        setTimeout(()=>hm.className="", 200);
        
        kf(type==="head"?"HEADSHOT!":"HIT", type==="head"?"headshot":"dmg");
    }
    
    function reload() { 
        if(reloading) return; 
        reloading=true; 
        kf("RELOADING...","event"); 
        setTimeout(() => { ammo=30; reloading=false; updAmmo(); kf("READY","event"); }, 1400); 
    }

    // MAIN LOOP
    let fi=0, lGY=0;
    
    // Pre-allocate Matrix objects for updating
    const _m = BABYLON.Matrix.Identity();
    
    scene.onBeforeRenderObservable.add(() => {
        const dt = engine.getDeltaTime() / 1000; // Use engine delta directly
        fi++;
        animateGun();
        
        // 1. UPDATE BULLETS
        // Reset visibility flags
        let numActiveBullets = 0;
        for(let i=0; i<MAX_BULLETS; i++) {
            const b = bulletPoolData[i];
            if(b.active) {
                b.life -= dt;
                if(b.life <= 0) { b.active = false; continue; }
                
                // Update pos: pos += vel * dt (Optimized)
                b.vel.scaleToRef(dt, TmpV);
                b.pos.addInPlace(TmpV);
                
                // Update Matrix
                BABYLON.Matrix.TranslationToRef(b.pos.x, b.pos.y, b.pos.z, _m);
                _m.copyToArray(bulletMatrices, i * 16);
                numActiveBullets++;
            } else {
                // Hide inactive by setting scale 0 (or copying zero matrix)
                // For simplicity, we just leave it at last pos but we should hide.
                // But updating buffer every frame for all is slow.
                // Optimization: We only update the buffer once.
            }
        }
        // Upload buffer once
        bulletBase.thinInstanceRefreshBoundingInfo();
        bulletBase.thinInstanceSetBuffer("matrix", bulletMatrices, 16);
        bulletBase.isVisible = numActiveBullets > 0;

        // 2. UPDATE SPARKS
        let numActiveSparks = 0;
        for(let i=0; i<MAX_SPARKS; i++) {
            const s = sparkPoolData[i];
            if(s.active) {
                s.life -= dt;
                if(s.life <= 0) { s.active = false; continue; }
                
                // Gravity
                s.vel.y -= 10 * dt;
                s.vel.scaleToRef(dt, TmpV);
                s.pos.addInPlace(TmpV);
                
                BABYLON.Matrix.TranslationToRef(s.pos.x, s.pos.y, s.pos.z, _m);
                _m.copyToArray(sparkMatrices, i * 16);
                numActiveSparks++;
            }
        }
        sparkBase.thinInstanceRefreshBoundingInfo();
        sparkBase.thinInstanceSetBuffer("matrix", sparkMatrices, 16);
        sparkBase.isVisible = numActiveSparks > 0;

        if(!alive) return;

        // 3. PLAYER PHYSICS
        const spd = K["ShiftLeft"] ? 0.22 : 0.14;
        const cF = camera.getForwardRay().direction; cF.y=0; cF.normalize();
        BABYLON.Vector3.CrossToRef(_u, cF, _r); _r.normalize();
        
        _v.setAll(0); 
        if(K["KeyW"]) _v.addInPlace(cF);
        if(K["KeyS"]) _v.subtractInPlace(cF);
        if(K["KeyA"]) _v.subtractInPlace(_r);
        if(K["KeyD"]) _v.addInPlace(_r);
        
        if(_v.length()>0) _v.normalize().scaleInPlace(spd);
        BABYLON.Vector3.LerpToRef(hVel, _v, 0.15, hVel); // Slightly smoother accel

        // Ground check with Cached Ray
        _gRay.origin.copyFrom(camera.position);
        const gH = scene.pickWithRay(_gRay, m => m.checkCollisions);
        grounded = gH.hit && gH.distance <= CAM_H + 0.15;
        if(grounded && gH.hit) lGY = gH.pickedPoint.y;
        
        if(K["Space"] && grounded) velY.v = 11;
        if(!grounded) velY.v -= 30 * dt; else if(velY.v < 0) velY.v = 0;
        
        // Apply movement
        camera.cameraDirection.set(hVel.x, velY.v * dt, hVel.z);
        
        // Ground constraint
        const mY = (grounded?lGY:0) + CAM_H;
        if(camera.position.y < mY) { camera.position.y = mY; velY.v = 0; }

        // 4. ENEMY INTERP
        if(eNode && eVis) {
            BABYLON.Vector3.LerpToRef(eNode.position, eTP, 0.2, eNode.position);
            eNode.rotation.y = eTR;
            if(eHPBar) { eHPBar.position.set(eNode.position.x, eNode.position.y + 2.5, eNode.position.z); }
        }
        
        // 5. NET SYNC
        if(conn?.open && fi%3===0) conn.send({type:"pos", x:camera.position.x, y:camera.position.y-CAM_H, z:camera.position.z, ry:camera.rotation.y, hp:myHP});
    });

    engine.runRenderLoop(() => scene.render());
    window.addEventListener("resize", () => engine.resize());

    // NET
    const peer = new Peer(undefined, { config: { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] } });
    let conn=null;
    peer.on('open', id => { document.getElementById("myIdTxt").innerText=id; });
    peer.on('connection', c => { conn=c; host=true; setup(); });
    window.connect = () => { const id=document.getElementById("peerInput").value.trim(); if(!id) return; conn=peer.connect(id); host=false; setup(); };
    
    function setup() {
        conn.on('open', () => {
            document.getElementById("lobby").style.display="none";
            buildWeapon(); buildEnemy(); buildEHP();
            mySpawn = host ? SPAWN_A : SPAWN_B; 
            camera.position = mySpawn[0].clone();
            alive=true; myHP=100; ammo=30;
            updHP(); updAmmo();
            kf("CONNECTED", "event");
        });
        conn.on('data', d => {
            if(d.type==="pos"){ if(!eNode) return; eTP.set(d.x, d.y, d.z); eTR=d.ry; if(eHPF) eHPF.width=Math.max(0,d.hp)+"%"; if(!eVis)eVisFn(true); }
            if(d.type==="shoot"){ 
                // Enemy shoot
                const dir = new BABYLON.Vector3(d.dir.x, d.dir.y, d.dir.z); // Alloc necessary here
                spawnBullet(eMuzzle.getAbsolutePosition(), dir, 150, true);
                // Audio spatial (simplified)
                const dist = BABYLON.Vector3.Distance(camera.position, eTP);
                const vol = Math.max(0, 0.8 - dist/100);
                const a = audioPool[aIdx]; aIdx = (aIdx+1)%10; a.currentTime=0; a.volume=vol; a.play().catch(()=>{});
            }
            if(d.type==="hit"){ takeDmg(d.amount); if(d.headshot)kf("HEADSHOT!","headshot"); }
            if(d.type==="died"){ kills++; updKills(); kf("KILL","kill"); eVisFn(false); setTimeout(()=>eVisFn(true),3000); }
        });
        conn.on('close', () => { kf("DC","event"); eVisFn(false); });
    }

    function eVisFn(v) { if(!eNode) return; eNode.getChildMeshes().forEach(m=>m.isVisible=v); if(eHPBar)eHPBar.isVisible=v; eVis=v; }
    
    function takeDmg(a){ if(!alive)return; myHP=Math.max(0,myHP-a); updHP(); document.getElementById("dmg-vignette").classList.add("show"); setTimeout(()=>document.getElementById("dmg-vignette").classList.remove("show"),150); if(myHP<=0)die(); }
    function die(){ if(!alive)return; alive=false; eKills++; updKills(); if(conn?.open)conn.send({type:"died"}); kf("DIED","dmg"); eVisFn(false); const ds=document.getElementById("death-screen"); ds.classList.add("show"); let t=3; const iv=setInterval(()=>{ t--; if(t<=0){clearInterval(iv);respawn();}},1000); }
    function respawn(){ myHP=100; ammo=30; alive=true; updHP(); updAmmo(); document.getElementById("death-screen").classList.remove("show"); camera.position=mySpawn[0].clone(); eVisFn(true); }
    
    function updHP(){ document.getElementById("hp-inner").style.width=myHP+"%"; document.getElementById("hp-num").innerText=myHP; }
    function updAmmo(){ const c=document.getElementById("ammo-cur"); c.innerText=ammo; c.classList.toggle("ammo-low", ammo<=5); }
    function updKills(){ document.getElementById("myKills").innerText=kills; document.getElementById("theirKills").innerText=eKills; }
    function kf(m,t=""){ const f=document.getElementById("killfeed"); const d=document.createElement("div"); d.className="kf "+t; d.innerText=m; f.prepend(d); setTimeout(()=>d.remove(),3000); }
    document.getElementById("myIdDisplay").addEventListener("click", () => { navigator.clipboard.writeText(document.getElementById("myIdTxt").innerText); kf("ID COPIED","event"); });

} catch(e) { console.error(e); alert("Error: "+e.message); }
</script>
</body>
