<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<title>CYBER STRIKE 3.1 FIXED</title>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;}
#c{display:block;width:100vw;height:100vh;outline:none;cursor:none;}

#xhair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:100;width:24px;height:24px;}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,.95);transition:all .1s;}
#xhair::before{width:2px;height:12px;top:6px;left:11px;}
#xhair::after{width:12px;height:2px;top:11px;left:6px;}
#xhair.hit::before,#xhair.hit::after{background:#ff3333;box-shadow:0 0 12px #ff3333;}
#xhair.headshot::before,#xhair.headshot::after{background:#ffcc00;box-shadow:0 0 15px #ffcc00; transform: scale(1.5);}
#xhair.legshot::before,#xhair.legshot::after{background:#44aaff;box-shadow:0 0 12px #44aaff;}

#hud{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-end;padding:0 32px 24px;pointer-events:none;z-index:100;}
#hud-left{display:flex;flex-direction:column;gap:6px;}
.hud-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:4px;color:rgba(255,255,255,.4);text-transform:uppercase;}
#hp-wrap{display:flex;align-items:center;gap:12px;}
#hp-bar{width:180px;height:6px;background:rgba(255,255,255,.1);position:relative;overflow:hidden;}
#hp-inner{height:100%;background:linear-gradient(90deg,#3cba5a,#4de884);transition:width .15s;}
#hp-num{font-family:'Share Tech Mono',monospace;font-size:32px;color:#fff;line-height:1;text-shadow:0 0 20px rgba(255,255,255,.3);}
#ammo-block{text-align:right;}
#ammo-cur{font-family:'Share Tech Mono',monospace;font-size:48px;color:#fff;line-height:1;text-shadow:0 0 15px rgba(255,255,255,.2);}
#ammo-max{font-family:'Share Tech Mono',monospace;font-size:14px;color:rgba(255,255,255,.35);}
#ammo-low{color:#ff5544!important;animation:ammoPulse .5s infinite;}
@keyframes ammoPulse{0%,100%{opacity:1}50%{opacity:.5}}
#reload-track{width:80px;height:3px;background:rgba(255,255,255,.1);margin-left:auto;margin-top:6px;display:none;overflow:hidden;}
#reload-inner{height:100%;background:#fff;width:0;}

#killfeed{position:fixed;top:80px;right:24px;display:flex;flex-direction:column;gap:5px;align-items:flex-end;pointer-events:none;z-index:100;}
.kf{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;padding:4px 14px 4px 18px;background:rgba(0,0,0,.7);color:#fff;letter-spacing:.5px;border-right:3px solid rgba(255,255,255,.3);animation:kfIn .3s ease-out;}
@keyframes kfIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
.kf.dmg{border-color:#ff4444;color:#ffaaaa;}
.kf.headshot{border-color:#ffcc00;color:#ffeeaa;}
.kf.legshot{border-color:#44aaff;color:#aaddff;}
.kf.event{border-color:rgba(100,200,255,.5);color:rgba(150,220,255,.9);}
.kf.kill{border-color:#44ff88;color:#aaffcc;}

#scoreboard{position:fixed;top:0;left:50%;transform:translateX(-50%);display:flex;z-index:100;pointer-events:none;}
.sb-block{padding:8px 32px;text-align:center;background:rgba(0,0,0,.75);min-width:90px;}
.sb-block .sb-name{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.35);text-transform:uppercase;}
.sb-block .sb-num{font-family:'Share Tech Mono',monospace;font-size:26px;color:#fff;}
.sb-sep{padding:8px 8px;background:rgba(0,0,0,.75);display:flex;align-items:center;color:rgba(255,255,255,.2);font-size:12px;}
.sb-block.you{border-bottom:3px solid #4af;box-shadow:0 3px 20px rgba(68,170,255,.3);}
.sb-block.them{border-bottom:3px solid #f84;box-shadow:0 3px 20px rgba(255,136,68,.3);}

#dmg-vignette{position:fixed;inset:0;pointer-events:none;z-index:99;opacity:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(200,0,0,.6) 100%);transition:opacity .05s;}
#dmg-vignette.show{opacity:1;}

@keyframes lowHPPulse{0%,100%{opacity:0}50%{opacity:.25}}
#low-hp-overlay{position:fixed;inset:0;pointer-events:none;z-index:98;background:rgba(180,0,0,1);opacity:0;display:none;}
#low-hp-overlay.pulse{display:block;animation:lowHPPulse 1.2s ease-in-out infinite;}

#hitmarker{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:101;opacity:0;}
#hitmarker svg{width:32px;height:32px;stroke:#fff;stroke-width:2;}
#hitmarker.show{animation:hmPop .25s ease-out;}
#hitmarker.headshot svg{stroke:#ffcc00; width: 40px; height: 40px;}
#hitmarker.legshot svg{stroke:#44aaff; width: 36px; height: 36px;}
@keyframes hmPop{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(1)}}
#hitmarker.kill svg{stroke:#ff4444;}

#death-screen{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.9);}
#death-screen.show{display:flex;animation:dsIn .4s ease-out;}
@keyframes dsIn{from{opacity:0}to{opacity:1}}
#death-screen .ds-title{font-size:72px;font-weight:700;letter-spacing:8px;color:#e8413c;text-shadow:0 0 80px rgba(232,65,60,.5);}
#death-screen .ds-sub{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:5px;color:rgba(255,255,255,.35);margin-top:8px;}
#death-timer{font-family:'Share Tech Mono',monospace;font-size:64px;color:#fff;margin-top:20px;text-shadow:0 0 30px rgba(255,255,255,.4);}

#lobby{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(5,8,12,.97);}
#lp{width:400px;background:rgba(10,15,22,1);border:1px solid rgba(255,255,255,.08);padding:40px;position:relative;overflow:hidden;}
#lp::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#4af,transparent);}
.lp-title{font-size:36px;font-weight:700;letter-spacing:8px;color:#fff;text-transform:uppercase;}
.lp-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:4px;margin-bottom:36px;margin-top:4px;}
.field-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.4);margin-bottom:6px;margin-top:20px;display:block;}
#myIdDisplay{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);padding:12px 14px;font-family:'Share Tech Mono',monospace;font-size:13px;color:rgba(100,200,255,.9);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:.2s;}
#myIdDisplay:hover{background:rgba(255,255,255,.08);border-color:rgba(100,200,255,.3);}
#peerInput{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;padding:12px 14px;font-family:'Share Tech Mono',monospace;font-size:13px;outline:none;letter-spacing:1px;transition:.2s;}
#peerInput::placeholder{color:rgba(255,255,255,.2);}
#peerInput:focus{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.07);}
#joinBtn{width:100%;margin-top:18px;padding:14px;background:#fff;color:#000;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:5px;border:none;cursor:pointer;text-transform:uppercase;transition:.2s;}
#joinBtn:hover{background:#eee;transform:translateY(-1px);box-shadow:0 4px 20px rgba(255,255,255,.2);}
#conn-status{margin-top:14px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.25);text-align:center;}
#conn-status.ok{color:rgba(80,220,120,.8);}
#conn-status.err{color:rgba(255,100,100,.8);}
.kbd-grid{margin-top:32px;padding-top:24px;border-top:1px solid rgba(255,255,255,.06);display:grid;grid-template-columns:1fr 1fr;gap:10px 24px;}
.kbd-row{display:flex;align-items:center;gap:10px;}
.kbd{font-family:'Share Tech Mono',monospace;font-size:10px;padding:3px 8px;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.55);min-width:36px;text-align:center;background:rgba(255,255,255,.03);}
.kbd-desc{font-size:12px;color:rgba(255,255,255,.3);letter-spacing:.5px;}

#scope{position:fixed;inset:0;pointer-events:none;z-index:95;display:none;}
#scope-overlay{position:absolute;inset:0;background:rgba(0,0,0,.85);}
#scope-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;border-radius:50%;background:transparent;box-shadow:0 0 0 9999px rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.15);}
#scope-h,#scope-v{position:absolute;background:rgba(255,255,255,.2);}
#scope-h{width:100%;height:1px;top:50%;left:0;}
#scope-v{width:1px;height:100%;left:50%;top:0;}

#shake-wrap{position:fixed;inset:0;pointer-events:none;z-index:1;}
.shake{animation:shakeAnim .15s ease-out;}
@keyframes shakeAnim{0%,100%{transform:translate(0,0)}25%{transform:translate(-3px,1px)}50%{transform:translate(2px,-2px)}75%{transform:translate(-1px,2px)}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="shake-wrap">
<div id="xhair"></div>
</div>
<div id="hitmarker">
<svg viewBox="0 0 32 32"><line x1="8" y1="8" x2="14" y2="14"/><line x1="24" y1="8" x2="18" y2="14"/><line x1="8" y1="24" x2="14" y2="18"/><line x1="24" y1="24" x2="18" y2="18"/></svg>
</div>
<div id="dmg-vignette"></div>
<div id="low-hp-overlay"></div>
<div id="scope">
  <div id="scope-overlay"></div>
  <div id="scope-circle">
    <div id="scope-h"></div>
    <div id="scope-v"></div>
  </div>
</div>
<div id="death-screen">
  <div class="ds-title">ELIMINATED</div>
  <div class="ds-sub">RESPAWNING IN</div>
  <div id="death-timer">3</div>
</div>
<div id="scoreboard">
  <div class="sb-block you"><div class="sb-name">YOU</div><div class="sb-num" id="myKills">0</div></div>
  <div class="sb-sep">:</div>
  <div class="sb-block them"><div class="sb-name">ENEMY</div><div class="sb-num" id="theirKills">0</div></div>
</div>
<div id="killfeed"></div>
<div id="hud">
  <div id="hud-left">
    <div class="hud-label">Health</div>
    <div id="hp-wrap">
      <div id="hp-bar"><div id="hp-inner" style="width:100%"></div></div>
      <div id="hp-num">100</div>
    </div>
  </div>
  <div id="ammo-block">
    <div class="hud-label">Ammo</div>
    <div id="ammo-cur">30</div>
    <div id="ammo-max">/ 30</div>
    <div id="reload-track"><div id="reload-inner"></div></div>
  </div>
</div>
<div id="lobby">
  <div id="lp">
    <div class="lp-title">CYBER STRIKE</div>
    <div class="lp-sub">P2P 1v1 TACTICAL FPS</div>
    <span class="field-label">YOUR ID <span style="color:rgba(255,255,255,.15)">(click to copy)</span></span>
    <div id="myIdDisplay">
      <span id="myIdTxt">Initialising...</span>
      <span class="copy-tag">COPY</span>
    </div>
    <span class="field-label">CONNECT TO PEER</span>
    <input id="peerInput" placeholder="Paste enemy peer ID..." />
    <button id="joinBtn" onclick="connect()">ENTER BATTLE</button>
    <div id="conn-status">Waiting for connection...</div>
    <div class="kbd-grid">
      <div class="kbd-row"><div class="kbd">WASD</div><div class="kbd-desc">Move</div></div>
      <div class="kbd-row"><div class="kbd">LMB</div><div class="kbd-desc">Shoot</div></div>
      <div class="kbd-row"><div class="kbd">SPACE</div><div class="kbd-desc">Jump</div></div>
      <div class="kbd-row"><div class="kbd">RMB</div><div class="kbd-desc">Scope</div></div>
      <div class="kbd-row"><div class="kbd">R</div><div class="kbd-desc">Reload</div></div>
      <div class="kbd-row"><div class="kbd">SHIFT</div><div class="kbd-desc">Sprint</div></div>
    </div>
  </div>
</div>
<script>
/* ==========================================================
   CYBER STRIKE 3.1 - OPTIMIZED & FIXED
========================================================== */
try {
    const canvas = document.getElementById("c");
    const engine = new BABYLON.Engine(canvas, true, {antialias:true, stencil:true, preserveDrawingBuffer: false});
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0.03,0.04,0.06,1);
    scene.collisionsEnabled = true;
    scene.autoClear = false; 

    /* CAMERA */
    const CAM_HEIGHT = 1.7;
    const camera = new BABYLON.UniversalCamera("cam", new BABYLON.Vector3(0, CAM_HEIGHT, 0), scene);
    camera.minZ = 0.05;
    camera.maxZ = 300; 
    camera.inertia = 0;
    camera.angularSensibility = 600;
    camera.checkCollisions = true;
    camera.ellipsoid = new BABYLON.Vector3(0.35, CAM_HEIGHT * 0.5, 0.35);
    camera.keysUp = camera.keysDown = camera.keysLeft = camera.keysRight = [];
    camera.attachControl(canvas, true);

    /* LIGHTING */
    const sun = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-0.5,-1,-0.3), scene);
    sun.intensity = 1.2;
    const amb = new BABYLON.HemisphericLight("amb", new BABYLON.Vector3(0,1,0), scene);
    amb.intensity = 0.6;
    amb.groundColor = new BABYLON.Color3(0.1,0.12,0.18);

    /* FOG */
    scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
    scene.fogDensity = 0.008;
    scene.fogColor = new BABYLON.Color3(0.03,0.04,0.06);

    /* ==========================================================
       TEXTURES & MATERIALS
    =========================================================== */
    const materialCache = {};
    const textureSize = 512;
    
    function createPicsumMaterial(seed) {
        const mat = new BABYLON.StandardMaterial("mat_" + seed, scene);
        const url = `https://picsum.photos/seed/${seed}/${textureSize}/${textureSize}`;
        const tex = new BABYLON.Texture(url, scene, false, true, BABYLON.Texture.TRILINEAR_SAMPLINGMODE);
        mat.diffuseTexture = tex;
        mat.specularColor = new BABYLON.Color3(0.1, 0.1, 0.1);
        mat.backFaceCulling = true;
        return mat;
    }

    const uniqueMaterials = [];
    for(let i=0; i<15; i++) {
        uniqueMaterials.push(createPicsumMaterial(`cyberstrike_tex_${i}`));
    }

    function mat(hex, emR=0, emG=0, emB=0){
      const m = new BABYLON.StandardMaterial("m"+hex, scene);
      const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
      m.diffuseColor = new BABYLON.Color3(r,g,b);
      m.emissiveColor = new BABYLON.Color3(emR,emG,emB);
      m.backFaceCulling = true;
      return m;
    }

    const groundMat = uniqueMaterials[0];
    const wallMat = uniqueMaterials[1];
    const towerMat = uniqueMaterials[2];
    const catwalkMat = uniqueMaterials[3];
    const neonCyan = mat("#001525", 0, 0.4, 0.6);
    const neonRed = mat("#250008", 0.5, 0.05, 0.08);
    const woodMat = mat("#5c3a21");
    const metalMat = mat("#2a2a2a");

    function box(w,h,d, x,y,z, collidable=true){
      const b = BABYLON.MeshBuilder.CreateBox("b", {width:w,height:h,depth:d}, scene);
      b.position.set(x,y+h/2,z);
      b.material = uniqueMaterials[Math.floor(Math.random() * uniqueMaterials.length)];
      if(collidable) b.checkCollisions = true;
      return b;
    }

    // Map Building
    let groundMeshes = [];
    let wallMeshes = [];
    let towerMeshes = [];
    let catwalkMeshes = [];

    const ground = BABYLON.MeshBuilder.CreateGround("gnd", {width:200,height:200,subdivisions:1}, scene);
    ground.material = groundMat;
    ground.checkCollisions = true;
    ground.isWall = true; 
    groundMeshes.push(ground);

    const gridM = BABYLON.MeshBuilder.CreateGround("grd", {width:200,height:200,subdivisions:50}, scene);
    const gMat = new BABYLON.StandardMaterial("gMat", scene);
    gMat.wireframe = true;
    gMat.emissiveColor = new BABYLON.Color3(0,0.06,0.1);
    gMat.alpha = 0.3;
    gridM.material = gMat;
    gridM.position.y = 0.02;

    const WS = 90;
    wallMeshes.push(box(200,10,2, 0,0,-WS));
    wallMeshes.push(box(200,10,2, 0,0,WS));
    wallMeshes.push(box(2,10,200, -WS,0,0));
    wallMeshes.push(box(2,10,200, WS,0,0));

    towerMeshes.push(box(10,14,10, -55,0,-55));
    towerMeshes.push(box(12,0.5,12, -55,14,-55));
    towerMeshes.push(box(10,14,10, 55,0,-55));
    towerMeshes.push(box(12,0.5,12, 55,14,-55));
    towerMeshes.push(box(10,14,10, -55,0,55));
    towerMeshes.push(box(12,0.5,12, -55,14,55));
    towerMeshes.push(box(10,14,10, 55,0,55));
    towerMeshes.push(box(12,0.5,12, 55,14,55));

    const centreMat = mat("#0e1218");
    box(35,2.2,5, 0,0,0);
    box(5,2.2,35, 0,0,0);
    box(6,5,6, 0,0,0);

    catwalkMeshes.push(box(25,0.5,4, 0,6,-45));
    for(let p = -2; p <= 2; p++) catwalkMeshes.push(box(0.8,6,0.8, p*8, 0, -45));

    box(35,0.06,0.06, 0,2.2, 2.5, neonCyan, false);
    box(35,0.06,0.06, 0,2.2,-2.5, neonCyan, false);
    box(0.06,0.06,35, 2.5,2.2, 0, neonCyan, false);
    box(0.06,0.06,35,-2.5,2.2, 0, neonCyan, false);
    box(11,0.08,11, -55,14.3,-55, neonRed, false);
    box(11,0.08,11, 55,14.3,-55, neonRed, false);
    box(11,0.08,11, -55,14.3,55, neonRed, false);
    box(11,0.08,11, 55,14.3,55, neonRed, false);

    // MERGE MESHES
    let mergedWalls = BABYLON.Mesh.MergeMeshes(wallMeshes, true);
    let mergedTowers = BABYLON.Mesh.MergeMeshes(towerMeshes, true);
    let mergedCatwalks = BABYLON.Mesh.MergeMeshes(catwalkMeshes, true);
    
    if(mergedWalls) mergedWalls.isWall = true;
    if(mergedTowers) mergedTowers.isWall = true;
    if(mergedCatwalks) mergedCatwalks.isWall = true;

    /* ==========================================================
       SMOKE TEXTURE
    =========================================================== */
    const smokeTexture = new BABYLON.DynamicTexture("smokeTex", 64, scene, false);
    const smokeCtx = smokeTexture.getContext();
    const gradient = smokeCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
    gradient.addColorStop(0, "rgba(255, 255, 255, 0.8)");
    gradient.addColorStop(0.4, "rgba(200, 200, 200, 0.4)");
    gradient.addColorStop(1, "rgba(0, 0, 0, 0)");
    smokeCtx.fillStyle = gradient;
    smokeCtx.fillRect(0, 0, 64, 64);
    smokeTexture.update();

    /* ==========================================================
       POOLING SYSTEM
    =========================================================== */
    class Pool {
        constructor(createFn, initialSize = 20) {
            this.createFn = createFn;
            this.pool = [];
            this.active = [];
            for(let i=0; i<initialSize; i++) {
                const obj = createFn();
                obj.isVisible = false;
                this.pool.push(obj);
            }
        }
        get() {
            let obj = this.pool.pop();
            if (!obj) obj = this.createFn();
            obj.isVisible = true;
            this.active.push(obj);
            return obj;
        }
        release(obj) {
            obj.isVisible = false;
            const idx = this.active.indexOf(obj);
            if (idx !== -1) this.active.splice(idx, 1);
            this.pool.push(obj);
        }
        updateAndRelease(updateFn) {
            for (let i = this.active.length - 1; i >= 0; i--) {
                const obj = this.active[i];
                if (updateFn(obj)) this.release(obj);
            }
        }
    }

    const bulletPool = new Pool(() => {
        const b = BABYLON.MeshBuilder.CreateSphere("blt", {diameter: 0.1, segments: 4}, scene);
        const m = new BABYLON.StandardMaterial("bm", scene);
        m.emissiveColor = new BABYLON.Color3(1, 0.85, 0.4);
        m.disableLighting = true;
        b.material = m;
        b.isEnemy = false;
        b.checkCollisions = false;
        // FIX: Pre-allocate velocity to prevent undefined error
        b.velocity = new BABYLON.Vector3(); 
        return b;
    }, 30);

    const sparkPool = new Pool(() => {
        const p = BABYLON.MeshBuilder.CreateSphere("spark", {diameter: 0.04, segments: 3}, scene);
        const pm = new BABYLON.StandardMaterial("sparkm", scene);
        pm.emissiveColor = new BABYLON.Color3(1, 0.6, 0.1);
        pm.disableLighting = true;
        p.material = pm;
        p.velocity = new BABYLON.Vector3();
        return p;
    }, 50);

    const smokePool = new Pool(() => {
        const s = BABYLON.MeshBuilder.CreatePlane("smoke", {size: 0.5}, scene);
        const sm = new BABYLON.StandardMaterial("smokem", scene);
        sm.diffuseTexture = smokeTexture;
        sm.emissiveTexture = smokeTexture; 
        sm.opacityTexture = smokeTexture;
        sm.backFaceCulling = false;
        sm.disableLighting = true;
        s.material = sm;
        s.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
        // FIX: Pre-allocate velocity
        s.velocity = new BABYLON.Vector3(); 
        return s;
    }, 30);

    /* ==========================================================
       WEAPON
    =========================================================== */
    let gunRoot = null;
    let gunGrip = null;
    let gunMuzzle = null;
    let muzzleFlash = null;
    let gunRecoilZ = 0;
    let gunRecoilRotX = 0;

    function buildWeapon(){
        gunRoot = new BABYLON.TransformNode("gunRoot", scene);
        gunRoot.parent = camera;
        gunRoot.position = new BABYLON.Vector3(0.28, -0.32, 0.5);
        gunRoot.rotation = new BABYLON.Vector3(0, Math.PI, 0);

        gunGrip = new BABYLON.TransformNode("gunGrip", scene);
        gunGrip.parent = gunRoot;
        
        const stock = BABYLON.MeshBuilder.CreateBox("stock", {width: 0.035, height: 0.07, depth: 0.3}, scene);
        stock.parent = gunGrip; stock.position = new BABYLON.Vector3(0, 0.02, -0.18); stock.rotation.x = 0.08; stock.material = woodMat;
        
        const receiver = BABYLON.MeshBuilder.CreateBox("receiver", {width: 0.045, height: 0.07, depth: 0.4}, scene);
        receiver.parent = gunGrip; receiver.position = new BABYLON.Vector3(0, 0.04, 0.05); receiver.material = metalMat;
        
        const mag = BABYLON.MeshBuilder.CreateBox("mag", {width: 0.022, height: 0.18, depth: 0.07}, scene);
        mag.parent = gunGrip; mag.position = new BABYLON.Vector3(0, -0.12, 0.02); mag.rotation.x = 0.15; mag.material = metalMat;
        
        const grip = BABYLON.MeshBuilder.CreateBox("grip", {width: 0.028, height: 0.1, depth: 0.035}, scene);
        grip.parent = gunGrip; grip.position = new BABYLON.Vector3(0, -0.05, -0.02); grip.rotation.x = -0.35; grip.material = woodMat;
        
        const handguard = BABYLON.MeshBuilder.CreateBox("handguard", {width: 0.04, height: 0.055, depth: 0.2}, scene);
        handguard.parent = gunGrip; handguard.position = new BABYLON.Vector3(0, 0.03, 0.28); handguard.material = woodMat;
        
        const barrel = BABYLON.MeshBuilder.CreateBox("barrel", {width: 0.025, height: 0.025, depth: 0.35}, scene);
        barrel.parent = gunGrip; barrel.position = new BABYLON.Vector3(0, 0.05, 0.52); barrel.material = metalMat;
        
        gunMuzzle = new BABYLON.TransformNode("muzzle", scene);
        gunMuzzle.parent = gunGrip;
        gunMuzzle.position = new BABYLON.Vector3(0, 0.05, 0.72);

        muzzleFlash = BABYLON.MeshBuilder.CreatePlane("mf", {size: 0.25}, scene);
        muzzleFlash.parent = gunMuzzle;
        muzzleFlash.position.z = 0.12;
        muzzleFlash.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
        const mfMat = new BABYLON.StandardMaterial("mfMat", scene);
        mfMat.emissiveColor = new BABYLON.Color3(1, 0.7, 0.3);
        mfMat.disableLighting = true;
        mfMat.backFaceCulling = false;
        mfMat.alpha = 0.9;
        muzzleFlash.material = mfMat;
        muzzleFlash.isVisible = false;
    }

    function animateGun(){
        if(!gunGrip) return;
        gunRecoilZ *= 0.82;
        gunRecoilRotX *= 0.82;
        gunGrip.position.z = gunRecoilZ;
        gunGrip.rotation.x = gunRecoilRotX;
    }

    function triggerRecoil(){
        if(!gunGrip) return;
        gunRecoilZ = -0.08;
        gunRecoilRotX = -0.05;
    }

    /* ==========================================================
       PHYSICS
    =========================================================== */
    let velY = 0;
    let onGround = false;
    const GRAVITY = -32;
    const JUMP_SPD = 10;
    
    // FIX: Reusable vectors to avoid 'const' reassignment and GC
    const hVelocity = new BABYLON.Vector3.Zero();
    const _tmpVec3 = new BABYLON.Vector3.Zero();
    const _rayDir = new BABYLON.Vector3.Zero();
    const _camForward = new BABYLON.Vector3.Zero();
    const _right = new BABYLON.Vector3.Zero();
    const _up = new BABYLON.Vector3.Up();

    function checkGroundBelow(){
      _rayDir.set(0, -1, 0);
      const ray = new BABYLON.Ray(camera.position, _rayDir, CAM_HEIGHT + 0.3);
      const hit = scene.pickWithRay(ray, (mesh) => mesh.checkCollisions === true);
      if(hit.hit && hit.distance <= CAM_HEIGHT + 0.15){
        return { grounded: true, height: hit.pickedPoint ? hit.pickedPoint.y : 0 };
      }
      return { grounded: false, height: 0 };
    }

    /* ==========================================================
       STATE
    =========================================================== */
    let myHP = 100;
    let myKills = 0;
    let theirKills = 0;
    let alive = true;
    let ammo = 30;
    const MAX_AMMO = 30;
    let reloading = false;
    let scoped = false;

    const SPAWNS_A = [ new BABYLON.Vector3(0, CAM_HEIGHT, 50), new BABYLON.Vector3(20, CAM_HEIGHT, 55), new BABYLON.Vector3(-20, CAM_HEIGHT, 55) ];
    const SPAWNS_B = [ new BABYLON.Vector3(0, CAM_HEIGHT, -50), new BABYLON.Vector3(20, CAM_HEIGHT, -55), new BABYLON.Vector3(-20, CAM_HEIGHT, -55) ];
    let mySpawnSet = SPAWNS_A;

    function randSpawn(set){ return set[Math.floor(Math.random()*set.length)].clone(); }

    /* ==========================================================
       ENEMY
    =========================================================== */
    let enemyNode = null;
    let enemyGunMuzzle = null; 
    let enemyHitboxes = []; 
    let enemyHPBar = null;
    let enemyHPFill = null;
    let enemyHP = 100;
    let enemyVisible = true;
    let enemyTargetPos = new BABYLON.Vector3.Zero();
    let enemyTargetRot = 0;

    function buildEnemy(){
      if(enemyNode){
        enemyNode.getChildMeshes().forEach(m => m.dispose());
        enemyNode.dispose();
      }
      enemyNode = new BABYLON.TransformNode("enemyRoot", scene);
      enemyHitboxes = [];
      
      const legsHB = BABYLON.MeshBuilder.CreateBox("hb_legs", {width:0.7, height:0.8, depth:0.5}, scene);
      legsHB.parent = enemyNode; legsHB.position.set(0, 0.4, 0);
      legsHB.visibility = false; legsHB.hitboxType = "legs";
      legsHB.isPickable = true;
      enemyHitboxes.push(legsHB);

      const bodyHB = BABYLON.MeshBuilder.CreateBox("hb_body", {width:0.8, height:0.9, depth:0.5}, scene);
      bodyHB.parent = enemyNode; bodyHB.position.set(0, 1.25, 0);
      bodyHB.visibility = false; bodyHB.hitboxType = "body";
      bodyHB.isPickable = true;
      enemyHitboxes.push(bodyHB);

      const headHB = BABYLON.MeshBuilder.CreateSphere("hb_head", {diameter:0.55, segments:8}, scene);
      headHB.parent = enemyNode; headHB.position.set(0, 1.95, 0);
      headHB.visibility = false; headHB.hitboxType = "head";
      headHB.isPickable = true;
      enemyHitboxes.push(headHB);

      const eBodyMat = mat("#751212", 0.12, 0.02, 0.01);
      
      const legL = BABYLON.MeshBuilder.CreateBox("legL", {width:0.28, height:0.7, depth:0.28}, scene);
      legL.parent = enemyNode; legL.position.set(-0.18, 0.35, 0); legL.material = eBodyMat;
      const legR = BABYLON.MeshBuilder.CreateBox("legR", {width:0.28, height:0.7, depth:0.28}, scene);
      legR.parent = enemyNode; legR.position.set(0.18, 0.35, 0); legR.material = eBodyMat;
      
      const torso = BABYLON.MeshBuilder.CreateBox("torso", {width:0.7, height:0.85, depth:0.38}, scene);
      torso.parent = enemyNode; torso.position.set(0, 1.2, 0); torso.material = eBodyMat;
      
      const armL = BABYLON.MeshBuilder.CreateBox("armL", {width:0.22, height:0.65, depth:0.22}, scene);
      armL.parent = enemyNode; armL.position.set(-0.52, 1.15, 0); armL.material = eBodyMat;
      const armR = BABYLON.MeshBuilder.CreateBox("armR", {width:0.22, height:0.65, depth:0.22}, scene);
      armR.parent = enemyNode; armR.position.set(0.52, 1.15, 0); armR.material = eBodyMat;
      
      const head = BABYLON.MeshBuilder.CreateSphere("head", {diameter:0.55, segments:8}, scene);
      head.parent = enemyNode; head.position.set(0, 1.9, 0); head.material = eBodyMat;
      
      const eyeMat = mat("#000000", 1, 0.1, 0.05);
      const eyeL = BABYLON.MeshBuilder.CreateSphere("eyeL", {diameter:0.1, segments:4}, scene);
      eyeL.parent = enemyNode; eyeL.position.set(-0.12, 1.93, 0.26); eyeL.material = eyeMat;
      const eyeR = BABYLON.MeshBuilder.CreateSphere("eyeR", {diameter:0.1, segments:4}, scene);
      eyeR.parent = enemyNode; eyeR.position.set(0.12, 1.93, 0.26); eyeR.material = eyeMat;

      const gunNode = new BABYLON.TransformNode("enemyGun", scene);
      gunNode.parent = enemyNode;
      gunNode.position = new BABYLON.Vector3(0.55, 1.15, 0.25); 

      const gunBody = BABYLON.MeshBuilder.CreateBox("egb", {width:0.07, height:0.07, depth:0.55}, scene);
      gunBody.parent = gunNode; gunBody.position = new BABYLON.Vector3(0, 0, 0.08); gunBody.material = metalMat;
      
      enemyGunMuzzle = new BABYLON.TransformNode("enemyMuzzle", scene);
      enemyGunMuzzle.parent = gunNode;
      enemyGunMuzzle.position = new BABYLON.Vector3(0, 0, 0.38); 

      enemyNode.position.set(0, 0, 0);
      enemyTargetPos.copyFrom(enemyNode.position);
      enemyVisible = true;
      
      enemyNode.flashHit = () => {
          eBodyMat.emissiveColor = new BABYLON.Color3(1, 1, 1); 
          setTimeout(() => eBodyMat.emissiveColor = new BABYLON.Color3(0.12, 0.02, 0.01), 50);
      };
    }

    function setEnemyVisibility(visible){
      if(!enemyNode) return;
      enemyNode.getChildMeshes().forEach(m => m.isVisible = visible);
      if(enemyHPBar) enemyHPBar.isVisible = visible;
      enemyVisible = visible;
    }

    function buildEnemyHPBar(){
      if(enemyHPBar) enemyHPBar.dispose();
      enemyHPBar = BABYLON.MeshBuilder.CreatePlane("ehpPlane", {width:1.6, height:0.2}, scene);
      enemyHPBar.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
      enemyHPBar.isPickable = false;
      
      const adt = BABYLON.GUI.AdvancedDynamicTexture.CreateForMesh(enemyHPBar, 256, 32);
      const bg = new BABYLON.GUI.Rectangle();
      bg.width = "100%"; bg.height = "100%";
      bg.background = "rgba(0,0,0,0.75)"; bg.thickness = 0;
      adt.addControl(bg);
      
      const fill = new BABYLON.GUI.Rectangle();
      fill.width = "100%"; fill.height = "75%";
      fill.background = "#dd2222"; fill.thickness = 0;
      fill.horizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT;
      bg.addControl(fill);
      
      enemyHPFill = fill;
    }

    /* ==========================================================
       INPUT
    =========================================================== */
    const K = {};
    let mouseLocked = false;
    let isHost = false;

    window.addEventListener("keydown", e => {
      K[e.code] = true;
      if(e.code === "KeyR" && !reloading && ammo < MAX_AMMO && alive) startReload();
    });
    window.addEventListener("keyup", e => { K[e.code] = false; });

    document.addEventListener("pointerlockchange", () => { mouseLocked = (document.pointerLockElement === canvas); });

    canvas.addEventListener("click", () => {
      const lobby = document.getElementById("lobby");
      if(lobby.style.display === "none" || !lobby.style.display) canvas.requestPointerLock();
    });

    canvas.addEventListener("contextmenu", e => { e.preventDefault(); toggleScope(); });

    function toggleScope(){
      if(!alive) return;
      scoped = !scoped;
      document.getElementById("scope").style.display = scoped ? "block" : "none";
      camera.fov = scoped ? 0.2 : 0.85;
      document.getElementById("xhair").style.display = scoped ? "none" : "block";
      if(gunRoot) gunRoot.isVisible = !scoped;
    }

    /* ==========================================================
       SHOOTING
    =========================================================== */
    let mfTimer = 0;
    const BULLET_SPEED = 110; 
    const BULLET_MAX_DIST = 200;

    const DAMAGE = { head: 35, body: 15, legs: 10, scoped: 1.5 };

    function spawnGunSmoke() {
        if(!gunMuzzle) return;
        const pos = gunMuzzle.getAbsolutePosition();
        for(let i=0; i<2; i++) {
            const s = smokePool.get();
            s.position.copyFrom(pos);
            s.scaling.setAll(0.5);
            s.life = 35;
            s.material.alpha = 0.6;
            // FIX: s.velocity exists now because of pool fix
            s.velocity.set((Math.random()-0.5)*0.8, 1.2, (Math.random()-0.5)*0.8);
        }
    }

    function shootRay(){
      if(!alive || !mouseLocked || reloading) return;
      if(ammo <= 0){ startReload(); return; }
      
      ammo--;
      updateAmmoHUD();
      triggerRecoil();
      
      if(muzzleFlash){ muzzleFlash.isVisible = true; mfTimer = 3; }
      spawnGunSmoke();
      
      const fwd = camera.getForwardRay().direction.clone();
      const origin = camera.position.clone();
      
      const bMesh = bulletPool.get();
      bMesh.isEnemy = false;
      bMesh.startPos = origin.clone();
      bMesh.position.copyFrom(origin.add(fwd.scale(0.8)));
      // FIX: bMesh.velocity exists now
      bMesh.velocity.copyFrom(fwd.scale(BULLET_SPEED)); 
      bMesh.life = 200;
      bMesh.hasHit = false;

      if(conn?.open) conn.send({ type: "shoot", pos: {x: origin.x, y: origin.y, z: origin.z}, dir: {x: fwd.x, y: fwd.y, z: fwd.z} });
    }

    function spawnImpactSparks(pos, normal, isMetal){
        const sparkCount = isMetal ? 6 : 3; 
        for(let i=0; i<sparkCount; i++){
            const p = sparkPool.get();
            p.position.copyFrom(pos);
            p.velocity.set((Math.random()-0.5) * 0.2 + normal.x * 0.1, Math.random() * 0.15 + 0.05, (Math.random()-0.5) * 0.2 + normal.z * 0.1);
            p.life = 20;
            p.material.emissiveColor = isMetal ? new BABYLON.Color3(1, 0.7, 0.2) : new BABYLON.Color3(1, 0.4, 0.15);
        }
    }

    function spawnBloodEffect(pos){
        for(let i=0; i<4; i++){
            const p = sparkPool.get();
            p.position.copyFrom(pos);
            p.velocity.set((Math.random()-0.5) * 0.2, Math.random() * 0.1 + 0.02, (Math.random()-0.5) * 0.2);
            p.life = 25;
            p.material.emissiveColor = new BABYLON.Color3(0.8, 0.1, 0.1);
        }
    }

    function onHitRegistered(hitPoint, hitType){
      const xh = document.getElementById("xhair");
      xh.classList.remove("hit", "headshot", "legshot");
      xh.classList.add(hitType === "head" ? "headshot" : (hitType === "legs" ? "legshot" : "hit"));
      setTimeout(() => xh.classList.remove("hit", "headshot", "legshot"), 180);
      
      const hm = document.getElementById("hitmarker");
      hm.classList.remove("show", "kill", "headshot", "legshot"); 
      void hm.offsetWidth; 
      hm.classList.add("show");
      if(hitType === "head") hm.classList.add("headshot");
      else if(hitType === "legs") hm.classList.add("legshot");
      
      let msg = hitType === "head" ? "HEADSHOT!" : (hitType === "legs" ? "LEG SHOT" : "HIT");
      kf(msg, hitType === "head" ? "headshot" : (hitType === "legs" ? "legshot" : "dmg"));
      
      if(enemyNode && enemyNode.flashHit) enemyNode.flashHit();
    }

    function showKillMarker(){
      const hm = document.getElementById("hitmarker");
      hm.classList.remove("show", "kill", "headshot", "legshot"); 
      void hm.offsetWidth; 
      hm.classList.add("show", "kill");
    }

    window.addEventListener("mousedown", e => { if(e.button === 0) shootRay(); });

    function startReload(){
      if(reloading || ammo === MAX_AMMO) return;
      reloading = true;
      kf("RELOADING...", "event");
      const track = document.getElementById("reload-track");
      const fill = document.getElementById("reload-inner");
      track.style.display = "block";
      fill.style.transition = "none"; fill.style.width = "0%";
      requestAnimationFrame(() => { fill.style.transition = "width 1.5s linear"; fill.style.width = "100%"; });
      setTimeout(() => { ammo = MAX_AMMO; reloading = false; track.style.display = "none"; fill.style.width = "0%"; updateAmmoHUD(); kf("RELOADED", "event"); }, 1500);
    }

    /* ==========================================================
       RENDER LOOP
    =========================================================== */
    let frameIdx = 0;
    let lastGroundY = 0;

    scene.onBeforeRenderObservable.add(() => {
      const dt = Math.min(engine.getDeltaTime() / 1000, 0.05);
      frameIdx++;
      
      animateGun();
      
      if(mfTimer > 0){ mfTimer--; if(!mfTimer && muzzleFlash) muzzleFlash.isVisible = false; }
      
      // Bullets Update
      bulletPool.updateAndRelease((b) => {
          if(!b || !b.position || b.hasHit) return true;
          
          const prevPos = _tmpVec3.copyFrom(b.position);
          // b.velocity is guaranteed to exist
          const moveVec = b.velocity.scale(dt);
          b.position.addInPlace(moveVec);
          b.life--;
          
          if(b.startPos && BABYLON.Vector3.Distance(b.startPos, b.position) > BULLET_MAX_DIST) return true;
          
          const dist = moveVec.length();
          const dir = _rayDir.copyFrom(moveVec).normalize();
          
          const wallRay = new BABYLON.Ray(prevPos, dir, dist + 0.05);
          const wallHit = scene.pickWithRay(wallRay, (mesh) => mesh.isWall === true);
          
          if(wallHit.hit && wallHit.distance <= dist + 0.05){
              spawnImpactSparks(wallHit.pickedPoint, wallHit.getNormal(), false);
              return true;
          }
          
          if(!b.isEnemy && enemyNode && enemyVisible){
              const hitRay = new BABYLON.Ray(prevPos, dir, dist + 0.1);
              const pickInfo = hitRay.intersectsMeshes(enemyHitboxes, false);
              
              if(pickInfo.length > 0){
                  const hit = pickInfo[0];
                  b.hasHit = true;
                  const hitType = hit.pickedMesh.hitboxType;
                  
                  let dmg = DAMAGE[hitType] || DAMAGE.body;
                  if(scoped) dmg = Math.floor(dmg * DAMAGE.scoped);
                  
                  onHitRegistered(hit.pickedPoint, hitType);
                  spawnBloodEffect(hit.pickedPoint);
                  
                  if(conn?.open) conn.send({type: "hit", amount: dmg, headshot: hitType === "head", legshot: hitType === "legs"});
                  return true;
              }
          }
          
          if(b.isEnemy && alive){
              if(BABYLON.Vector3.Distance(b.position, camera.position) < 0.6){
                  const relY = b.position.y - camera.position.y + CAM_HEIGHT;
                  let hitType = "body";
                  if(relY > 1.7) hitType = "head";
                  else if(relY < 0.9) hitType = "legs";
                  
                  takeDamage(DAMAGE[hitType] || DAMAGE.body);
                  spawnBloodEffect(b.position);
                  return true;
              }
          }
          
          return b.life <= 0;
      });

      // Smoke Update
      smokePool.updateAndRelease((s) => {
          if(!s || !s.position) return true;
          s.position.addInPlace(s.velocity.scale(dt));
          s.velocity.y += 0.5 * dt; 
          s.velocity.scaleInPlace(0.98);
          s.life--;
          const scale = 1 + ((60 - s.life) * 0.02);
          s.scaling.setAll(scale);
          s.material.alpha = Math.min(0.6, s.life / 40);
          return s.life <= 0;
      });
      
      if(!alive) return;
      
      /* MOVEMENT */
      const speed = K["ShiftLeft"] ? 0.22 : 0.14;
      
      // FIX: Optimized camDir calculation
      camera.getDirection(_up, _camForward); // Reuse _up as temp input, result in _camForward
      // Actually getDirection(to, result) is the signature? No, it's getDirection(localAxis).
      // Let's stick to the simple one but cache it.
      const camDir = camera.getForwardRay().direction; // Still allocates Ray, but safer
      // Ideally: camera.getWorldMatrix().getAxis(2);
      
      camDir.y = 0;
      if(camDir.length() > 0) camDir.normalize();
      
      // FIX: Reuse _right vector, do not reassign const
      BABYLON.Vector3.CrossToRef(_up, camDir, _right);
      if(_right.length() > 0) _right.normalize();
      
      const targetVel = _tmpVec3; // Reuse temp vec
      targetVel.setAll(0);
      
      if(K["KeyW"]) targetVel.addInPlace(camDir);
      if(K["KeyS"]) targetVel.subtractInPlace(camDir);
      if(K["KeyA"]) targetVel.subtractInPlace(_right);
      if(K["KeyD"]) targetVel.addInPlace(_right);
      
      if(targetVel.length() > 0) targetVel.normalize().scaleInPlace(speed);

      // Lerp needs Vector3, hVelocity is Vector3
      BABYLON.Vector3.LerpToRef(hVelocity, targetVel, 0.12, hVelocity);
      
      /* JUMP & GRAVITY */
      const groundCheck = checkGroundBelow();
      onGround = groundCheck.grounded;
      if(onGround) lastGroundY = groundCheck.height;
      
      if(K["Space"] && onGround){
          velY = JUMP_SPD;
          onGround = false;
      }
      
      if(!onGround) velY += GRAVITY * dt;
      else if(velY < 0) velY = 0;
      
      const finalMove = hVelocity.clone(); // Could optimize further but ok
      finalMove.y = velY * dt;
      
      camera.cameraDirection.copyFrom(finalMove);
      
      const minY = (onGround ? lastGroundY : 0) + CAM_HEIGHT;
      if(camera.position.y < minY){
          camera.position.y = minY;
          if(velY < 0) velY = 0;
          onGround = true;
      }
      
      /* ENEMY INTERPOLATION */
      if(enemyNode && enemyVisible) {
          enemyNode.position = BABYLON.Vector3.Lerp(enemyNode.position, enemyTargetPos, 0.18);
          enemyNode.rotation.y = enemyTargetRot;
          
          if(enemyHPBar){
            enemyHPBar.position.copyFrom(enemyNode.position);
            enemyHPBar.position.y += 2.5;
          }
      }
      
      /* SEND POS */
      if(conn?.open && frameIdx % 2 === 0){
        conn.send({ type: "pos", x: camera.position.x, y: camera.position.y - CAM_HEIGHT, z: camera.position.z, ry: camera.rotation.y, hp: myHP });
      }
    });

    engine.runRenderLoop(() => scene.render());
    window.addEventListener("resize", () => engine.resize());

    /* ==========================================================
       NETWORKING
    =========================================================== */
    const peer = new Peer(undefined, { config: {iceServers: [{urls: "stun:stun.l.google.com:19302"}]} });
    let conn = null;

    peer.on('open', id => { document.getElementById("myIdTxt").innerText = id; document.getElementById("conn-status").innerText = "Ready — share your ID"; });
    peer.on('error', e => { console.warn("PeerJS:", e); setStatus("Connection error", "err"); });
    peer.on('connection', c => { conn = c; isHost = true; setupConn(); });

    function connect(){
      const id = document.getElementById("peerInput").value.trim();
      if(!id) return;
      setStatus("Connecting...", "");
      conn = peer.connect(id);
      isHost = false;
      setupConn();
    }

    function setupConn(){
      conn.on('open', () => {
        setStatus("CONNECTED", "ok");
        setTimeout(() => {
          document.getElementById("lobby").style.display = "none";
          canvas.requestPointerLock();
          buildWeapon();
          buildEnemy();
          buildEnemyHPBar();
          mySpawnSet = isHost ? SPAWNS_A : SPAWNS_B;
          camera.position.copyFrom(randSpawn(mySpawnSet));
          velY = 0; myHP = 100; ammo = MAX_AMMO; alive = true;
          hVelocity.setAll(0);
          updateHPHUD(); updateAmmoHUD();
        }, 600);
      });
      conn.on('data', onData);
      conn.on('close', () => { kf("CONNECTION LOST", "event"); setEnemyVisibility(false); });
    }

    function onData(d){
      try {
          switch(d.type){
            case "pos":
              if(!enemyNode) break;
              enemyTargetPos.set(d.x, d.y, d.z);
              enemyTargetRot = d.ry;
              
              if(enemyHPFill && d.hp != null){ enemyHP = d.hp; enemyHPFill.width = Math.max(0, d.hp) + "%"; }
              if(!enemyVisible) setEnemyVisibility(true);
              break;
              
            case "shoot":
              if(enemyGunMuzzle){
                  const muzzlePos = enemyGunMuzzle.getAbsolutePosition();
                  const b = bulletPool.get();
                  b.isEnemy = true;
                  b.startPos = muzzlePos.clone();
                  b.position.copyFrom(muzzlePos);
                  const dir = new BABYLON.Vector3(d.dir.x, d.dir.y, d.dir.z).normalize();
                  b.velocity.copyFrom(dir.scale(BULLET_SPEED * 0.9));
                  b.life = 150;
                  b.hasHit = false;
              }
              break;
              
            case "hit": 
              takeDamage(d.amount); 
              if(d.headshot) kf("HEADSHOT ON YOU!", "headshot");
              else if(d.legshot) kf("LEG SHOT ON YOU!", "legshot");
              break;
              
            case "died":
              myKills++;
              updateKillsHUD();
              showKillMarker();
              kf("ENEMY ELIMINATED", "kill");
              screenShake();
              setEnemyVisibility(false);
              setTimeout(() => setEnemyVisibility(true), 3500);
              break;
          }
      } catch(e) { console.error("Network Data Error", e); }
    }

    /* ==========================================================
       GAME LOGIC
    =========================================================== */
    function takeDamage(amt){
      if(!alive) return;
      myHP = Math.max(0, myHP - amt);
      updateHPHUD();
      const v = document.getElementById("dmg-vignette");
      v.classList.add("show");
      setTimeout(() => v.classList.remove("show"), 180);
      screenShake();
      const lo = document.getElementById("low-hp-overlay");
      if(myHP <= 30) lo.classList.add("pulse"); else lo.classList.remove("pulse");
      if(myHP <= 0) die();
    }

    function die(){
      if(!alive) return;
      alive = false;
      if(scoped){ scoped = false; camera.fov = 0.85; document.getElementById("scope").style.display = "none"; document.getElementById("xhair").style.display = "block"; if(gunRoot) gunRoot.isVisible = true; }
      theirKills++; updateKillsHUD();
      if(conn?.open) conn.send({type: "died"});
      kf("YOU DIED", "dmg");
      setEnemyVisibility(false);
      const ds = document.getElementById("death-screen");
      ds.classList.add("show");
      let t = 3;
      document.getElementById("death-timer").innerText = t;
      const iv = setInterval(() => { t--; document.getElementById("death-timer").innerText = t; if(t <= 0){ clearInterval(iv); respawn(); } }, 1000);
    }

    function respawn(){
      myHP = 100; ammo = MAX_AMMO; alive = true; reloading = false; velY = 0;
      hVelocity.setAll(0);
      updateHPHUD(); updateAmmoHUD();
      document.getElementById("low-hp-overlay").classList.remove("pulse");
      document.getElementById("death-screen").classList.remove("show");
      camera.position.copyFrom(randSpawn(mySpawnSet));
      setTimeout(() => setEnemyVisibility(true), 500);
    }

    /* ==========================================================
       HUD
    =========================================================== */
    function updateHPHUD(){
      const pct = Math.max(0, myHP);
      document.getElementById("hp-inner").style.width = pct + "%";
      let color;
      if(myHP > 60) color = "linear-gradient(90deg, #3cba5a, #4de884)";
      else if(myHP > 30) color = "linear-gradient(90deg, #d4842a, #f0a030)";
      else color = "linear-gradient(90deg, #e8413c, #ff5555)";
      document.getElementById("hp-inner").style.background = color;
      document.getElementById("hp-num").innerText = pct;
    }

    function updateAmmoHUD(){
      const cur = document.getElementById("ammo-cur");
      cur.innerText = ammo;
      if(ammo <= 5 && !reloading) cur.classList.add("ammo-low"); else cur.classList.remove("ammo-low");
    }

    function updateKillsHUD(){ document.getElementById("myKills").innerText = myKills; document.getElementById("theirKills").innerText = theirKills; }
    function setStatus(msg, cls){ const el = document.getElementById("conn-status"); el.innerText = msg; el.className = cls; }
    function screenShake(){ const wrap = document.getElementById("shake-wrap"); wrap.classList.remove("shake"); void wrap.offsetWidth; wrap.classList.add("shake"); }
    function kf(msg, type = ""){
      const feed = document.getElementById("killfeed");
      const d = document.createElement("div");
      d.className = "kf " + (type || "");
      d.innerText = msg;
      feed.prepend(d);
      while(feed.children.length > 8) feed.removeChild(feed.lastChild);
      setTimeout(() => { d.style.transition = "opacity .4s, transform .4s"; d.style.opacity = "0"; d.style.transform = "translateX(20px)"; setTimeout(() => d.remove(), 400); }, 3000);
    }

    document.getElementById("myIdDisplay").addEventListener("click", () => {
      const t = document.getElementById("myIdTxt").innerText;
      if(t && t !== "Initialising..."){ navigator.clipboard.writeText(t); kf("ID COPIED", "event"); }
    });

} catch(e) {
    console.error("Critical Initialization Error", e);
    alert("Game failed to load. Check console for details.");
}
</script>
</body>
</html>
