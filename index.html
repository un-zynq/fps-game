<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<title>CYBER STRIKE 6.0 // STABLE BUILD</title>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;}
#c{display:block;width:100vw;height:100vh;outline:none;cursor:none;}

#xhair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:100;width:24px;height:24px;}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,.9);transition:all .1s;}
#xhair::before{width:2px;height:10px;top:7px;left:11px;}
#xhair::after{width:10px;height:2px;top:11px;left:7px;}
#xhair.hit::before,#xhair.hit::after{background:#ff3333;box-shadow:0 0 12px #ff3333;}

#hud{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-end;padding:0 32px 24px;pointer-events:none;z-index:100;}
.hud-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:4px;color:rgba(255,255,255,.4);text-transform:uppercase;}
#hp-wrap{display:flex;align-items:center;gap:12px;}
#hp-bar{width:180px;height:6px;background:rgba(255,255,255,.1);position:relative;overflow:hidden;}
#hp-inner{height:100%;background:linear-gradient(90deg,#3cba5a,#4de884);transition:width .15s;}
#hp-num{font-family:'Share Tech Mono',monospace;font-size:32px;color:#fff;line-height:1;text-shadow:0 0 20px rgba(255,255,255,.3);}
#ammo-block{text-align:right;}
#ammo-cur{font-family:'Share Tech Mono',monospace;font-size:48px;color:#fff;line-height:1;text-shadow:0 0 15px rgba(255,255,255,.2);}
#ammo-max{font-family:'Share Tech Mono',monospace;font-size:14px;color:rgba(255,255,255,.35);}
#ammo-low{color:#ff5544!important;animation:ammoPulse .5s infinite;}
@keyframes ammoPulse{0%,100%{opacity:1}50%{opacity:.5}}
#reload-track{width:80px;height:3px;background:rgba(255,255,255,.1);margin-left:auto;margin-top:6px;display:none;overflow:hidden;}
#reload-inner{height:100%;background:#fff;width:0;}

#killfeed{position:fixed;top:80px;right:24px;display:flex;flex-direction:column;gap:5px;align-items:flex-end;pointer-events:none;z-index:100;}
.kf{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;padding:4px 14px 4px 18px;background:rgba(0,0,0,.7);color:#fff;letter-spacing:.5px;border-right:3px solid rgba(255,255,255,.3);animation:kfIn .3s ease-out;}
@keyframes kfIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
.kf.dmg{border-color:#ff4444;color:#ffaaaa;}
.kf.event{border-color:rgba(100,200,255,.5);color:rgba(150,220,255,.9);}
.kf.kill{border-color:#44ff88;color:#aaffcc;}

#scoreboard{position:fixed;top:0;left:50%;transform:translateX(-50%);display:flex;z-index:100;pointer-events:none;}
.sb-block{padding:8px 32px;text-align:center;background:rgba(0,0,0,.75);min-width:90px;}
.sb-block .sb-name{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.35);text-transform:uppercase;}
.sb-block .sb-num{font-family:'Share Tech Mono',monospace;font-size:26px;color:#fff;}
.sb-sep{padding:8px 8px;background:rgba(0,0,0,.75);display:flex;align-items:center;color:rgba(255,255,255,.2);font-size:12px;}
.sb-block.you{border-bottom:3px solid #4af;box-shadow:0 3px 20px rgba(68,170,255,.3);}
.sb-block.them{border-bottom:3px solid #f84;box-shadow:0 3px 20px rgba(255,136,68,.3);}

#dmg-vignette{position:fixed;inset:0;pointer-events:none;z-index:99;opacity:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(200,0,0,.6) 100%);transition:opacity .05s;}
#dmg-vignette.show{opacity:1;}
#low-hp-overlay{position:fixed;inset:0;pointer-events:none;z-index:98;background:rgba(150,0,0,1);opacity:0;display:none;}
#low-hp-overlay.pulse{display:block;animation:lowHPPulse 1.2s ease-in-out infinite;}
@keyframes lowHPPulse{0%,100%{opacity:0}50%{opacity:.2}}

#hitmarker{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:101;opacity:0;}
#hitmarker svg{width:32px;height:32px;stroke:#fff;stroke-width:2;}
#hitmarker.show{animation:hmPop .25s ease-out;}
@keyframes hmPop{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(1)}}
#hitmarker.kill svg{stroke:#ff4444;}

#death-screen{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.9);}
#death-screen.show{display:flex;animation:dsIn .4s ease-out;}
@keyframes dsIn{from{opacity:0}to{opacity:1}}
#death-screen .ds-title{font-size:72px;font-weight:700;letter-spacing:8px;color:#e8413c;text-shadow:0 0 80px rgba(232,65,60,.5);}
#death-screen .ds-sub{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:5px;color:rgba(255,255,255,.35);margin-top:8px;}
#death-timer{font-family:'Share Tech Mono',monospace;font-size:64px;color:#fff;margin-top:20px;text-shadow:0 0 30px rgba(255,255,255,.4);}

#lobby{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(5,8,12,.97);}
#lp{width:400px;background:rgba(10,15,22,1);border:1px solid rgba(255,255,255,.08);padding:40px;position:relative;overflow:hidden;}
#lp::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#4af,transparent);}
.lp-title{font-size:36px;font-weight:700;letter-spacing:8px;color:#fff;text-transform:uppercase;}
.lp-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:4px;margin-bottom:36px;margin-top:4px;}
.field-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.4);margin-bottom:6px;margin-top:20px;display:block;}
#myIdDisplay{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);padding:12px 14px;font-family:'Share Tech Mono',monospace;font-size:13px;color:rgba(100,200,255,.9);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:.2s;}
#myIdDisplay:hover{background:rgba(255,255,255,.08);border-color:rgba(100,200,255,.3);}
#peerInput{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;padding:12px 14px;font-family:'Share Tech Mono',monospace;font-size:13px;outline:none;letter-spacing:1px;transition:.2s;}
#peerInput::placeholder{color:rgba(255,255,255,.2);}
#peerInput:focus{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.07);}
#joinBtn{width:100%;margin-top:18px;padding:14px;background:#fff;color:#000;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:5px;border:none;cursor:pointer;text-transform:uppercase;transition:.2s;}
#joinBtn:hover{background:#eee;transform:translateY(-1px);box-shadow:0 4px 20px rgba(255,255,255,.2);}
#conn-status{margin-top:14px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.25);text-align:center;}
#conn-status.ok{color:rgba(80,220,120,.8);}
#conn-status.err{color:rgba(255,100,100,.8);}
.kbd-grid{margin-top:32px;padding-top:24px;border-top:1px solid rgba(255,255,255,.06);display:grid;grid-template-columns:1fr 1fr;gap:10px 24px;}
.kbd-row{display:flex;align-items:center;gap:10px;}
.kbd{font-family:'Share Tech Mono',monospace;font-size:10px;padding:3px 8px;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.55);min-width:36px;text-align:center;background:rgba(255,255,255,.03);}
.kbd-desc{font-size:12px;color:rgba(255,255,255,.3);letter-spacing:.5px;}

#scope{position:fixed;inset:0;pointer-events:none;z-index:95;display:none;}
#scope-overlay{position:absolute;inset:0;background:transparent;}
#scope-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:90vmin;height:90vmin;border-radius:50%;border:2px solid rgba(255,255,255,0.2);box-shadow:0 0 0 9999px rgba(0,0,0,0.55);}
#scope-h,#scope-v{position:absolute;background:rgba(0,0,0,0.7);}
#scope-h{width:100%;height:1px;top:50%;left:0;}
#scope-v{width:1px;height:100%;left:50%;top:0;}
#scope-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;background:#ff3333;border-radius:50%;box-shadow:0 0 4px #ff0000;}

#shake-wrap{position:fixed;inset:0;pointer-events:none;z-index:1;}
.shake{animation:shakeAnim .15s ease-out;}
@keyframes shakeAnim{0%,100%{transform:translate(0,0)}25%{transform:translate(-3px,1px)}50%{transform:translate(2px,-2px)}75%{transform:translate(-1px,2px)}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="shake-wrap"><div id="xhair"></div></div>
<div id="hitmarker"><svg viewBox="0 0 32 32"><line x1="8" y1="8" x2="14" y2="14"/><line x1="24" y1="8" x2="18" y2="14"/><line x1="8" y1="24" x2="14" y2="18"/><line x1="24" y1="24" x2="18" y2="18"/></svg></div>
<div id="dmg-vignette"></div>
<div id="low-hp-overlay"></div>
<div id="scope">
    <div id="scope-overlay"></div>
    <div id="scope-circle">
        <div id="scope-h"></div>
        <div id="scope-v"></div>
        <div id="scope-dot"></div>
    </div>
</div>
<div id="death-screen"><div class="ds-title">ELIMINATED</div><div class="ds-sub">RESPAWNING IN</div><div id="death-timer">3</div></div>
<div id="scoreboard"><div class="sb-block you"><div class="sb-name">YOU</div><div class="sb-num" id="myKills">0</div></div><div class="sb-sep">:</div><div class="sb-block them"><div class="sb-name">ENEMY</div><div class="sb-num" id="theirKills">0</div></div></div>
<div id="killfeed"></div>
<div id="hud"><div id="hud-left"><div class="hud-label">Health</div><div id="hp-wrap"><div id="hp-bar"><div id="hp-inner" style="width:100%"></div></div><div id="hp-num">100</div></div></div><div id="ammo-block"><div class="hud-label">Ammo</div><div id="ammo-cur">30</div><div id="ammo-max">/ 30</div><div id="reload-track"><div id="reload-inner"></div></div></div></div>
<div id="lobby"><div id="lp"><div class="lp-title">CYBER STRIKE</div><div class="lp-sub">STABLE EDITION</div><span class="field-label">YOUR ID <span style="color:rgba(255,255,255,.15)">(share this)</span></span><div id="myIdDisplay"><span id="myIdTxt">Initialising...</span><span class="copy-tag">COPY</span></div><span class="field-label">CONNECT TO PEER</span><input id="peerInput" placeholder="Paste enemy peer ID..." /><button id="joinBtn" onclick="connect()">ENTER BATTLE</button><div id="conn-status">Waiting for signal...</div><div class="kbd-grid"><div class="kbd-row"><div class="kbd">WASD</div><div class="kbd-desc">Move</div></div><div class="kbd-row"><div class="kbd">LMB</div><div class="kbd-desc">Shoot</div></div><div class="kbd-row"><div class="kbd">SPACE</div><div class="kbd-desc">Jump</div></div><div class="kbd-row"><div class="kbd">F</div><div class="kbd-desc">Scope</div></div><div class="kbd-row"><div class="kbd">R</div><div class="kbd-desc">Reload</div></div><div class="kbd-row"><div class="kbd">SHIFT</div><div class="kbd-desc">Sprint</div></div></div></div></div>

<script>
const GAME_CONFIG = {
  "spawns": {
    "player1": { "initial": { "x": 5, "y": 0, "z": -5 }, "respawn": { "x": 5, "y": 0, "z": 5 } },
    "player2": { "initial": { "x": -5, "y": 0, "z": 5 }, "respawn": { "x": -5, "y": 0, "z": -5 } }
  },
  "map_objects": [
    { "type": "box", "position": { "x": 0, "y": -0.5, "z": 0 }, "size": { "w": 100, "h": 1, "d": 100 }, "texture": "https://upload.wikimedia.org/wikipedia/commons/b/b1/Grey_rough_granite_rock_seamless_stone_surface_texture.jpg", "collision": true }
  ]
};

const DOM = {
    myIdTxt: document.getElementById("myIdTxt"), peerInput: document.getElementById("peerInput"), connStatus: document.getElementById("conn-status"),
    lobby: document.getElementById("lobby"), hpInner: document.getElementById("hp-inner"), hpNum: document.getElementById("hp-num"),
    ammoCur: document.getElementById("ammo-cur"), myKills: document.getElementById("myKills"), theirKills: document.getElementById("theirKills"),
    xhair: document.getElementById("xhair"), hitmarker: document.getElementById("hitmarker"), dmgVignette: document.getElementById("dmg-vignette"),
    lowHpOverlay: document.getElementById("low-hp-overlay"), deathScreen: document.getElementById("death-screen"), deathTimer: document.getElementById("death-timer"),
    scope: document.getElementById("scope"), reloadTrack: document.getElementById("reload-track"), reloadInner: document.getElementById("reload-inner"),
    killfeed: document.getElementById("killfeed"), shakeWrap: document.getElementById("shake-wrap")
};

const gunshotURL = "https://cdn.uppbeat.io/audio-files/57ef60eab5fd4218838423222dc07d99/885423a5362603bff168c72b32944a5b/50b63c3bd4b508cee5649d825e4595bf/STREAMING-desert-eagle-gunshot-fascinatedsound-3-3-00-01.mp3";
const reloadURL = "https://cdn.uppbeat.io/audio-files/550fafd5d5403a2f6e11b6feefd0899e/7b5dd4a105fd484c4f38de84d361cebf/410c44a1eea20cf7a5847511f763ee10/STREAMING-futuristic-gun-reload-bosnow-2-2-00-00.mp3";
const audioPool = Array.from({length: 12}, () => new Audio(gunshotURL));
let audioIndex = 0;
function playLocalGunshot() { const a = audioPool[audioIndex]; a.currentTime = 0; a.volume = 0.5; a.play().catch(e => {}); audioIndex = (audioIndex + 1) % audioPool.length; }
function playReloadSound() { const a = new Audio(reloadURL); a.volume = 0.5; a.play().catch(e => {}); }

try {
    const canvas = document.getElementById("c");
    const engine = new BABYLON.Engine(canvas, true, {antialias:true, stencil:true});
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0.02,0.03,0.05,1);
    scene.collisionsEnabled = true;

    // STABILE CAMERA CONFIG
    // We gebruiken een camerahoogte van 1.8m.
    // De ellipsoid (botsingsdoos) is 1.8m hoog (radius 0.9).
    // We gebruiken ellipsoidOffset om de camera 'bovenop' de botsingsdoos te plaatsen.
    // Dit voorkomt dat de speler door de grond zakt of rare bounces maakt.
    const CAM_HEIGHT = 1.8;
    const camera = new BABYLON.UniversalCamera("cam", new BABYLON.Vector3(0, CAM_HEIGHT, 0), scene);
    camera.minZ = 0.05; camera.maxZ = 2000; camera.inertia = 0; camera.angularSensibility = 500;
    camera.checkCollisions = true;
    camera.ellipsoid = new BABYLON.Vector3(0.4, 0.9, 0.4); // Radius x, y, z. Hoogte = 1.8m
    camera.ellipsoidOffset = new BABYLON.Vector3(0, 0.9, 0); // Duw de camera omhoog zodat ogen op 1.8m zijn
    camera.keysUp = camera.keysDown = camera.keysLeft = camera.keysRight = [];
    camera.applyGravity = false; // We doen eigen gravity voor meer controle
    camera.attachControl(canvas, true);

    function playEnemyGunshot(enemyPos) {
        if(!enemyPos) return; const playerPos = camera.position; const distance = BABYLON.Vector3.Distance(playerPos, enemyPos);
        if(distance > 150) return; let volume = Math.max(0, 1 - (distance / 150)); volume = Math.pow(volume, 0.8);
        if(volume > 0.01) { const a = audioPool[audioIndex]; a.currentTime = 0; a.volume = volume * 0.7; a.play().catch(e => {}); audioIndex = (audioIndex + 1) % audioPool.length; }
    }

    const dirLight = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-0.5,-1,-0.3), scene); dirLight.intensity = 1.2;
    const amb = new BABYLON.HemisphericLight("amb", new BABYLON.Vector3(0,1,0), scene); amb.intensity = 0.7;
    scene.fogMode = BABYLON.Scene.FOGMODE_EXP2; scene.fogDensity = 0.004; scene.fogColor = new BABYLON.Color3(0.02,0.03,0.05);

    function createMat(url) {
        const m = new BABYLON.StandardMaterial("m_" + url.substring(0, 5), scene);
        if(url && url !== "") { m.diffuseTexture = new BABYLON.Texture(url, scene); } 
        else { m.diffuseColor = new BABYLON.Color3(0.5, 0.5, 0.5); }
        m.specularColor = new BABYLON.Color3(0.1, 0.1, 0.1);
        return m;
    }

    const allCollidables = [];
    GAME_CONFIG.map_objects.forEach((obj, i) => {
        let mesh;
        if(obj.type === "box") mesh = BABYLON.MeshBuilder.CreateBox("obj_"+i, {width: obj.size.w, height: obj.size.h, depth: obj.size.d}, scene);
        else if(obj.type === "cylinder") mesh = BABYLON.MeshBuilder.CreateCylinder("obj_"+i, {height: obj.size.h, diameter: obj.size.d}, scene);
        else return;
        mesh.position = new BABYLON.Vector3(obj.position.x, obj.position.y, obj.position.z);
        mesh.material = createMat(obj.texture);
        if(obj.collision) { mesh.checkCollisions = true; mesh.isWall = true; allCollidables.push(mesh); }
    });

    const smokeTex = new BABYLON.DynamicTexture("st", 64, scene);
    const sCtx = smokeTex.getContext();
    const grad = sCtx.createRadialGradient(32,32,0,32,32,32);
    grad.addColorStop(0,"rgba(255,255,255,0.8)"); grad.addColorStop(1,"rgba(0,0,0,0)");
    sCtx.fillStyle = grad; sCtx.fillRect(0,0,64,64); smokeTex.update();

    class Pool {
        constructor(fn, n) { this.fn=fn; this.pool=[]; this.active=[]; for(let i=0;i<n;i++){ const o=fn(); o.isVisible=false; this.pool.push(o); } }
        get() { let o = this.pool.pop() || this.fn(); o.isVisible=true; this.active.push(o); return o; }
        release(o) { o.isVisible=false; const i=this.active.indexOf(o); if(i!==-1)this.active.splice(i,1); this.pool.push(o); }
        loop(fn) { for(let i=this.active.length-1; i>=0; i--) { if(fn(this.active[i])) this.release(this.active[i]); } }
    }
    const v3 = () => new BABYLON.Vector3();
    
    const bulletPool = new Pool(() => { 
        const m = BABYLON.MeshBuilder.CreateSphere("b",{diameter:0.1,segments:6},scene); 
        const mat = new BABYLON.StandardMaterial("bm",scene); mat.emissiveColor=new BABYLON.Color3(1,0.85,0.4); mat.disableLighting=true; m.material = mat;
        m.isPickable = false; m.checkCollisions = false; m.velocity=v3(); return m; 
    }, 100);

    const sparkPool = new Pool(() => { 
        const m = BABYLON.MeshBuilder.CreateSphere("s",{diameter:0.04,segments:4},scene); 
        const mat = new BABYLON.StandardMaterial("sm",scene); mat.emissiveColor=new BABYLON.Color3(1,0.5,0.1); mat.disableLighting=true; m.material = mat;
        m.isPickable = false; m.velocity=v3(); return m; 
    }, 150);

    const smokePool = new Pool(() => { 
        const m = BABYLON.MeshBuilder.CreatePlane("sm",{size:0.6},scene); 
        const mat = new BABYLON.StandardMaterial("smm",scene); mat.diffuseTexture=smokeTex; mat.emissiveTexture=smokeTex; mat.opacityTexture=smokeTex; mat.backFaceCulling=false; mat.disableLighting=true; m.material = mat;
        m.billboardMode=BABYLON.Mesh.BILLBOARDMODE_ALL; m.isPickable = false; m.velocity=v3(); return m; 
    }, 80);

    let gunRoot = null, gunGrip = null, gunMuzzle = null;
    let rZ=0, rX=0;
    
    function createGunParts(parent, metal, metalDark, plastic, highlight, scale = 1) {
        const add = (name, size, pos, rot, mat) => {
            const m = BABYLON.MeshBuilder.CreateBox(name, {width: size.x * scale, height: size.y * scale, depth: size.z * scale}, scene);
            m.parent = parent; m.position = pos.scale(scale); m.rotation = rot || BABYLON.Vector3.Zero(); m.material = mat || metal; m.isPickable = false; return m;
        };
        const addCyl = (name, size, pos, rot, mat) => {
            const m = BABYLON.MeshBuilder.CreateCylinder(name, {height: size.h * scale, diameter: size.d * scale, tessellation: 16}, scene);
            m.parent = parent; m.position = pos.scale(scale); m.rotation = rot || BABYLON.Vector3.Zero(); m.material = mat || metal; m.isPickable = false; return m;
        };
        add("rec", {x:0.09, y:0.16, z:0.55}, new BABYLON.Vector3(0,0.05,0.05), null, metal);
        add("slide", {x:0.085, y:0.08, z:0.4}, new BABYLON.Vector3(0,0.14,0.08), null, metalDark);
        for(let i=0; i<5; i++) add("ser", {x:0.09, y:0.01, z:0.015}, new BABYLON.Vector3(0,0.11,-0.05 + i*0.025), null, metal);
        addCyl("barrelOuter", {h:0.4, d:0.1}, new BABYLON.Vector3(0,0.1,0.35), new BABYLON.Vector3(Math.PI/2,0,0), metalDark);
        addCyl("barrelInner", {h:0.42, d:0.05}, new BABYLON.Vector3(0,0.1,0.35), new BABYLON.Vector3(Math.PI/2,0,0), metal);
        add("gripMain", {x:0.07, y:0.18, z:0.09}, new BABYLON.Vector3(0,-0.06,-0.08), new BABYLON.Vector3(0.25,0,0), plastic);
        for(let i=0; i<4; i++) add("gt", {x:0.072, y:0.015, z:0.08}, new BABYLON.Vector3(0,-0.02-i*0.04,-0.08 + i*0.015), new BABYLON.Vector3(0.25,0,0), plastic);
        add("guard", {x:0.04, y:0.02, z:0.12}, new BABYLON.Vector3(0,-0.08,0.02), null, metal);
        add("mag", {x:0.06, y:0.16, z:0.08}, new BABYLON.Vector3(0,-0.1,-0.06), new BABYLON.Vector3(-0.15,0,0), metal);
        add("acc1", {x:0.015, y:0.015, z:0.2}, new BABYLON.Vector3(0.045,0.05,0.05), null, highlight);
        add("acc2", {x:0.015, y:0.015, z:0.2}, new BABYLON.Vector3(-0.045,0.05,0.05), null, highlight);
    }
    
    function buildWeapon() {
        gunRoot = new BABYLON.TransformNode("gr", scene); gunRoot.parent = camera; gunRoot.position = new BABYLON.Vector3(0.3, -0.32, 0.6);
        gunGrip = new BABYLON.TransformNode("gg", scene); gunGrip.parent = gunRoot;
        const gunMetal = new BABYLON.StandardMaterial("gunMetal", scene); gunMetal.diffuseColor = new BABYLON.Color3(0.08, 0.08, 0.09); gunMetal.specularColor = new BABYLON.Color3(0.9, 0.9, 0.9);
        const gunMetalDark = new BABYLON.StandardMaterial("gunMetalDark", scene); gunMetalDark.diffuseColor = new BABYLON.Color3(0.03, 0.03, 0.04);
        const gunPlastic = new BABYLON.StandardMaterial("gunPlastic", scene); gunPlastic.diffuseColor = new BABYLON.Color3(0.1, 0.1, 0.12);
        const gunHighlight = new BABYLON.StandardMaterial("gunHighlight", scene); gunHighlight.emissiveColor = new BABYLON.Color3(0, 0.2, 0.3);
        createGunParts(gunGrip, gunMetal, gunMetalDark, gunPlastic, gunHighlight, 1);
        gunMuzzle = new BABYLON.TransformNode("gm", scene); gunMuzzle.parent = gunGrip; gunMuzzle.position = new BABYLON.Vector3(0, 0.1, 0.55);
    }

    function animateGun() { if(!gunGrip) return; rZ *= 0.88; rX *= 0.88; gunGrip.position.z = rZ; gunGrip.rotation.x = rX; }
    function recoil() { rZ = -0.05; rX = -0.03; }

    let myHP=100, kills=0, eKills=0, alive=true, ammo=30, reloading=false, scoped=false;
    let invulnerable = false; 
    let isHost = false;
    const DMG = {standard: 25, scoped: 40};

    // PHYSICS STATE
    let velY=0, grounded=false;
    const grav = -30, jumpSpd = 11;
    const hVel = new BABYLON.Vector3();
    const _v = new BABYLON.Vector3(), _r = new BABYLON.Vector3(), _u = BABYLON.Vector3.Up();

    // ENEMY STATE
    let eRoot = null, eMuzzle = null, eBody = null;
    let eGunPivot = null;
    let eHPBar = null, eHPF = null, eHP = 100, eVis = true;
    let eTP = new BABYLON.Vector3(), eRY = 0, eRX = 0;
    let eAlive = true;
    let eAnimState = { hopCycle: 0, lastPos: new BABYLON.Vector3() };

    function buildRealisticEnemy() {
        if(eRoot) { eRoot.getChildMeshes().forEach(m=>m.dispose()); eRoot.dispose(); }
        eRoot = new BABYLON.TransformNode("er", scene);

        const eggMat = new BABYLON.StandardMaterial("eggMat", scene);
        eggMat.diffuseColor = new BABYLON.Color3(0.9, 0.75, 0.6); 
        const hitMat = new BABYLON.StandardMaterial("hit", scene);
        hitMat.emissiveColor = new BABYLON.Color3(1,0.2,0.2);
        const skinMat = new BABYLON.StandardMaterial("skinMat", scene);
        skinMat.diffuseColor = new BABYLON.Color3(1, 0.85, 0.75);
        const eyeMat = new BABYLON.StandardMaterial("eye", scene); 
        eyeMat.emissiveColor = new BABYLON.Color3(1,0,0);

        // BODY
        eBody = BABYLON.MeshBuilder.CreateSphere("eggBody", {diameter: 1, segments: 16}, scene);
        eBody.scaling = new BABYLON.Vector3(0.9, 1.3, 0.9); 
        eBody.parent = eRoot;
        eBody.position.y = 0.8; 
        eBody.material = eggMat;
        eBody.isPickable = true; 

        // EYES
        const lEye = BABYLON.MeshBuilder.CreateSphere("lEye", {diameter: 0.1}, scene);
        lEye.parent = eBody; lEye.position.set(-0.15, 0.25, -0.35); lEye.material = eyeMat;
        const rEye = BABYLON.MeshBuilder.CreateSphere("rEye", {diameter: 0.1}, scene);
        rEye.parent = eBody; rEye.position.set(0.15, 0.25, -0.35); rEye.material = eyeMat;

        // HANDS
        const createHand = () => {
            const handRoot = new BABYLON.TransformNode("hand", scene);
            const palm = BABYLON.MeshBuilder.CreateBox("palm", {width: 0.08, height: 0.04, depth: 0.12}, scene);
            palm.material = skinMat; palm.parent = handRoot;
            for(let i=0; i<4; i++) {
                const f = BABYLON.MeshBuilder.CreateCapsule("finger", {radius: 0.012, height: 0.1}, scene);
                f.parent = palm; f.position.set(-0.025 + (i*0.018), 0, 0.07);
                f.rotation.x = Math.PI / 2; f.material = skinMat;
            }
            const thumb = BABYLON.MeshBuilder.CreateCapsule("thumb", {radius: 0.015, height: 0.06}, scene);
            thumb.parent = palm; thumb.position.set(0.05, 0, 0.02);
            thumb.rotation.z = -0.5; thumb.rotation.x = 0.5; thumb.material = skinMat;
            return handRoot;
        };

        const rightHand = createHand();
        rightHand.parent = eRoot;
        rightHand.position.set(0.55, 0.8, 0);
        rightHand.rotation.y = Math.PI / 2; 
        rightHand.rotation.z = -Math.PI / 2;

        const leftHand = createHand();
        leftHand.parent = eRoot;
        leftHand.position.set(-0.55, 0.8, 0);
        leftHand.rotation.y = -Math.PI / 2;
        leftHand.rotation.z = Math.PI / 2;

        // WEAPON
        const enemyGunMetal = new BABYLON.StandardMaterial("enemyGunMetal", scene);
        enemyGunMetal.diffuseColor = new BABYLON.Color3(0.15, 0.05, 0.05);
        const gunHighlight = new BABYLON.StandardMaterial("gh", scene); gunHighlight.emissiveColor = new BABYLON.Color3(0.3, 0.1, 0);
        
        eGunPivot = new BABYLON.TransformNode("eGunPivot", scene); 
        eGunPivot.parent = eRoot;
        eGunPivot.position = rightHand.position.clone();
        eGunPivot.rotation.y = Math.PI; 

        const eGunGrip = new BABYLON.TransformNode("egg", scene); eGunGrip.parent = eGunPivot;
        createGunParts(eGunGrip, enemyGunMetal, enemyGunMetal, enemyGunMetal, gunHighlight, 0.7);
        eMuzzle = new BABYLON.TransformNode("em", scene); eMuzzle.parent = eGunGrip; eMuzzle.position = new BABYLON.Vector3(0, 0.07, 0.38);
        
        eRoot.position.set(0,0,0); eTP.copyFrom(eRoot.position); eVis = true; eAlive = true;
        eRoot.flashHit = () => { eBody.material = hitMat; setTimeout(() => { eBody.material = eggMat; }, 50); };
    }

    function eVisFn(v) { 
        if(!eRoot) return; 
        eRoot.getChildMeshes().forEach(m => { m.isVisible = v; m.isPickable = v; });
        if(eHPBar) eHPBar.isVisible = v; 
        eVis = v; 
    }
    
    function buildEHP() {
        if(eHPBar) eHPBar.dispose();
        eHPBar = BABYLON.MeshBuilder.CreatePlane("ehp", {width:1.6,height:0.2}, scene);
        eHPBar.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL; eHPBar.isPickable = false;
        const adt = BABYLON.GUI.AdvancedDynamicTexture.CreateForMesh(eHPBar, 256, 32);
        const bg = new BABYLON.GUI.Rectangle(); bg.width="100%"; bg.height="100%"; bg.background="rgba(0,0,0,0.75)"; bg.thickness=0; adt.addControl(bg);
        const fl = new BABYLON.GUI.Rectangle(); fl.width="100%"; fl.height="75%"; fl.background="#cc2222"; fl.thickness=0; fl.horizontalAlignment=BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT; bg.addControl(fl);
        eHPF = fl;
    }

    const K={}; let mL=false;

    window.addEventListener("keydown", e => { 
        K[e.code]=true; 
        if(e.code==="KeyR" && !reloading && ammo<30 && alive) reload(); 
        if(e.code==="KeyF" && alive) toggleScope(); 
    });
    
    window.addEventListener("keyup", e => K[e.code]=false);
    document.addEventListener("pointerlockchange", () => mL = (document.pointerLockElement===canvas));
    canvas.addEventListener("click", () => { if(DOM.lobby.style.display==="none") canvas.requestPointerLock(); });
    canvas.addEventListener("contextmenu", e => e.preventDefault());
    window.addEventListener("mousedown", e => { if(e.button===0) shoot(); });

    function toggleScope() {
        if(!alive) return; scoped = !scoped;
        DOM.scope.style.display = scoped ? "block" : "none"; camera.fov = scoped ? 0.35 : 0.85;
        DOM.xhair.style.display = scoped ? "none" : "block"; if(gunRoot) gunRoot.isVisible = !scoped;
    }

    function spawnMuzzleFlash(pos, dir) {
        for(let i=0; i<15; i++) {
            const p = sparkPool.get(); p.position.copyFrom(pos); p.material.emissiveColor.set(1, 0.8 + Math.random()*0.2, 0.2); p.scaling.setAll(0.8 + Math.random() * 0.5); p.life = 0.1 + Math.random() * 0.1;
            const spread = 0.3; p.velocity.set(dir.x + (Math.random()-0.5)*spread, dir.y + (Math.random()-0.5)*spread, dir.z + (Math.random()-0.5)*spread); p.velocity.scaleInPlace(15 + Math.random() * 10);
        }
        for(let i=0; i<3; i++) { const s = smokePool.get(); s.position.copyFrom(pos); s.scaling.setAll(0.3); s.life = 0.4; s.material.alpha = 0.6; s.velocity.set((Math.random()-0.5)*0.5 + dir.x * 2, 0.5 + dir.y * 2, (Math.random()-0.5)*0.5 + dir.z * 2); }
    }

    function shoot() {
        if(!alive||!mL||reloading||ammo<=0) return;
        ammo--; updAmmo(); recoil(); playLocalGunshot();
        
        const f = camera.getForwardRay(1000); const o = camera.position;
        if(gunMuzzle) spawnMuzzleFlash(gunMuzzle.getAbsolutePosition(), f.direction);
        const hit = scene.pickWithRay(f, m => m.isPickable && ((m.isWall && !m.hitType) || m.name === "eggBody"));
        
        let hitPoint = f.origin.add(f.direction.scale(1000)); let hitNormal = BABYLON.Vector3.Up();

        if(hit.hit && hit.pickedMesh) {
            hitPoint = hit.pickedPoint; hitNormal = hit.getNormal() || BABYLON.Vector3.Up();
            
            if(hit.pickedMesh.name === "eggBody") {
                // SIMPELE HIT LOGICA (Geen headshots meer)
                let dm = scoped ? DMG.scoped : DMG.standard;
                
                hitReg(hitPoint); 
                blood(hitPoint);
                if(conn?.open) conn.send({type:"hit", amount:dm});
            } 
            else if(hit.pickedMesh.isWall) { 
                sparks(hitPoint, hitNormal, false); 
            }
        }

        const b = bulletPool.get(); b.isEnemy = false; b.position.copyFrom(gunMuzzle.getAbsolutePosition()); b.material.alpha = 1.0; b.material.emissiveColor.set(1, 0.85, 0.4);
        const dist = BABYLON.Vector3.Distance(b.position, hitPoint); const time = 0.15; const speed = dist / time;
        b.velocity.copyFrom(f.direction).scaleInPlace(speed); b.life = time;

        if(conn?.open) conn.send({type:"shoot", pos:{x:o.x,y:o.y,z:o.z}, dir:{x:f.direction.x,y:f.direction.y,z:f.direction.z}});
    }

    function enemyShootVisual(dirVec) {
        if(!eMuzzle || !eRoot) return; playEnemyGunshot(eRoot.position);
        spawnMuzzleFlash(eMuzzle.getAbsolutePosition(), dirVec);
        const ray = new BABYLON.Ray(eRoot.position, dirVec, 1000); const hit = scene.pickWithRay(ray, m => m.isWall && !m.hitType);
        let hitPoint = ray.origin.add(dirVec.scale(1000)); if(hit.hit) hitPoint = hit.pickedPoint;
        const b = bulletPool.get(); b.isEnemy = true; b.position.copyFrom(eMuzzle.getAbsolutePosition()); b.material.alpha = 1.0; b.material.emissiveColor.set(1, 0.5, 0.3);
        const dist = BABYLON.Vector3.Distance(b.position, hitPoint); const time = 0.2; const speed = dist / time;
        b.velocity.copyFrom(dirVec).scaleInPlace(speed); b.life = time;
    }

    function sparks(pos, nrm, metal) { for(let i=0;i<(metal?8:4);i++){ const p = sparkPool.get(); p.position.copyFrom(pos); p.velocity.set((Math.random()-0.5)*0.2+nrm.x*0.1, Math.random()*0.15+0.05, (Math.random()-0.5)*0.2+nrm.z*0.1); p.life = 18; p.material.emissiveColor = metal ? new BABYLON.Color3(1,0.8,0.3) : new BABYLON.Color3(1,0.5,0.2); } for(let i=0; i<2; i++) { const s = smokePool.get(); s.position.copyFrom(pos); s.scaling.setAll(0.15); s.velocity.set(nrm.x * 0.3, 0.3, nrm.z * 0.3); s.life = 0.3; s.material.alpha = 0.25; } }
    function blood(pos) { for(let i=0;i<5;i++){ const p = sparkPool.get(); p.position.copyFrom(pos); p.velocity.set((Math.random()-0.5)*0.2, Math.random()*0.1+0.03, (Math.random()-0.5)*0.2); p.life = 25; p.material.emissiveColor = new BABYLON.Color3(0.9,0.1,0.1); } }
    
    function hitReg(pt) {
        DOM.xhair.classList.remove("hit"); DOM.xhair.classList.add("hit"); setTimeout(() => DOM.xhair.classList.remove("hit"), 180);
        DOM.hitmarker.classList.remove("show","kill"); void DOM.hitmarker.offsetWidth; DOM.hitmarker.classList.add("show");
        kf("HIT", "dmg");
        if(eRoot?.flashHit) eRoot.flashHit();
    }
    
    function reload() { if(reloading||ammo===30) return; reloading=true; playReloadSound(); kf("RELOADING...","event"); DOM.reloadTrack.style.display="block"; DOM.reloadInner.style.transition="none"; DOM.reloadInner.style.width="0%"; requestAnimationFrame(() => { DOM.reloadInner.style.transition="width 1.4s linear"; DOM.reloadInner.style.width="100%"; }); setTimeout(() => { ammo=30; reloading=false; DOM.reloadTrack.style.display="none"; DOM.reloadInner.style.width="0%"; updAmmo(); kf("RELOADED","event"); }, 1400); }

    // MAIN LOOP
    let fi=0;
    scene.onBeforeRenderObservable.add(() => {
        const dt = Math.min(engine.getDeltaTime()/1000, 0.05);
        fi++;
        animateGun();
        
        bulletPool.loop(b => { if(!b || !b.position) return true; b.position.addInPlace(b.velocity.scale(dt)); b.life -= dt; if(b.material) b.material.alpha = Math.max(0, b.life * 5); return b.life <= 0; });
        smokePool.loop(s => { if(!s || !s.position) return true; s.position.addInPlace(s.velocity.scale(dt)); s.velocity.y += 0.8 * dt; s.velocity.scaleInPlace(0.96); s.life -= dt; const sc = 1 + ((0.5 - s.life) * 0.04); s.scaling.setAll(sc); if(s.material) s.material.alpha = Math.min(0.6, s.life / 0.35); return s.life <= 0; });
        sparkPool.loop(p => { if(!p || !p.position) return true; p.position.addInPlace(p.velocity.scale(dt)); p.velocity.y -= 8 * dt; p.velocity.scaleInPlace(0.98); p.life -= dt; if(p.material) p.material.alpha = Math.max(0, p.life / 0.2); return p.life <= 0; });

        if(!alive) return;

        const spd = K["ShiftLeft"] ? 0.22 : 0.14;
        const cF = camera.getForwardRay().direction; cF.y=0; cF.normalize();
        BABYLON.Vector3.CrossToRef(_u, cF, _r); _r.normalize();
        _v.setAll(0); if(K["KeyW"])_v.addInPlace(cF); if(K["KeyS"])_v.subtractInPlace(cF); if(K["KeyA"])_v.subtractInPlace(_r); if(K["KeyD"])_v.addInPlace(_r);
        if(_v.length()>0) _v.normalize().scaleInPlace(spd);
        BABYLON.Vector3.LerpToRef(hVel, _v, 0.14, hVel);

        // STABILE PHYSICS
        // Gebruik de camera positie (die door offset al op ooghoogte is)
        // Raycast van ooghoogte naar beneden
        const gR = new BABYLON.Ray(camera.position, BABYLON.Vector3.Down(), CAM_HEIGHT + 0.5);
        const gH = scene.pickWithRay(gR, m=>m.checkCollisions);
        
        if(gH.hit && gH.distance <= CAM_HEIGHT + 0.05) {
            grounded = true; velY = 0;
            const targetY = gH.pickedPoint.y + CAM_HEIGHT;
            // Smooth snap naar grond om jitter te voorkomen
            camera.position.y = BABYLON.Scalar.Lerp(camera.position.y, targetY, 0.5);
        } else { 
            grounded = false; 
        }

        if(K["Space"] && grounded){ velY=jumpSpd; grounded=false; }
        if(!grounded) velY+=grav*dt;
        
        // Clamp velocity om "flying" bugs te voorkomen
        velY = Math.max(-50, Math.min(velY, 50));
        
        const fM = hVel.clone(); fM.y=velY*dt;
        camera.cameraDirection.copyFrom(fM);
        
        // Enemy Logic
        if(eRoot && eVis && eAlive){ 
            BABYLON.Vector3.LerpToRef(eRoot.position, eTP, 0.2, eRoot.position);
            let currentRY = eRoot.rotation.y; let diff = eRY - currentRY; while (diff < -Math.PI) diff += Math.PI * 2; while (diff > Math.PI) diff -= Math.PI * 2; eRoot.rotation.y += diff * 0.15;
            if(eGunPivot) eGunPivot.rotation.x = eRX;

            // Verbeterde hop animatie
            const dist = BABYLON.Vector3.Distance(eRoot.position, eAnimState.lastPos);
            const speed = dist / dt;
            eAnimState.lastPos.copyFrom(eRoot.position);

            if(speed > 0.5) { // Alleen hoppen als we echt snel bewegen (netwerk jitter filter)
                eAnimState.hopCycle += dt * 12; 
                const hopHeight = 0.05; // Kleiner hopje
                const hop = Math.abs(Math.sin(eAnimState.hopCycle)) * hopHeight;
                eRoot.position.y = eTP.y + hop;
            } else {
                // Stilstaand: glad positie behouden
                eAnimState.hopCycle = 0; 
                eRoot.position.y = BABYLON.Scalar.Lerp(eRoot.position.y, eTP.y, 0.2);
            }
            
            if(eHPBar){ eHPBar.position.copyFrom(eRoot.position); eHPBar.position.y += 2.2; }
        }
        
        if(conn?.open && fi%2===0 && alive) conn.send({
            type:"pos", 
            x:camera.position.x, y:camera.position.y-CAM_HEIGHT, z:camera.position.z, 
            ry:camera.rotation.y, rx:camera.rotation.x, hp:myHP
        });
    });

    engine.runRenderLoop(() => scene.render());
    window.addEventListener("resize", () => engine.resize());

    // NETWORK
    const peer = new Peer(undefined, { config: { iceServers: [ { urls: "stun:stun.l.google.com:19302" } ] } });
    let conn=null;
    
    peer.on('open', id => { DOM.myIdTxt.innerText = id; DOM.connStatus.innerText = "Ready - ID Copied?"; });
    peer.on('error', e => { console.error(e); setStatus("Connection Error", "err"); });
    peer.on('connection', c => { conn = c; isHost = true; setup(); });
    
    window.connect = () => { const id = DOM.peerInput.value.trim(); if(!id) return; setStatus("Connecting...", ""); conn = peer.connect(id, { reliable: false }); isHost = false; setup(); };
    
    function getSpawnPoint(initial = true) {
        const cfg = GAME_CONFIG.spawns;
        const playerKey = isHost ? "player1" : "player2";
        const point = initial ? cfg[playerKey].initial : cfg[playerKey].respawn;
        return new BABYLON.Vector3(point.x, point.y + CAM_HEIGHT, point.z);
    }

    function setup() {
        conn.on('open', () => { 
            setStatus("CONNECTED", "ok"); 
            setTimeout(() => {
                DOM.lobby.style.display="none"; 
                buildWeapon(); buildRealisticEnemy(); buildEHP();
                
                camera.position = getSpawnPoint(true);
                
                velY=0; myHP=100; ammo=30; alive=true; invulnerable = false; hVel.setAll(0); updHP(); updAmmo();
                kf("PLAYER JOINED", "event");
            }, 500); 
        });
        
        conn.on('data', d => {
            if(d.type==="pos"){ 
                if(!eRoot) return; 
                if(d.hp > 0 && !eAlive) { eAlive = true; eVisFn(true); }
                if(!eAlive) return;
                eTP.set(d.x, d.y, d.z); eRY = d.ry; if(d.rx != null) eRX = d.rx;
                if(eHPF && d.hp!=null){ eHP = d.hp; eHPF.width = Math.max(0, d.hp)+"%"; }
                if(!eVis) eVisFn(true); 
            }
            else if(d.type==="shoot"){ enemyShootVisual(new BABYLON.Vector3(d.dir.x, d.dir.y, d.dir.z)); }
            else if(d.type==="hit"){ 
                if(!alive || invulnerable) return; 
                takeDmg(d.amount); 
            }
            else if(d.type==="died"){ 
                kills++; updKills(); kf("ENEMY ELIMINATED","kill"); 
                DOM.hitmarker.classList.remove("show","kill"); void DOM.hitmarker.offsetWidth; DOM.hitmarker.classList.add("show","kill"); 
                screenShake(); 
                eAlive = false; eVisFn(false); 
            }
        });
        
        conn.on('close', () => { kf("CONNECTION LOST", "err"); eVisFn(false); DOM.lobby.style.display="flex"; setStatus("Disconnected", "err"); });
    }

    function takeDmg(a){ 
        if(!alive || invulnerable) return; 
        myHP = Math.max(0, myHP - a); updHP(); 
        DOM.dmgVignette.classList.add("show"); setTimeout(() => DOM.dmgVignette.classList.remove("show"), 180); 
        screenShake(); DOM.lowHpOverlay.classList.toggle("pulse", myHP <= 30); 
        if(myHP <= 0) die(); 
    }
    
    function die(){ 
        if(!alive) return; 
        alive = false; invulnerable = true;
        if(scoped) toggleScope(); 
        eKills++; updKills(); 
        if(conn?.open) conn.send({type:"died"}); 
        kf("YOU DIED","dmg"); 
        DOM.deathScreen.classList.add("show"); 
        camera.position = new BABYLON.Vector3(0, 50, 0); 
        let t=3; DOM.deathTimer.innerText=t; 
        const iv = setInterval(() => { t--; DOM.deathTimer.innerText=t; if(t <= 0){ clearInterval(iv); respawn(); } }, 1000); 
    }
    
    function respawn(){ 
        myHP=100; ammo=30; alive=true; reloading=false; velY=0; hVel.setAll(0); updHP(); updAmmo(); 
        DOM.lowHpOverlay.classList.remove("pulse"); DOM.deathScreen.classList.remove("show"); 
        
        camera.position = getSpawnPoint(false);
        
        invulnerable = true; setTimeout(() => { invulnerable = false; }, 100);
    }
    
    function updHP(){ const p = Math.max(0, myHP); DOM.hpInner.style.width = p + "%"; DOM.hpInner.style.background = p > 60 ? "linear-gradient(90deg,#3cba5a,#4de884)" : p > 30 ? "linear-gradient(90deg,#d4842a,#f0a030)" : "linear-gradient(90deg,#e8413c,#ff5555)"; DOM.hpNum.innerText = p; }
    function updAmmo(){ DOM.ammoCur.innerText=ammo; DOM.ammoCur.classList.toggle("ammo-low", ammo<=5 && !reloading); }
    function updKills(){ DOM.myKills.innerText=kills; DOM.theirKills.innerText=eKills; }
    function setStatus(m,c){ DOM.connStatus.innerText=m; DOM.connStatus.className=c; }
    function screenShake(){ DOM.shakeWrap.classList.remove("shake"); void DOM.shakeWrap.offsetWidth; DOM.shakeWrap.classList.add("shake"); }
    function kf(m,t=""){ const d=document.createElement("div"); d.className="kf "+t; d.innerText=m; DOM.killfeed.prepend(d); while(DOM.killfeed.children.length>8)DOM.killfeed.lastChild.remove(); setTimeout(()=>{d.style.opacity="0"; setTimeout(()=>d.remove(),400);},3000); }
    
    document.getElementById("myIdDisplay").addEventListener("click", () => { const t=DOM.myIdTxt.innerText; if(t&&t!=="Initialising..."){navigator.clipboard.writeText(t); kf("ID COPIED","event"); setStatus("ID Copied to Clipboard", "ok");} });

} catch(e) { console.error(e); alert("Error: "+e.message); }
</script>
</body>
