<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>CYBER STRIKE - Level Architect Pro 3.8</title>
    <style>
        :root { 
            --neon: #00ffcc; --bg: #05080c; --panel: #0d1117; 
            --border: #30363d; --text: #c9d1d9; --accent: #58a6ff; 
            --danger: #f85149; --p1-color: #4af; --p2-color: #f84;
        }
        html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: var(--text); }
        
        #app { display: flex; height: 100%; }
        
        /* Left Panel */
        #hierarchy-panel { width: 260px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        #hierarchy-header { padding: 15px; border-bottom: 1px solid var(--border); font-weight: bold; color: var(--neon); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center;}
        #object-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        .list-section { margin-bottom: 15px; }
        .list-section-title { font-size: 10px; color: #8b949e; padding: 5px; text-transform: uppercase; border-bottom: 1px solid #21262d; margin-bottom: 5px; }
        
        .obj-item { padding: 8px 12px; margin-bottom: 4px; background: #161b22; border-radius: 4px; cursor: pointer; border: 1px solid transparent; font-size: 13px; display: flex; align-items: center; gap: 8px; transition: 0.1s; }
        .obj-item:hover { border-color: var(--accent); background: #1f242d; }
        .obj-item.selected { background: #0d2b33; border-color: var(--neon); color: var(--neon); }
        .obj-item.spawn-item { background: #161b22; border-left: 3px solid transparent; padding-left: 10px; }
        .obj-item.spawn-item.p1 { border-left-color: var(--p1-color); }
        .obj-item.spawn-item.p2 { border-left-color: var(--p2-color); }

        /* Center */
        #viewport-container { flex: 1; position: relative; display: flex; flex-direction: column; }
        #toolbar { height: 50px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; gap: 10px; }
        #renderCanvas { width: 100%; flex: 1; display: block; outline: none; }

        /* Right Panel */
        #inspector-panel { width: 320px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        #inspector-content { padding: 20px; overflow-y: auto; }
        
        /* Bottom: JSON */
        #json-output-container { height: 220px; border-top: 1px solid var(--border); background: #000; display: flex; flex-direction: column; }
        #json-toolbar { height: 40px; background: #161b22; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); justify-content: space-between; }
        
        .btn-group { display: flex; gap: 5px; }
        
        textarea { flex: 1; background: #000; color: #7ee787; font-size: 11px; border: none; padding: 10px; font-family: 'Consolas', monospace; resize: none; }

        /* Controls */
        .btn { background: #21262d; border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .btn:hover { background: #30363d; border-color: #8b949e; }
        .btn.active { background: #0d2b33; border-color: var(--neon); color: var(--neon); }
        .btn.primary { background: #238636; border-color: #238636; color: white; }
        .btn.danger { background: #b62324; border-color: #b62324; color: white; }
        .btn.small { padding: 4px 8px; font-size: 11px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 10px; color: #8b949e; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 0.5px; }
        .input-row { display: flex; gap: 5px; }
        input[type='text'], input[type='number'], select, textarea.input-field { 
            background: #0d1117; border: 1px solid #30363d; color: var(--text); 
            padding: 6px 8px; border-radius: 4px; font-size: 12px; width: 100%; 
        }
        input:focus, select:focus, textarea.input-field:focus { outline: none; border-color: var(--neon); }
        
        .section-title { font-size: 11px; color: #8b949e; border-bottom: 1px solid #21262d; padding-bottom: 5px; margin: 20px 0 10px 0; text-transform: uppercase; }
        
        .checkbox-wrapper { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
        .checkbox-wrapper input { width: 16px; height: 16px; accent-color: var(--neon); }

        .hidden { display: none; }
        .color-box { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 5px; }
        
        #save-indicator { font-size: 10px; color: #8b949e; opacity: 0; transition: opacity 0.3s; }
        #save-indicator.show { opacity: 1; color: var(--neon); }

        #hotkeys-hint { font-size: 10px; color: #555; margin-left: auto; margin-right: 10px; }
    </style>
</head>
<body>

<div id="app">
    <!-- LEFT: HIERARCHY -->
    <div id="hierarchy-panel">
        <div id="hierarchy-header">
            <span>Scene Hierarchy</span>
            <span id="save-indicator">Saved</span>
        </div>
        <div id="object-list"></div>
    </div>

    <!-- CENTER: VIEWPORT & TOOLS -->
    <div id="viewport-container">
        <div id="toolbar">
            <select id="add-type-select" style="width: 100px;">
                <option value="box">Box</option>
                <option value="cylinder">Cylinder</option>
            </select>
            <button class="btn primary" onclick="addMapObject()">+ Add Object</button>
            
            <div style="flex:1"></div>
            
            <span id="hotkeys-hint">DEL: Delete | F: Focus | CTRL+D: Clone</span>

            <button class="btn small danger" onclick="clearSave()" title="Clear Local Storage">Clear</button>
        </div>
        <canvas id="renderCanvas"></canvas>
        
        <div id="json-output-container">
            <div id="json-toolbar">
                <span style="font-size:12px; color:#8b949e;">GAME_CONFIG JSON</span>
                <div class="btn-group">
                    <button class="btn small" onclick="loadFromJSON()">Load JSON</button>
                    <button class="btn small" onclick="toggleMinify()" id="btn-minify">Minify</button>
                    <button class="btn small primary" onclick="copyToClipboard()">Copy JSON</button>
                </div>
            </div>
            <textarea id="json-output" readonly placeholder="JSON output appears here..."></textarea>
        </div>
    </div>

    <!-- RIGHT: INSPECTOR -->
    <div id="inspector-panel">
        <div style="padding: 15px; border-bottom: 1px solid var(--border); background: #161b22;">
            <h2 style="margin:0; font-size:14px; letter-spacing:1px;">INSPECTOR</h2>
        </div>
        <div id="inspector-content">
            <div id="no-select-msg" style="color:#8b949e; text-align:center; margin-top:50px; line-height:1.6;">
                Select an object or spawn point<br>to edit properties.
            </div>
            
            <div id="inspector-form" class="hidden">
                <div class="input-group">
                    <label>Object Name / Seed</label>
                    <input type="text" id="i-seed" onchange="updateMeshFromUI()">
                </div>

                <div class="section-title">Transform</div>
                
                <div class="input-group">
                    <label>Position (X Y Z)</label>
                    <div class="input-row">
                        <input type="number" id="i-x" step="0.5" oninput="updateMeshFromUI()">
                        <input type="number" id="i-y" step="0.5" oninput="updateMeshFromUI()">
                        <input type="number" id="i-z" step="0.5" oninput="updateMeshFromUI()">
                    </div>
                </div>

                <div id="rotation-group" class="input-group">
                    <label>Rotation (X Y Z)</label>
                    <div class="input-row">
                        <input type="number" id="i-rx" step="0.1" oninput="updateMeshFromUI()" placeholder="X">
                        <input type="number" id="i-ry" step="0.1" oninput="updateMeshFromUI()" placeholder="Y">
                        <input type="number" id="i-rz" step="0.1" oninput="updateMeshFromUI()" placeholder="Z">
                    </div>
                </div>

                <div id="scale-group" class="input-group">
                    <label>Size (W H D) or (D H)</label>
                    <div class="input-row" id="scale-inputs"></div>
                </div>

                <div id="texture-section" class="section-title">Appearance</div>

                <div class="input-group">
                    <label>Texture URL</label>
                    <input type="text" id="i-texture" placeholder="https://..." onchange="updateMeshFromUI()">
                </div>

                <div id="collision-group" class="input-group">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="i-collision" checked onchange="updateMeshFromUI()">
                        Has Collision
                    </label>
                </div>

                <div id="tools-section" class="section-title">Tools</div>
                <div class="input-row">
                     <button class="btn small" style="flex:1" onclick="duplicateSelected()" id="btn-duplicate">Duplicate Object</button>
                     <button class="btn small danger" style="flex:1" onclick="deleteSelected()">Delete</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/materialsLibrary/babylon.gridMaterial.min.js"></script>

<script>
    // --- STATE VARIABLES ---
    let minifyJson = false;
    let sceneObjects = []; 
    let spawnPoints = {}; 
    let objectCounter = 0;
    let isDirty = false; 
    let selectedMesh = null;

    // --- SETUP ENGINE ---
    const canvas = document.getElementById("renderCanvas");
    const engine = new BABYLON.Engine(canvas, true);
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color3(0.02, 0.02, 0.03);

    // --- CAMERA SETUP ---
    const camera = new BABYLON.ArcRotateCamera("cam", -Math.PI/2, Math.PI/3, 100, BABYLON.Vector3.Zero(), scene);
    camera.attachControl(canvas, true);
    camera.lowerRadiusLimit = 2;
    camera.upperRadiusLimit = 500;
    camera.wheelPrecision = 20; 
    camera.panningSensibility = 100;

    // --- CUSTOM ZOOM TO MOUSE LOGIC (Improved) ---
    // We detach the default mousewheel input first
    camera.inputs.attached.mousewheel.detachControl();

    // Add our custom wheel event listener
    canvas.addEventListener("wheel", (event) => {
        event.preventDefault();

        // 1. Pick the point under the mouse
        const pickResult = scene.pick(scene.pointerX, scene.pointerY);
        
        // Determine zoom direction and intensity
        const delta = event.deltaY;
        const zoomSpeed = 0.001; // Adjust for feel
        
        // Calculate new radius (distance)
        const currentRadius = camera.radius;
        // We use exponential zoom for smoother feel near objects
        const newRadius = BABYLON.Scalar.Clamp(currentRadius * (1 + delta * zoomSpeed), camera.lowerRadiusLimit, camera.upperRadiusLimit);

        // If we don't hit anything (sky), or we didn't actually zoom, just update radius
        if (!pickResult.hit || !pickResult.pickedPoint || newRadius === currentRadius) {
            camera.radius = newRadius;
            return;
        }

        const mousePoint = pickResult.pickedPoint;

        // 2. Smart Target Interpolation
        // Instead of just moving the camera position, we move the TARGET slightly towards the mouse point.
        // This gives the "Zoom to Mouse" effect (the point under cursor stays under cursor)
        // while keeping the ArcRotateCamera behavior stable (orbiting around the target).
        
        // Ratio of how much we zoomed vs total distance
        // This determines how much we "pull" the target towards the mouse
        const ratio = 1 - (newRadius / currentRadius);

        // Calculate new target position
        // Target moves from current target -> mouse point by 'ratio' amount
        const newTarget = BABYLON.Vector3.Lerp(camera.target, mousePoint, ratio);

        // Apply changes
        camera.target = newTarget;
        camera.radius = newRadius;

    }, { passive: false });

    // --- LIGHTING & GROUND ---
    const hemi = new BABYLON.HemisphericLight("hemi", new BABYLON.Vector3(0, 1, 0), scene);
    hemi.intensity = 0.8;
    const dirLight = new BABYLON.DirectionalLight("dir", new BABYLON.Vector3(-1, -2, -1), scene);
    dirLight.intensity = 0.5;

    const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 500, height: 500}, scene);
    const gridMat = new BABYLON.GridMaterial("gridMat", scene);
    gridMat.majorUnitFrequency = 5;
    gridMat.minorUnitVisibility = 0.3;
    gridMat.gridRatio = 1;
    gridMat.backFaceCulling = false;
    gridMat.mainColor = new BABYLON.Color3(0.05, 0.1, 0.1);
    gridMat.lineColor = new BABYLON.Color3(0, 0.5, 0.3);
    gridMat.opacity = 0.98;
    ground.material = gridMat;

    // --- MATERIALS ---
    function createRandomMaterial(seed) {
        const mat = new BABYLON.StandardMaterial("mat_" + seed + "_" + Math.random(), scene);
        mat.diffuseColor = new BABYLON.Color3(Math.random()*0.5+0.5, Math.random()*0.5+0.5, Math.random()*0.5+0.5);
        mat.alpha = 0.9;
        return mat;
    }

    const spawnMats = {
        p1_initial: createSpawnMat("#4af"),
        p1_respawn: createSpawnMat("#2a8"),
        p2_initial: createSpawnMat("#f84"),
        p2_respawn: createSpawnMat("#a52")
    };

    function createSpawnMat(colorHex) {
        const m = new BABYLON.StandardMaterial("", scene);
        m.diffuseColor = BABYLON.Color3.FromHexString(colorHex);
        m.emissiveColor = BABYLON.Color3.FromHexString(colorHex).scale(0.5);
        m.alpha = 0.6;
        return m;
    }

    // --- INIT SPAWN POINTS ---
    function initSpawnPoints() {
        const types = ["p1_initial", "p1_respawn", "p2_initial", "p2_respawn"];
        types.forEach(type => {
            const mesh = BABYLON.MeshBuilder.CreateCylinder("spawn_" + type, { height: 1.8, diameter: 0.6 }, scene);
            mesh.material = spawnMats[type];
            mesh.isPickable = true;
            mesh.metadata = { isSpawn: true, spawnType: type };
            
            if(type.includes("p1")) mesh.position.x = 10;
            if(type.includes("p2")) mesh.position.x = -10;
            if(type.includes("respawn")) mesh.position.z = 5;
            else mesh.position.z = -5;
            
            spawnPoints[type] = mesh;
        });
    }

    // --- SYSTEM FUNCTIONS ---
    function triggerSave() {
        isDirty = true;
        clearTimeout(window.saveTimeout);
        window.saveTimeout = setTimeout(() => {
            if(isDirty) {
                saveToLocalStorage();
                isDirty = false;
            }
        }, 500);
    }

    function saveToLocalStorage() {
        const data = generateConfigObject();
        localStorage.setItem('levelArchitectSave', JSON.stringify(data));
        const indicator = document.getElementById('save-indicator');
        indicator.classList.add('show');
        setTimeout(() => indicator.classList.remove('show'), 1500);
    }

    function loadFromLocalStorage() {
        const saved = localStorage.getItem('levelArchitectSave');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                applyConfig(data, false);
            } catch(e) {
                console.error("Failed to load cache", e);
            }
        }
    }

    function clearSave() {
        if(confirm("Clear local save and reset scene?")) {
            localStorage.removeItem('levelArchitectSave');
            location.reload();
        }
    }

    // --- OBJECT MANAGEMENT ---
    function addMapObject() {
        const type = document.getElementById('add-type-select').value;
        objectCounter++;
        const seed = type + "_" + objectCounter;
        
        const data = {
            type: type,
            seed: seed,
            x: 0, y: 1, z: 0,
            w: 5, h: 5, d: 5,
            rx: 0, ry: 0, rz: 0,
            texture: "",
            collision: true
        };

        const mesh = createMeshFromData(data);
        selectMesh(mesh);
        updateJSON();
        triggerSave();
    }

    function createMeshFromData(data) {
        let mesh;
        if(data.type === "cylinder") {
            mesh = BABYLON.MeshBuilder.CreateCylinder(data.seed, {height: 1, diameter: 1}, scene);
        } else {
            mesh = BABYLON.MeshBuilder.CreateBox(data.seed, {size: 1}, scene);
        }

        mesh.metadata = {
            type: data.type,
            seed: data.seed,
            isObject: true,
            texture: data.texture || "",
            collision: data.collision !== false
        };

        applyDataToMesh(mesh, data);
        
        if(data.texture) {
             applyTexture(mesh, data.texture);
        } else {
             mesh.material = createRandomMaterial(data.seed);
        }

        sceneObjects.push(mesh);
        refreshHierarchy();
        return mesh;
    }

    function applyTexture(mesh, url) {
        if(!url) return;
        const mat = new BABYLON.StandardMaterial("texMat_" + mesh.name, scene);
        mat.diffuseTexture = new BABYLON.Texture(url, scene);
        mat.specularColor = new BABYLON.Color3(0.1, 0.1, 0.1);
        mesh.material = mat;
    }

    function applyDataToMesh(mesh, data) {
        mesh.position.x = data.x || 0;
        mesh.position.y = (data.y || 0) + ((data.h || 1)/2); 
        mesh.position.z = data.z || 0;
        
        if(data.type === "cylinder") {
            mesh.scaling.x = data.d || 1; 
            mesh.scaling.z = data.d || 1;
            mesh.scaling.y = data.h || 1;
        } else {
            mesh.scaling.x = data.w || 1;
            mesh.scaling.y = data.h || 1;
            mesh.scaling.z = data.d || 1;
        }
        
        mesh.rotation.x = data.rx || 0;
        mesh.rotation.y = data.ry || 0;
        mesh.rotation.z = data.rz || 0;
    }

    function updateInspectorValues() {
        if (!selectedMesh) return;
        document.getElementById('i-x').value = selectedMesh.position.x.toFixed(2);
        document.getElementById('i-y').value = selectedMesh.position.y.toFixed(2);
        document.getElementById('i-z').value = selectedMesh.position.z.toFixed(2);

        document.getElementById('i-rx').value = selectedMesh.rotation.x.toFixed(2);
        document.getElementById('i-ry').value = selectedMesh.rotation.y.toFixed(2);
        document.getElementById('i-rz').value = selectedMesh.rotation.z.toFixed(2);

        if (selectedMesh.metadata.isObject) {
            if(selectedMesh.metadata.type === 'cylinder') {
                if(document.getElementById('i-d')) document.getElementById('i-d').value = selectedMesh.scaling.x.toFixed(2);
                if(document.getElementById('i-h')) document.getElementById('i-h').value = selectedMesh.scaling.y.toFixed(2);
            } else {
                if(document.getElementById('i-w')) document.getElementById('i-w').value = selectedMesh.scaling.x.toFixed(2);
                if(document.getElementById('i-h')) document.getElementById('i-h').value = selectedMesh.scaling.y.toFixed(2);
                if(document.getElementById('i-d')) document.getElementById('i-d').value = selectedMesh.scaling.z.toFixed(2);
            }
        }
    }

    function selectMesh(mesh) {
        if (!mesh || mesh.name === "ground") return;
        selectedMesh = mesh;
        
        document.getElementById('no-select-msg').classList.add('hidden');
        document.getElementById('inspector-form').classList.remove('hidden');
        
        const dupBtn = document.getElementById('btn-duplicate');
        dupBtn.disabled = false;

        if(mesh.metadata.isSpawn) {
            document.getElementById('i-seed').value = mesh.metadata.spawnType;
            document.getElementById('i-seed').disabled = true;
            document.getElementById('texture-section').classList.add('hidden');
            document.getElementById('collision-group').classList.add('hidden');
            document.getElementById('tools-section').classList.add('hidden'); 
            document.getElementById('scale-group').classList.add('hidden');
            document.getElementById('rotation-group').classList.remove('hidden'); 
        } else {
            document.getElementById('i-seed').disabled = false;
            document.getElementById('i-seed').value = mesh.metadata.seed;
            document.getElementById('texture-section').classList.remove('hidden');
            document.getElementById('i-texture').value = mesh.metadata.texture;
            document.getElementById('collision-group').classList.remove('hidden');
            document.getElementById('i-collision').checked = mesh.metadata.collision;
            document.getElementById('tools-section').classList.remove('hidden');
            document.getElementById('scale-group').classList.remove('hidden');
            document.getElementById('rotation-group').classList.remove('hidden');
            
            const scaleInputs = document.getElementById('scale-inputs');
            if(mesh.metadata.type === 'cylinder') {
                scaleInputs.innerHTML = `
                    <input type="number" id="i-d" step="0.5" oninput="updateMeshFromUI()" placeholder="Diameter">
                    <input type="number" id="i-h" step="0.5" oninput="updateMeshFromUI()" placeholder="Height">
                `;
            } else {
                scaleInputs.innerHTML = `
                    <input type="number" id="i-w" step="0.5" oninput="updateMeshFromUI()" placeholder="W">
                    <input type="number" id="i-h" step="0.5" oninput="updateMeshFromUI()" placeholder="H">
                    <input type="number" id="i-d" step="0.5" oninput="updateMeshFromUI()" placeholder="D">
                `;
            }
        }

        updateInspectorValues();
        refreshHierarchy();
    }

    function deselectMesh() {
        selectedMesh = null;
        document.getElementById('no-select-msg').classList.remove('hidden');
        document.getElementById('inspector-form').classList.add('hidden');
        refreshHierarchy();
        updateJSON();
    }

    function updateMeshFromUI() {
        if (!selectedMesh) return;
        
        if(selectedMesh.metadata.isObject) {
            selectedMesh.metadata.seed = document.getElementById('i-seed').value;
            selectedMesh.metadata.texture = document.getElementById('i-texture').value;
            selectedMesh.metadata.collision = document.getElementById('i-collision').checked;
            
            if(selectedMesh.metadata.texture) {
                applyTexture(selectedMesh, selectedMesh.metadata.texture);
            } else {
                if(selectedMesh.material.name.startsWith("texMat")) {
                     selectedMesh.material = createRandomMaterial(selectedMesh.metadata.seed);
                }
            }

            if(selectedMesh.metadata.type === 'cylinder') {
                const d = parseFloat(document.getElementById('i-d').value) || 1;
                const h = parseFloat(document.getElementById('i-h').value) || 1;
                selectedMesh.scaling.set(d, h, d);
            } else {
                selectedMesh.scaling.x = parseFloat(document.getElementById('i-w').value) || 1;
                selectedMesh.scaling.y = parseFloat(document.getElementById('i-h').value) || 1;
                selectedMesh.scaling.z = parseFloat(document.getElementById('i-d').value) || 1;
            }
        }

        selectedMesh.position.x = parseFloat(document.getElementById('i-x').value) || 0;
        selectedMesh.position.y = parseFloat(document.getElementById('i-y').value) || 0;
        selectedMesh.position.z = parseFloat(document.getElementById('i-z').value) || 0;
        
        selectedMesh.rotation.x = parseFloat(document.getElementById('i-rx').value) || 0;
        selectedMesh.rotation.y = parseFloat(document.getElementById('i-ry').value) || 0;
        selectedMesh.rotation.z = parseFloat(document.getElementById('i-rz').value) || 0;

        updateJSON();
        triggerSave();
    }

    function deleteSelected() {
        if (!selectedMesh || selectedMesh.metadata.isSpawn) return;
        sceneObjects = sceneObjects.filter(o => o !== selectedMesh);
        selectedMesh.dispose();
        deselectMesh();
        triggerSave();
    }

    function duplicateSelected() {
        if (!selectedMesh || selectedMesh.metadata.isSpawn) return;
        
        const data = {
            type: selectedMesh.metadata.type,
            seed: selectedMesh.metadata.seed + "_copy",
            x: selectedMesh.position.x + 2,
            y: selectedMesh.position.y - (selectedMesh.scaling.y/2), 
            z: selectedMesh.position.z,
            w: selectedMesh.scaling.x,
            h: selectedMesh.scaling.y,
            d: selectedMesh.scaling.z,
            rx: selectedMesh.rotation.x,
            ry: selectedMesh.rotation.y,
            rz: selectedMesh.rotation.z,
            texture: selectedMesh.metadata.texture,
            collision: selectedMesh.metadata.collision
        };

        const newMesh = createMeshFromData(data);
        selectMesh(newMesh);
        updateJSON();
        triggerSave();
    }

    // --- INPUT HANDLING (Selection) ---
    scene.onPointerObservable.add((pointerInfo) => {
        if (pointerInfo.type === BABYLON.PointerEventTypes.POINTERDOWN) {
            if(pointerInfo.pickInfo.hit && pointerInfo.pickInfo.pickedMesh) {
                const mesh = pointerInfo.pickInfo.pickedMesh;
                if (mesh.name === "ground") {
                    deselectMesh(); 
                } else if (mesh.metadata && (mesh.metadata.isSpawn || mesh.metadata.isObject)) {
                    selectMesh(mesh);
                }
            }
        }
    });

    // Keyboard Shortcuts
    window.addEventListener("keydown", (evt) => {
        if (evt.target.tagName === "INPUT") return; 

        if (evt.key === "Delete" || evt.key === "Backspace") {
            deleteSelected();
        }
        if (evt.key === "f" || evt.key === "F") {
            if (selectedMesh) {
                camera.setTarget(selectedMesh.position);
                camera.radius = 20;
            }
        }
        if (evt.ctrlKey && evt.key === "d") {
            evt.preventDefault(); 
            duplicateSelected();
        }
        if (evt.key === "Escape") {
            deselectMesh();
        }
    });

    // --- UI HELPERS ---
    function toggleMinify() {
        minifyJson = !minifyJson;
        const btn = document.getElementById('btn-minify');
        btn.innerText = minifyJson ? "Pretty" : "Minify";
        updateJSON();
    }

    function refreshHierarchy() {
        const list = document.getElementById('object-list');
        list.innerHTML = '';

        const spawnSection = document.createElement('div');
        spawnSection.className = 'list-section';
        spawnSection.innerHTML = '<div class="list-section-title">Spawn Points</div>';
        Object.keys(spawnPoints).forEach(key => {
            const mesh = spawnPoints[key];
            const div = document.createElement('div');
            const isP1 = key.includes('p1');
            div.className = 'obj-item spawn-item ' + (isP1 ? 'p1' : 'p2') + (mesh === selectedMesh ? ' selected' : '');
            div.innerHTML = `<span class="color-box" style="background:${isP1 ? (key.includes('initial')?'#4af':'#2a8') : (key.includes('initial')?'#f84':'#a52')}"></span> ${key.replace(/_/g, ' ')}`;
            div.onclick = () => selectMesh(mesh);
            spawnSection.appendChild(div);
        });
        list.appendChild(spawnSection);

        const objSection = document.createElement('div');
        objSection.className = 'list-section';
        objSection.innerHTML = '<div class="list-section-title">Map Objects</div>';
        sceneObjects.forEach(obj => {
            const div = document.createElement('div');
            div.className = 'obj-item' + (obj === selectedMesh ? ' selected' : '');
            div.innerHTML = `<span class="color-box" style="background:${obj.material && obj.material.diffuseColor ? obj.material.diffuseColor.toHexString() : '#fff'}"></span> ${obj.metadata.seed}`;
            div.onclick = () => selectMesh(obj);
            objSection.appendChild(div);
        });
        list.appendChild(objSection);
    }

    // --- JSON LOGIC ---
    function generateConfigObject() {
        const config = {
            spawns: {
                player1: { initial: {}, respawn: {} },
                player2: { initial: {}, respawn: {} }
            },
            map_objects: []
        };

        function getSpawnData(mesh) {
            if(!mesh) return {x:0, y:0, z:0, rx:0, ry:0, rz:0};
            return {
                x: parseFloat(mesh.position.x.toFixed(2)),
                y: parseFloat((mesh.position.y - (mesh.scaling.y/2)).toFixed(2)),
                z: parseFloat(mesh.position.z.toFixed(2)),
                rx: parseFloat(mesh.rotation.x.toFixed(2)),
                ry: parseFloat(mesh.rotation.y.toFixed(2)),
                rz: parseFloat(mesh.rotation.z.toFixed(2))
            };
        }

        config.spawns.player1.initial = getSpawnData(spawnPoints.p1_initial);
        config.spawns.player1.respawn = getSpawnData(spawnPoints.p1_respawn);
        config.spawns.player2.initial = getSpawnData(spawnPoints.p2_initial);
        config.spawns.player2.respawn = getSpawnData(spawnPoints.p2_respawn);

        sceneObjects.forEach(mesh => {
            const obj = {
                type: mesh.metadata.type,
                position: {
                    x: parseFloat(mesh.position.x.toFixed(2)),
                    y: parseFloat((mesh.position.y - (mesh.scaling.y/2)).toFixed(2)),
                    z: parseFloat(mesh.position.z.toFixed(2)),
                    rx: parseFloat(mesh.rotation.x.toFixed(2)),
                    ry: parseFloat(mesh.rotation.y.toFixed(2)),
                    rz: parseFloat(mesh.rotation.z.toFixed(2))
                },
                size: {},
                texture: mesh.metadata.texture,
                collision: mesh.metadata.collision
            };

            if(mesh.metadata.type === "cylinder") {
                obj.size.d = parseFloat(mesh.scaling.x.toFixed(2)); 
                obj.size.h = parseFloat(mesh.scaling.y.toFixed(2));
            } else {
                obj.size.w = parseFloat(mesh.scaling.x.toFixed(2));
                obj.size.h = parseFloat(mesh.scaling.y.toFixed(2));
                obj.size.d = parseFloat(mesh.scaling.z.toFixed(2));
            }

            config.map_objects.push(obj);
        });
        return config;
    }

    function updateJSON() {
        const data = generateConfigObject();
        if(minifyJson) {
            document.getElementById('json-output').value = JSON.stringify(data);
        } else {
            document.getElementById('json-output').value = JSON.stringify(data, null, 2);
        }
    }

    function applyConfig(config, resetCamera = true) {
        sceneObjects.forEach(m => m.dispose());
        sceneObjects = [];
        
        function setSpawnMesh(key, data) {
            if(spawnPoints[key] && data) {
                spawnPoints[key].position.set(data.x, data.y, data.z);
                spawnPoints[key].position.y += spawnPoints[key].scaling.y/2;
                spawnPoints[key].rotation.x = data.rx || 0;
                spawnPoints[key].rotation.y = data.ry || 0;
                spawnPoints[key].rotation.z = data.rz || 0;
            }
        }
        setSpawnMesh("p1_initial", config.spawns?.player1?.initial);
        setSpawnMesh("p1_respawn", config.spawns?.player1?.respawn);
        setSpawnMesh("p2_initial", config.spawns?.player2?.initial);
        setSpawnMesh("p2_respawn", config.spawns?.player2?.respawn);

        if(config.map_objects) {
            config.map_objects.forEach(d => {
                const dataForCreation = {
                    type: d.type,
                    seed: d.seed || ("obj_" + objectCounter++),
                    texture: d.texture,
                    collision: d.collision,
                    x: d.position.x,
                    y: d.position.y,
                    z: d.position.z,
                    rx: d.position.rx || 0,
                    ry: d.position.ry || 0,
                    rz: d.position.rz || 0
                };

                if(d.type === "cylinder") {
                    dataForCreation.d = d.size.d;
                    dataForCreation.h = d.size.h;
                } else {
                    dataForCreation.w = d.size.w;
                    dataForCreation.h = d.size.h;
                    dataForCreation.d = d.size.d;
                }

                createMeshFromData(dataForCreation);
            });
        }
        
        deselectMesh();
        updateJSON();
    }

    function loadFromJSON() {
        const jsonStr = prompt("Paste your GAME_CONFIG JSON here:");
        if(!jsonStr) return;
        try {
            const config = JSON.parse(jsonStr);
            applyConfig(config);
            triggerSave();
            alert("Map Loaded Successfully");
        } catch(e) {
            alert("Invalid JSON format: " + e.message);
        }
    }

    function copyToClipboard() {
        const txt = document.getElementById('json-output');
        txt.select();
        document.execCommand("copy");
        const btn = document.querySelector('#json-toolbar .primary');
        const oldText = btn.innerText;
        btn.innerText = "Copied!";
        setTimeout(() => btn.innerText = oldText, 1000);
    }

    // --- INITIALIZATION ---
    initSpawnPoints();
    refreshHierarchy();
    loadFromLocalStorage();
    updateJSON();

    engine.runRenderLoop(() => scene.render());
    window.addEventListener("resize", () => engine.resize());

</script>
</body>
</html>
